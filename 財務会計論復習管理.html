<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財務会計論 復習管理</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="財務会計論">
<meta name="theme-color" content="#1a6e4a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f7f7f5;--white:#fff;--border:#e5e5e0;--border2:#d0d0c8;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --accent:#1a6e4a;--accent-bg:#e8f5ee;
  --green:#1a9e5c;--green-bg:#e8f7f0;
  --yellow:#c47a00;--yellow-bg:#fef6e4;
  --red:#c93b2a;--red-bg:#fdeeed;
  --A:#c93b2a;--A-bg:#fdeeed;
  --B:#c47a00;--B-bg:#fef6e4;
  --shadow:0 1px 3px rgba(0,0,0,.07);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

/* STICKY HEADER */
.sticky{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
.hd-main{padding:14px 16px 10px;}
.hd-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.08em;margin-bottom:10px;}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.prog-pct{font-size:26px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;line-height:1;}
.prog-lbl{font-size:11px;color:var(--text2);}
.prog-wrap{background:var(--border);border-radius:999px;height:7px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),#4aad7e);border-radius:999px;transition:width .5s ease;}

/* ROUND TABS */
.round-tabs{display:flex;border-top:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.round-tabs::-webkit-scrollbar{display:none;}
.rtab{padding:9px 16px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:transparent;border:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.rtab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* FILTERS */
.filters{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fb{padding:5px 12px;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
.fb.on{background:var(--text);border-color:var(--text);color:#fff;}
.fb.onA{background:var(--A);border-color:var(--A);color:#fff;}
.fb.onB{background:var(--B);border-color:var(--B);color:#fff;}

/* CONTENT */
.content{padding:14px;max-width:680px;margin:0 auto;}

/* CHAPTER CARD */
.ch-card{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.ch-card.hidden{display:none;}

.ch-header{padding:13px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:8px;}
.ch-header:active{background:var(--bg);}
.ch-chevron{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.ch-card.open .ch-chevron{transform:rotate(90deg);}
.ch-info{flex:1;}
.ch-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;}
.ch-sub{font-size:11px;color:var(--text2);}
.ch-prog-badge{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text2);flex-shrink:0;}
.ch-prog-badge.done{background:var(--green-bg);border-color:var(--green);color:var(--green);}

/* CHAPTER FOOTER (date/time) */
.ch-footer{border-top:1px solid var(--border);padding:8px 14px;background:var(--bg);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ch-stat{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;}
.ch-record-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--white);color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap;}
.ch-record-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ITEMS */
.items-wrap{border-top:1px solid var(--border);display:none;}
.ch-card.open .items-wrap{display:block;}

.item-row{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.item-row:last-child{border-bottom:none;}
.item-row.hidden{display:none;}
.item-top{display:flex;align-items:center;gap:7px;}
.item-num{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0;min-width:24px;}
.item-name{flex:1;font-size:12px;line-height:1.4;}
.imp{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:999px;flex-shrink:0;}
.imp-A{background:var(--A-bg);color:var(--A);}
.imp-B{background:var(--B-bg);color:var(--B);}
.u-btns{display:flex;gap:3px;flex-shrink:0;}
.ub{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border2);background:var(--bg);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text2);}
.ub:active{transform:scale(.9);}
.ub.sel-o{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.ub.sel-t{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow);}
.ub.sel-x{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.item-memo{width:100%;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;resize:none;outline:none;min-height:28px;line-height:1.5;transition:border-color .2s;}
.item-memo:focus{border-color:var(--accent);}
.item-memo::placeholder{color:var(--text3);}

/* NEXT ROUND BUTTON */
.next-round-wrap{padding:16px;text-align:center;}
.next-round-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;box-shadow:var(--shadow-md);}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:18px 18px 0 0;padding:18px 18px 40px;width:100%;max-width:680px;max-height:80vh;overflow-y:auto;}
.modal-handle{width:34px;height:4px;background:var(--border2);border-radius:999px;margin:0 auto 14px;}
.modal h2{font-size:14px;font-weight:700;margin-bottom:3px;}
.modal-sub{font-size:11px;color:var(--text2);margin-bottom:14px;}
.form-group{margin-bottom:12px;}
.form-lbl{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.finput{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:9px 11px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.finput:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-primary{flex:1;padding:11px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-secondary{padding:11px 14px;border-radius:9px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;}
.hist-list{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}
.hist-round{font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.hist-meta{color:var(--text2);text-align:right;}
</style>
</head>
<body>

<div class="sticky">
  <div class="hd-main">
    <div class="hd-title">財務会計論 復習管理</div>
    <div class="prog-top">
      <div class="prog-pct" id="prog-pct">0%</div>
      <div class="prog-lbl" id="prog-lbl">0 / 0 論証完了</div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="round-tabs" id="round-tabs"></div>
  <div class="filters">
    <button class="fb on" onclick="setFilter('all',this)">すべて</button>
    <button class="fb" onclick="setFilter('A',this)">重要度 A</button>
    <button class="fb" onclick="setFilter('B',this)">重要度 B</button>
    <button class="fb" onclick="setFilter('未',this)">未完了</button>
    <button class="fb" onclick="setFilter('×',this)">要復習 ×</button>
  </div>
</div>

<div class="content" id="content"></div>

<div class="next-round-wrap" id="next-round-wrap" style="display:none;">
  <button class="next-round-btn" onclick="startNextRound()">次の回を始める →</button>
</div>

<!-- CHAPTER RECORD MODAL -->
<div class="overlay" id="ch-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="ch-modal-title"></h2>
    <div class="modal-sub" id="ch-modal-sub"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-lbl">実施日</label>
        <input type="date" class="finput" id="ch-date">
      </div>
      <div class="form-group">
        <label class="form-lbl">所要時間（分）</label>
        <input type="number" class="finput" id="ch-time" placeholder="例: 45" min="1">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeChModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveChModal()">保存</button>
    </div>
    <div class="hist-list" id="ch-hist"></div>
  </div>
</div>

let itemState = {}, chState = {}, appState = {rounds:[{label:'第1回'}], currentRound:0};

function load(){
  try{
    const i=localStorage.getItem('zaimu-item');
    const c=localStorage.getItem('zaimu-ch');
    const a=localStorage.getItem('zaimu-app');
    if(i) itemState=JSON.parse(i);
    if(c) chState=JSON.parse(c);
    if(a) appState=JSON.parse(a);
  }catch(e){}
}
function save(){
  try{
    localStorage.setItem('zaimu-item',JSON.stringify(itemState));
    localStorage.setItem('zaimu-ch',JSON.stringify(chState));
    localStorage.setItem('zaimu-app',JSON.stringify(appState));
  }catch(e){}
}
function today(){return new Date().toISOString().split('T')[0];}
function curRound(){return appState.currentRound;}

function getItemR(id){
  return (itemState[id]||{})[curRound()]||{};
}
function setItemR(id,data){
  if(!itemState[id]) itemState[id]={};
  itemState[id][curRound()]=data;
}
function getChR(chKey){
  return (chState[chKey]||{})[curRound()]||{};
}
function setChR(chKey,data){
  if(!chState[chKey]) chState[chKey]={};
  chState[chKey][curRound()]=data;
}

// ────────────────────────────────
// FILTER
// ────────────────────────────────
let curFilter='all';

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.fb').forEach(b=>b.className='fb');
  if(f==='A') btn.classList.add('onA');
  else if(f==='B') btn.classList.add('onB');
  else btn.classList.add('on');
  applyFilter();
}

function applyFilter(){
  DATA.forEach(ch=>{
    const key=chKey(ch);
    const card=document.getElementById('chcard-'+key);
    if(!card) return;
    // filter items
    let anyVisible=false;
    ch.items.forEach(item=>{
      const row=document.getElementById('irow-'+item.id);
      if(!row) return;
      const u=getItemR(item.id).u;
      let show=true;
      if(curFilter==='A') show=item.imp==='A';
      else if(curFilter==='B') show=item.imp==='B';
      else if(curFilter==='未') show=!u;
      else if(curFilter==='×') show=u==='x';
      row.style.display=show?'':'none';
      if(show) anyVisible=true;
    });
    card.classList.toggle('hidden', curFilter!=='all' && !anyVisible);
  });
}

// ────────────────────────────────
// RENDER
// ────────────────────────────────
function chKey(ch){return ch.ch.replace(/[^0-9]/g,'');}

function render(){
  const ct=document.getElementById('content');
  ct.innerHTML='';
  DATA.forEach(ch=>{
    ct.appendChild(buildChCard(ch));
  });
  renderRoundTabs();
  updateProgress();
  applyFilter();
  updateNextRoundBtn();
}

function buildChCard(ch){
  const key=chKey(ch);
  const r=getChR(key);
  const totalAB=ch.items.filter(i=>i.imp==='A'||i.imp==='B').length;
  const doneAB=ch.items.filter(i=>(i.imp==='A'||i.imp==='B')&&getItemR(i.id).u).length;
  const isDone=doneAB===totalAB&&totalAB>0;

  const card=document.createElement('div');
  card.className='ch-card';
  card.id='chcard-'+key;

  // Header
  const hd=document.createElement('div');
  hd.className='ch-header';
  hd.onclick=()=>card.classList.toggle('open');
  hd.innerHTML=`
    <span class="ch-chevron">▶</span>
    <div class="ch-info">
      <div class="ch-name">${ch.ch}　${ch.chName}</div>
      <div class="ch-sub">A×${ch.items.filter(i=>i.imp==='A').length} B×${ch.items.filter(i=>i.imp==='B').length}</div>
    </div>
    <span class="ch-prog-badge ${isDone?'done':''}" id="chprog-${key}">${doneAB}/${totalAB}</span>`;
  card.appendChild(hd);

  // Items
  const iw=document.createElement('div');
  iw.className='items-wrap';
  ch.items.forEach((item,idx)=>{
    iw.appendChild(buildItemRow(item,idx+1));
  });
  card.appendChild(iw);

  // Footer
  const ft=document.createElement('div');
  ft.className='ch-footer';
  ft.id='chfoot-'+key;
  ft.innerHTML=buildChFooter(key,r);
  card.appendChild(ft);

  return card;
}

function buildChFooter(key,r){
  const parts=[];
  if(r.date) parts.push(`<span class="ch-stat">📅 ${r.date}</span>`);
  if(r.time) parts.push(`<span class="ch-stat">⏱ ${r.time}分</span>`);
  parts.push(`<button class="ch-record-btn" onclick="openChModal('${key}')">実施日・時間を記録</button>`);
  return parts.join('');
}

function buildItemRow(item,num){
  const r=getItemR(item.id);
  const u=r.u||null;
  const row=document.createElement('div');
  row.className='item-row';
  row.id='irow-'+item.id;
  row.innerHTML=`
    <div class="item-top">
      <span class="item-num">${num}</span>
      <span class="item-name">${item.name}</span>
      <span class="imp imp-${item.imp}">${item.imp}</span>
      <div class="u-btns">
        <button class="ub ${u==='o'?'sel-o':''}" onclick="setU('${item.id}','o')">○</button>
        <button class="ub ${u==='t'?'sel-t':''}" onclick="setU('${item.id}','t')">△</button>
        <button class="ub ${u==='x'?'sel-x':''}" onclick="setU('${item.id}','x')">×</button>
      </div>
    </div>
    <textarea class="item-memo" placeholder="メモ..." rows="1"
      onchange="saveMemo('${item.id}',this.value)"
      oninput="autoResize(this)">${r.memo||''}</textarea>`;
  return row;
}

// ────────────────────────────────
// ROUND TABS
// ────────────────────────────────
function renderRoundTabs(){
  const tabs=document.getElementById('round-tabs');
  tabs.innerHTML='';
  appState.rounds.forEach((rd,i)=>{
    const btn=document.createElement('button');
    btn.className='rtab'+(i===curRound()?' active':'');
    btn.textContent=rd.label;
    btn.onclick=()=>switchRound(i);
    tabs.appendChild(btn);
  });
}

function switchRound(i){
  appState.currentRound=i;
  save();
  render();
}

function startNextRound(){
  const n=appState.rounds.length+1;
  appState.rounds.push({label:`第${n}回`});
  appState.currentRound=appState.rounds.length-1;
  save();
  render();
}

function updateNextRoundBtn(){
  const allItems=DATA.flatMap(c=>c.items);
  const allDone=allItems.every(i=>getItemR(i.id).u);
  document.getElementById('next-round-wrap').style.display=allDone?'block':'none';
}

// ────────────────────────────────
// PROGRESS
// ────────────────────────────────
function updateProgress(){
  const allItems=DATA.flatMap(c=>c.items);
  const total=allItems.length;
  const done=allItems.filter(i=>getItemR(i.id).u).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-lbl').textContent=done+' / '+total+' 論証完了（A・B）';
  document.getElementById('prog-bar').style.width=pct+'%';
}

// ────────────────────────────────
// INTERACTIONS
// ────────────────────────────────
function setU(itemId,type){
  const r=getItemR(itemId);
  r.u=r.u===type?null:type;
  setItemR(itemId,r);
  save();
  refreshItem(itemId);
  refreshChProg(itemId);
  updateProgress();
  updateNextRoundBtn();
}

function saveMemo(itemId,val){
  const r=getItemR(itemId);
  r.memo=val;
  setItemR(itemId,r);
  save();
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

function refreshItem(itemId){
  const r=getItemR(itemId);
  const row=document.getElementById('irow-'+itemId);
  if(!row) return;
  ['o','t','x'].forEach(t=>{
    const btn=row.querySelector(`.ub[onclick*="'${t}'"]`);
    if(!btn) return;
    btn.classList.remove('sel-o','sel-t','sel-x');
    if(r.u===t) btn.classList.add('sel-'+t);
  });
}

function refreshChProg(itemId){
  const ch=DATA.find(c=>c.items.find(i=>i.id===itemId));
  if(!ch) return;
  const key=chKey(ch);
  const totalAB=ch.items.filter(i=>i.imp==='A'||i.imp==='B').length;
  const doneAB=ch.items.filter(i=>(i.imp==='A'||i.imp==='B')&&getItemR(i.id).u).length;
  const isDone=doneAB===totalAB&&totalAB>0;
  const el=document.getElementById('chprog-'+key);
  if(el){
    el.textContent=`${doneAB}/${totalAB}`;
    el.className='ch-prog-badge'+(isDone?' done':'');
  }
}

// ────────────────────────────────
// CHAPTER MODAL
// ────────────────────────────────
let editChKey=null;

function openChModal(key){
  editChKey=key;
  const ch=DATA.find(c=>chKey(c)===key);
  const r=getChR(key);
  document.getElementById('ch-modal-title').textContent=ch?ch.ch+'　'+ch.chName:'';
  document.getElementById('ch-modal-sub').textContent=appState.rounds[curRound()].label+' 実施記録';
  document.getElementById('ch-date').value=r.date||today();
  document.getElementById('ch-time').value=r.time||'';
  // history
  const allR=chState[key]||{};
  const past=Object.entries(allR).filter(([ri])=>parseInt(ri)!==curRound()).map(([ri,d])=>({round:parseInt(ri),data:d}));
  const hEl=document.getElementById('ch-hist');
  hEl.innerHTML=past.length?'<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;">過去の実施履歴</div>'+
    past.map(x=>`<div class="hist-item"><span class="hist-round">${appState.rounds[x.round]?.label||`第${x.round+1}回`}</span><span class="hist-meta">${x.data.date||''}${x.data.time?'　'+x.data.time+'分':''}</span></div>`).join(''):'';
  document.getElementById('ch-overlay').classList.add('open');
}

function closeChModal(){
  document.getElementById('ch-overlay').classList.remove('open');
  editChKey=null;
}

function saveChModal(){
  if(!editChKey) return;
  const r=getChR(editChKey);
  r.date=document.getElementById('ch-date').value;
  r.time=document.getElementById('ch-time').value;
  setChR(editChKey,r);
  save();
  const foot=document.getElementById('chfoot-'+editChKey);
  if(foot) foot.innerHTML=buildChFooter(editChKey,r);
  closeChModal();
}

document.getElementById('ch-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeChModal();});

// ────────────────────────────────
// INIT
// ────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw-zaimu.js').catch(()=>{});});
}
load();
render();
</script>
</body>
</html>
