<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="icons/zaimu-riron.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>財務会計論 復習管理</title>
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #e8e8e5;
  --border-strong: #d0d0cb;
  --text: #111111;
  --text-2: #666666;
  --text-3: #aaaaaa;
  --accent: #111111;
  --accent-bg: #f0f0ee;
  --o-color: #1a7a4a;
  --o-bg: #edf7f2;
  --t-color: #9a6200;
  --t-bg: #fdf4e3;
  --x-color: #c0392b;
  --x-bg: #fdf0ee;
  --A-color: #c0392b;
  --A-bg: #fdf0ee;
  --B-color: #7c5c00;
  --B-bg: #fdf4e3;
  --radius: 10px;
  --radius-sm: 6px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
  font-size: 14px;
  line-height: 1.5;
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.header-top {
  padding: 14px 16px 12px;
}

.header-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.app-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text-3);
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  gap: 6px;
}

.btn-icon {
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--text-2);
  font-size: 11px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.btn-icon:hover, .btn-icon.active {
  background: var(--text);
  border-color: var(--text);
  color: #fff;
}

.progress-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 7px;
}

.prog-num {
  font-family: 'DM Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.prog-label {
  font-size: 11px;
  color: var(--text-3);
}

.prog-track {
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: var(--text);
  border-radius: 999px;
  transition: width .4s ease;
}

.tabs {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  border-top: 1px solid var(--border);
  padding: 0 4px;
}

.tabs::-webkit-scrollbar {
  display: none;
}

.tab {
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-3);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
  letter-spacing: .02em;
}

.tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

.round-info-bar {
  display: flex;
  align-items: center;
  padding: 6px 16px 4px;
  border-top: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: nowrap;
  gap: 0;
}

.round-info-bar::-webkit-scrollbar {
  display: none;
}

.ri-item {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 4px 12px 4px 0;
  min-width: 0;
  flex-shrink: 0;
}

.ri-item + .ri-item {
  border-left: 1px solid var(--border);
  padding-left: 12px;
}

.ri-lbl {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 1px;
}

.ri-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

.ri-val.warn {
  color: var(--x-color);
}

.ri-val.ok {
  color: var(--o-color);
}

.ri-deadline-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  text-decoration: underline dotted;
  text-underline-offset: 3px;
}


.content {
  padding: 12px 14px;
  max-width: 1400px;
  margin: 0 auto;
}

.ch-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
}

.ch-card.hidden {
  display: none;
}

.ch-header {
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}

.ch-header:active {
  background: var(--bg);
}

.ch-chevron {
  font-size: 9px;
  color: var(--text-3);
  transition: transform .2s;
  flex-shrink: 0;
  width: 12px;
}

.ch-card.open .ch-chevron {
  transform: rotate(90deg);
}

.ch-info {
  flex: 1;
  min-width: 0;
}

.ch-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ch-sub {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 1px;
  font-family: 'DM Mono', monospace;
}

.ch-badge {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-2);
  flex-shrink: 0;
  transition: all .2s;
}

.ch-badge.done {
  background: var(--o-bg);
  border-color: var(--o-color);
  color: var(--o-color);
}

.items-wrap {
  display: none;
  border-top: 1px solid var(--border);
}

.ch-card.open .items-wrap {
  display: block;
}

/* ── 苦手タブの章アコーディオン（.ch-card とは独立させ、入れ子時のCSS衝突を避ける） ── */
.tr-ch-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
}

.tr-ch-header {
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}

.tr-ch-header:active {
  background: var(--bg);
}

.tr-ch-card.open .ch-chevron {
  transform: rotate(90deg);
}

.tr-items-wrap {
  display: none;
  border-top: 1px solid var(--border);
  padding: 8px 14px;
}

.tr-ch-card.open .tr-items-wrap {
  display: block;
}

.item-row {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.item-row:last-child {
  border-bottom: none;
}

.item-row.hidden {
  display: none;
}

.item-top {
  display: flex;
  align-items: flex-start;
  gap: 7px;
}

.item-name {
  flex: 1;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
}

.imp-badge {
  font-size: 9px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  padding: 2px 5px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
}

.imp-A {
  background: var(--A-bg);
  color: var(--A-color);
}

.imp-B {
  background: var(--B-bg);
  color: var(--B-color);
}

.u-btns {
  display: flex;
  gap: 3px;
  flex-shrink: 0;
}

.ub {
  min-width: 34px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  background: var(--bg);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
  color: var(--text-3);
  font-family: 'Noto Sans JP', sans-serif;
  white-space: nowrap;
  padding: 0 4px;
}

.ub:active {
  transform: scale(.88);
}

.ub.sel-oo {
  background: #e8f7f0;
  border-color: #1a7a4a;
  color: #1a7a4a;
}

.ub.sel-o {
  background: var(--o-bg);
  border-color: var(--o-color);
  color: var(--o-color);
}

.ub.sel-n {
  background: #f0f0ee;
  border-color: #999;
  color: #555;
}

.ub.sel-x {
  background: var(--x-bg);
  border-color: var(--x-color);
  color: var(--x-color);
}

.ub.sel-xx {
  background: #fde;
  border-color: #900;
  color: #900;
  font-weight: 700;
}


.item-history {
  display: flex;
  gap: 4px;
  align-items: center;
  padding-left: 0;
}

.hist-dot-wrap {
  display: flex;
  align-items: center;
  gap: 2px;
}

.hist-label {
  font-size: 9px;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  min-width: 20px;
}

.hist-dot {
  min-width: 22px;
  height: 18px;
  border-radius: 4px;
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-3);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  padding: 0 2px;
}

.hist-dot.dot-oo {
  background: #e8f7f0;
  border-color: #1a7a4a;
  color: #1a7a4a;
}

.hist-dot.dot-o {
  background: var(--o-bg);
  border-color: var(--o-color);
  color: var(--o-color);
}

.hist-dot.dot-n {
  background: #f0f0ee;
  border-color: #999;
  color: #555;
}

.hist-dot.dot-x {
  background: var(--x-bg);
  border-color: var(--x-color);
  color: var(--x-color);
}

.hist-dot.dot-xx {
  background: #fde;
  border-color: #900;
  color: #900;
}

/* ── キーワード ── */
.kw-reveal-btn {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:500;
  color:var(--text-3);
  background:none;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:5px 0;
  width:100%;
  cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  transition:all .15s
}

.kw-reveal-btn.active {
  color:var(--text-2);
  border-color:var(--border-strong);
  background:var(--bg)
}

.kw-section {
  overflow:hidden;
  max-height:0;
  transition:max-height .28s ease,opacity .2s ease;
  opacity:0
}

.kw-section.kw-open {
  max-height:800px;
  opacity:1
}

.kw-inner {
  display:flex;
  flex-direction:column;
  gap:5px;
  padding-top:2px
}

.kw-list {
  display:flex;
  flex-direction:column;
  gap:3px
}

.kw-row {
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:5px 8px;
  transition:border-color .15s,background .15s
}

.kw-row.kw-passed {
  border-color:var(--o-color);
  background:var(--o-bg)
}

.kw-row.kw-failed {
  border-color:var(--x-color);
  background:var(--x-bg)
}

.kw-text {
  flex:1;
  font-size:11px;
  font-weight:700;
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  line-height:1.4
}

.kw-eval-btns {
  display:flex;
  gap:3px;
  flex-shrink:0
}

.kw-btn {
  width:28px;
  height:24px;
  border-radius:5px;
  border:1px solid var(--border-strong);
  background:var(--surface);
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .12s;
  color:var(--text-3)
}

.kw-btn:active {
  transform:scale(.85)
}

.kw-btn.kw-sel-o {
  background:var(--o-bg);
  border-color:var(--o-color);
  color:var(--o-color)
}

.kw-btn.kw-sel-x {
  background:var(--x-bg);
  border-color:var(--x-color);
  color:var(--x-color)
}

.kw-del {
  width:20px;
  height:20px;
  border-radius:4px;
  border:none;
  background:transparent;
  color:var(--text-3);
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  padding:0;
  transition:color .12s
}

.kw-del:hover {
  color:var(--x-color)
}

.kw-footer {
  display:flex;
  align-items:center;
  justify-content:space-between
}

.kw-stats {
  font-size:9px;
  font-family:'DM Mono',monospace;
  color:var(--text-3)
}

.kw-stats .ks-ok {
  color:var(--o-color);
  font-weight:700
}

.kw-stats .ks-ng {
  color:var(--x-color);
  font-weight:700
}

.kw-add-open-btn {
  font-size:10px;
  font-weight:700;
  color:var(--text-3);
  background:none;
  border:none;
  cursor:pointer;
  padding:0;
  font-family:'Noto Sans JP',sans-serif;
  transition:color .15s
}

.kw-add-open-btn:hover {
  color:var(--text-2)
}

.kw-add-row {
  display:flex;
  gap:6px;
  align-items:center
}

.kw-input {
  flex:1;
  font-size:16px;
  background:var(--surface);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  padding:5px 8px;
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  outline:none;
  transition:border-color .15s;
  touch-action:manipulation
}

.kw-input:focus {
  border-color:var(--text)
}

.kw-input::placeholder {
  color:var(--text-3)
}

.kw-add-confirm-btn {
  padding:4px 10px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border-strong);
  background:var(--surface);
  color:var(--text-2);
  font-size:11px;
  font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;
  white-space:nowrap;
  transition:all .15s
}

.kw-add-confirm-btn:hover {
  border-color:var(--text);
  color:var(--text)
}

.kw-close-btn {
  font-size:11px;
  font-weight:700;
  color:var(--text-3);
  background:none;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;
  padding:5px 0;
  width:100%;
  font-family:'Noto Sans JP',sans-serif;
  transition:all .15s
}

.kw-close-btn:hover {
  color:var(--text-2);
  border-color:var(--border-strong)
}

/* ── キーワード評価ポップアップ ── */
.kw-eval-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  z-index:300;
  align-items:flex-end;
  justify-content:center
}

.kw-eval-overlay.open {
  display:flex
}

.kw-eval-modal {
  background:var(--surface);
  border-radius:16px 16px 0 0;
  padding:20px 16px 44px;
  width:100%;
  max-width:700px;
  max-height:75vh;
  overflow-y:auto
}

.kw-eval-handle {
  width:32px;
  height:3px;
  background:var(--border-strong);
  border-radius:999px;
  margin:0 auto 14px
}

.kw-eval-title {
  font-size:11px;
  font-weight:700;
  color:var(--text-3);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:4px
}

.kw-eval-subtitle {
  font-size:12px;
  color:var(--text);
  font-weight:700;
  margin-bottom:14px;
  line-height:1.4
}

.kw-eval-list {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:16px
}

.kw-eval-row {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  transition:border-color .15s,background .15s
}

.kw-eval-row.ep {
  border-color:var(--o-color);
  background:var(--o-bg)
}

.kw-eval-row.ef {
  border-color:var(--x-color);
  background:var(--x-bg)
}

.kw-eval-word {
  flex:1;
  font-size:13px;
  font-weight:700;
  color:var(--text)
}

.kw-eval-btns2 {
  display:flex;
  gap:4px;
  flex-shrink:0
}

.kw-ebtn {
  width:38px;
  height:32px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border-strong);
  background:var(--surface);
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .12s;
  color:var(--text-3)
}

.kw-ebtn:active {
  transform:scale(.88)
}

.kw-ebtn.ep {
  background:var(--o-bg);
  border-color:var(--o-color);
  color:var(--o-color)
}

.kw-ebtn.ef {
  background:var(--x-bg);
  border-color:var(--x-color);
  color:var(--x-color)
}

.kw-eval-done-btn {
  width:100%;
  padding:12px;
  border-radius:var(--radius-sm);
  border:none;
  background:var(--text);
  color:#fff;
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer
}


.view-tabs {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.vtab {
  flex: 1;
  padding: 9px 8px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-3);
  border-bottom: 2px solid transparent;
  transition: all .15s;
  letter-spacing: .02em;
}

.vtab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* ── 次ラウンドスキップ ── */
.item-row.item-skipped {
  opacity: 0.38;
}

.skip-chip {
  font-size: 9px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  padding: 2px 5px;
  border-radius: 4px;
  background: #f0f0ee;
  border: 1px solid #ccc;
  color: #999;
  flex-shrink: 0;
  margin-top: 2px;
}

.nrp {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 0 1px;
}

.nrp-label {
  font-size: 10px;
  color: var(--text-3);
  font-family: 'Noto Sans JP', sans-serif;
  flex-shrink: 0;
}

.nrp-btn {
  height: 28px;
  padding: 0 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  background: var(--bg);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text-3);
  transition: all .12s;
  white-space: nowrap;
}

.nrp-btn:active {
  transform: scale(.9);
}

.nrp-btn.nrp-include {
  background: var(--o-bg);
  border-color: var(--o-color);
  color: var(--o-color);
}

.nrp-btn.nrp-skip {
  background: var(--x-bg);
  border-color: var(--x-color);
  color: var(--x-color);
}

.ch-footer {
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.ch-footer-row {
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.ch-stat {
  font-size: 20px;
  font-weight: 700;
  color: #1a3a6e;
  font-family: 'Zen Maru Gothic', sans-serif;
  letter-spacing: .02em;
}

.ch-stat-lbl {
  font-size: 9px;
  font-weight: 500;
  color: #7a8fa8;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .06em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 1px;
}

.ch-record-btn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all .15s;
  white-space: nowrap;
}

.ch-record-btn:hover {
  border-color: var(--text);
  color: var(--text);
}

.ch-timer-label {
  font-size: 11px;
  color: var(--text-2);
  font-style: italic;
  margin-right: auto;
}

.ch-end-btn {
  background: var(--o-color);
  color: #fff;
  border-color: var(--o-color);
}

.ch-end-btn:hover {
  opacity: 0.85;
  color: #fff;
}

.ch-record-form {
  display: none;
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border);
  gap: 8px;
  flex-direction: column;
}

.ch-record-form.open {
  display: flex;
}

.ch-record-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.ch-record-form-lbl {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-2);
  display: block;
  margin-bottom: 3px;
}

.ch-record-input {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  padding: 8px 10px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
}

.ch-record-input:focus {
  border-color: var(--text);
}

.ch-record-form-btns {
  display: flex;
  gap: 6px;
}

.ch-record-save {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--text);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

.ch-record-cancel {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border-strong);
  background: transparent;
  color: var(--text-2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  cursor: pointer;
}

.next-round-wrap {
  padding: 14px;
  text-align: center;
  max-width: 1400px;
  margin: 0 auto;
}

.next-round-btn {
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 13px 28px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  letter-spacing: .04em;
}

/* ── 履歴一覧 ── */
#hist-ch-tabs::-webkit-scrollbar {
  display:none
}

/* ── 履歴一覧 record-item ── */
.rec-item {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:8px;
  overflow:hidden
}

.rec-item-header {
  display:flex;
  align-items:center;
  gap:8px;
  padding:11px 13px;
  cursor:pointer;
  user-select:none
}

.rec-item-header:active {
  background:var(--bg)
}

.rec-item-name {
  flex:1;
  font-size:12px;
  font-weight:700;
  color:var(--text);
  line-height:1.4
}

.rec-imp {
  font-size:9px;
  font-weight:700;
  font-family:'DM Mono',monospace;
  padding:2px 5px;
  border-radius:4px;
  flex-shrink:0
}

.rec-u-track {
  width:44px;
  height:5px;
  background:var(--border);
  border-radius:999px;
  overflow:hidden;
  flex-shrink:0
}

.rec-u-fill {
  height:100%;
  border-radius:999px
}

.rec-score {
  font-family:'DM Mono',monospace;
  font-size:12px;
  font-weight:700;
  flex-shrink:0;
  min-width:36px;
  text-align:right
}

.rec-count {
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-3);
  flex-shrink:0
}

.rec-item-body {
  display:none;
  border-top:1px solid var(--border);
  padding:10px 13px
}

.rec-item.open .rec-item-body {
  display:block
}

.rec-kw-table {
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch
}

.rec-kw-table table {
  border-collapse:collapse;
  min-width:100%
}

.rec-kw-table th {
  font-size:10px;
  font-family:'DM Mono',monospace;
  color:var(--text-3);
  padding:4px 8px;
  text-align:center;
  white-space:nowrap;
  font-weight:400;
  border-bottom:1px solid var(--border)
}

.rec-kw-table th.kw-name-col {
  text-align:left;
  font-size:10px;
  min-width:100px
}

.rec-kw-table td {
  font-size:11px;
  padding:5px 8px;
  text-align:center;
  white-space:nowrap
}

.rec-kw-table td.kw-name-col {
  text-align:left;
  font-size:11px;
  color:var(--text);
  line-height:1.4;
  white-space:normal;
  min-width:100px
}

.rec-kw-table tr:nth-child(odd) td {
  background:var(--surface)
}

.rec-kw-table tr:nth-child(even) td {
  background:var(--bg)
}

.rec-no-kw {
  font-size:11px;
  color:var(--text-3);
  padding:4px 0
}

.hist-page-header {
  padding: 14px 0 10px;
}

.hist-page-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-2);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.hist-page-subtitle {
  font-size: 11px;
  color: var(--text-3);
}

.hist-chapter-block {
  margin-bottom: 20px;
}

.hist-chapter-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

.hist-table {
  width: 100%;
  border-collapse: collapse;
}

.hist-table tr {
  border-bottom: 1px solid var(--border);
}

.hist-table tr:last-child {
  border-bottom: none;
}

.hist-name-cell {
  padding: 8px 8px 8px 0;
  font-size: 11px;
  color: var(--text);
  line-height: 1.4;
  min-width: 0;
  width: 100%;
}

.hist-name-inner {
  display: flex;
  align-items: center;
  gap: 5px;
}

.hist-rounds-cell {
  padding: 6px 0 6px 8px;
  white-space: nowrap;
}

.hist-rounds-wrap {
  display: flex;
  gap: 4px;
  align-items: center;
}

.hist-round-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 36px;
}

.hist-round-lbl {
  font-size: 8px;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

.hist-round-date {
  font-size: 7px;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

.hist-round-chip {
  min-width: 32px;
  height: 22px;
  border-radius: 5px;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-3);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  padding: 0 3px;
}

.hist-round-chip.chip-oo {
  background: #e8f7f0;
  border-color: #1a7a4a;
  color: #1a7a4a;
}

.hist-round-chip.chip-o {
  background: var(--o-bg);
  border-color: var(--o-color);
  color: var(--o-color);
}

.hist-round-chip.chip-n {
  background: #f0f0ee;
  border-color: #999;
  color: #555;
}

.hist-round-chip.chip-x {
  background: var(--x-bg);
  border-color: var(--x-color);
  color: var(--x-color);
}

.hist-round-chip.chip-xx {
  background: #fde;
  border-color: #900;
  color: #900;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.overlay.open {
  display: flex;
}

.scope-modal {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 20px 16px 44px;
  width: 100%;
  max-width: 700px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-handle {
  width: 32px;
  height: 3px;
  background: var(--border-strong);
  border-radius: 999px;
  margin: 0 auto 14px;
}

.scope-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 14px 0;
}

.scope-opt {
  padding: 13px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border-strong);
  background: var(--bg);
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
  color: var(--text);
}

.scope-opt:hover {
  border-color: var(--text);
}

.scope-opt.sel {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}

.scope-opt .scope-sub {
  font-size: 11px;
  font-weight: 400;
  color: inherit;
  opacity: .7;
  display: block;
  margin-top: 2px;
}

.form-lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-2);
  display: block;
  margin-bottom: 4px;
}

.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-3);
  font-size: 13px;
}


/* ── iPad 横向き対応 ── */
@media (min-width: 768px) {
  .content {
    padding: 16px 24px;
  }
  .header-top {
    padding: 14px 24px 12px;
  }
}

/* ── 問題文モーダル ── */
.q-btn{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;border:1px solid var(--border-strong,#d0d0cb);background:transparent;color:var(--text-2,#666);font-size:10px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;margin-left:6px;vertical-align:middle}
.q-btn:active{transform:scale(.93)}
.q-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:flex-end;justify-content:center}
.q-overlay.open{display:flex}
.q-modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 18px 40px;width:100%;max-width:680px;max-height:80vh;overflow-y:auto}
.q-modal-handle{width:32px;height:3px;background:#d0d0cb;border-radius:999px;margin:0 auto 16px}
.q-modal-lbl{font-size:10px;font-weight:700;color:#999;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.q-modal-id{font-size:11px;font-family:'DM Mono',monospace;color:#aaa;margin-bottom:10px}
.q-modal-text{font-size:15px;line-height:1.8;color:#111;font-weight:500;white-space:pre-wrap;word-break:break-all}
.q-modal-close{margin-top:20px;width:100%;padding:12px;border-radius:8px;border:none;background:#111;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-meta">
      <div class="app-title">財務会計論 復習管理</div>
      <div class="header-actions">
        <button class="btn-icon" onclick="exportData()">バックアップ</button>
        <button class="btn-icon" onclick="document.getElementById('import-input').click()">復元</button>
        <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn-icon" id="kw-manage-btn" onclick="toggleKwManagePage()">キーワード</button>
        <button class="btn-icon" id="close-all-btn" onclick="closeAllOverlays()" style="display:none;background:var(--x-bg);border-color:var(--x-color);color:var(--x-color);">✕ 閉じる</button>
      </div>
    </div>
    <div class="progress-row">
      <div class="prog-num" id="prog-pct">0%</div>
      <div class="prog-label" id="prog-lbl">0 / 0 完了</div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="tabs" id="round-tabs"></div>
  <div class="round-info-bar" id="round-info-bar"></div>
  <div class="view-tabs" id="view-tabs">
    <button class="vtab active" onclick="showPage('all', this)">全問題</button>
    <button class="vtab" onclick="showPage('history', this)">履歴一覧</button>
    <button class="vtab" onclick="showPage('training', this)">苦手</button>
  </div>
</div>

<div id="main-view">
  <div class="content" id="content"></div>
  <div class="next-round-wrap" id="next-round-wrap" style="display:none;">
    <button class="next-round-btn" onclick="openScopeModal()">次の回を始める →</button>
  </div>
</div>

<div id="weakness-view" class="content" style="display:none;"></div>

<div id="training-view" class="content" style="display:none;"></div>

<div id="kw-manage-view" class="content" style="display:none;padding-bottom:100px;"></div>

<div class="overlay" id="scope-overlay">
  <div class="scope-modal">
    <div class="modal-handle"></div>
    <h2 id="scope-modal-title" style="font-size:14px;font-weight:700;margin-bottom:3px;"></h2>
    <div style="font-size:11px;color:var(--text-2);margin-bottom:4px;">対象の重要度を選んでください</div>
    <div class="scope-options">
      <button class="scope-opt" onclick="selectScope('all')">全部（A・B）<span class="scope-sub">すべての項目を対象にする</span></button>
      <button class="scope-opt" onclick="selectScope('A')">重要度 A のみ<span class="scope-sub">重点的にAを復習する</span></button>
      <button class="scope-opt" onclick="selectScope('B')">重要度 B のみ<span class="scope-sub">Bを集中的に復習する</span></button>
    </div>
    <div style="margin-bottom:8px;">
      <label class="form-lbl">開始日</label>
      <input type="date" class="ch-record-input" id="scope-startdate" style="width:100%;" oninput="checkScopeConfirmBtn()">
    </div>
    <div style="margin-bottom:8px;">
      <label class="form-lbl">期限（任意）</label>
      <input type="date" class="ch-record-input" id="scope-deadline" style="width:100%;">
    </div>
    <button class="ch-record-save" id="scope-confirm-btn" style="width:100%;opacity:.4;pointer-events:none;">この設定で始める</button>
  </div>
</div>

<div class="overlay" id="deadline-overlay">
  <div class="scope-modal">
    <div class="modal-handle"></div>
    <h2 style="font-size:14px;font-weight:700;margin-bottom:12px;">期限を変更</h2>
    <input type="date" class="ch-record-input" id="deadline-input" style="width:100%;margin-bottom:12px;">
    <div style="display:flex;gap:8px;">
      <button class="ch-record-cancel" onclick="closeDeadlineModal()" style="flex:1;">キャンセル</button>
      <button class="ch-record-save" onclick="saveDeadline()" style="flex:2;">保存</button>
    </div>
  </div>
</div>

<div class="kw-eval-overlay" id="kw-eval-overlay">
  <div class="kw-eval-modal">
    <div class="kw-eval-handle"></div>
    <div class="kw-eval-title">キーワード確認</div>
    <div class="kw-eval-subtitle" id="kw-eval-subtitle"></div>
    <div class="kw-eval-list" id="kw-eval-list"></div>
    <button class="kw-eval-done-btn" onclick="closeKwEvalPopup()">完了</button>
  </div>
</div>

<script>
const DATA = [
 {ch:"第２章", chName:"財務会計総論", items:[
   {id:"z2-5",name:"収益費用アプローチと資産負債アプローチの前提となる損益計算書と貸借対照表の関係",imp:"B",q:"収益費用アプローチと資産負債アプローチの前提となっている，損益計算書と貸借対照表の基本的な関係について説明しなさい。"},
   {id:"z2-6",name:"製品保証引当金の負債計上の可否（収益費用・資産負債アプローチ）",imp:"B",q:"製品保証引当金の負債計上の可否ついて，収益費用アプローチと資産負債アプローチのそれぞれの観点から説明しなさい。"},
   {id:"z2-7",name:"修繕引当金の負債計上の可否（収益費用・資産負債アプローチ）",imp:"A",q:"修繕引当金の負債計上の可否ついて，収益費用アプローチと資産負債アプローチのそれぞれの観点から説明しなさい。"},
   {id:"z2-11",name:"名目・実質・実体資本維持概念のうち取得原価主義と結びつくもの",imp:"B",q:"名目資本維持概念，実質資本維持概念及び実体資本維持概念のうち，取得原価主義と結びつくものはどれか，説明しなさい。"},
   {id:"z2-12",name:"帰納的アプローチと演繹的アプローチの意義と帰納的アプローチの長短所",imp:"B",q:"会計基準の設定方法としての帰納的アプローチと演繹的アプローチのそれぞれについて，意義を述べるとともに，帰納的アプローチの長所及び短所を説明しなさい。"},
   {id:"z2-13",name:"資本取引と損益取引の意義と区別が必要な理由",imp:"A",q:"資本取引と損益取引のそれぞれについて，意義を述べるとともに，両者の区別が必要とされる理由を説明しなさい。"},
   {id:"z2-14",name:"資本剰余金と利益剰余金の混同禁止（利害調整・情報提供の観点）",imp:"A",q:"資本剰余金と利益剰余金の混同が禁止されることについて，①利害調整の観点と②情報提供の観点のそれぞれから説明しなさい。"},
   {id:"z2-15",name:"継続性の原則が要請される理由２つ",imp:"B",q:"継続性の原則が要請される理由を２つ簡潔に述べなさい。"},
   {id:"z2-16",name:"保守主義の原則と適用される場面２つ",imp:"B",q:"保守主義の原則を説明するとともに，保守主義の原則が適用される場面を２つ簡潔に述べなさい。"},
  ]},
 {ch:"第３章", chName:"収益と費用", items:[
   {id:"z3-1",name:"期間利益が備えるべき特質２つと財務会計の機能との関係",imp:"B",q:"期間利益が備えるべき特質を２つ挙げ，これと財務会計の機能との関係について述べなさい。"},
   {id:"z3-3",name:"実現主義の意義と発生主義ではなく実現主義により収益を認識する理由",imp:"B",q:"実現主義の意義を述べるとともに，企業会計原則において，原則として発生主義ではなく実現主義により収益を認識するものとされる理由を説明しなさい。"},
   {id:"z3-4",name:"費用収益対応の原則は期間損益の算定においてどのように機能するか",imp:"B",q:"費用収益対応の原則は期間損益の算定においてどのように機能するか，説明しなさい。"},
  ]},
 {ch:"第４章", chName:"資産と負債", items:[
   {id:"z4-1",name:"費用性資産について期間損益計算との関係から説明",imp:"B",q:"費用性資産について，期間損益計算との関係から説明しなさい。"},
   {id:"z4-2",name:"費用性資産の評価に取得原価主義が採用される論拠",imp:"B",q:"費用性資産の評価に取得原価主義が採用される論拠を説明しなさい。"},
   {id:"z4-5",name:"自家建設の固定資産への借入資本利子算入の要件と理由",imp:"B",q:"自家建設により取得した固定資産については，借入資本利子を取得原価に算入することが容認されている。この取得原価への算入の要件を述べるとともに，取得原価への算入が容認される理由を説明しなさい。"},
   {id:"z4-6",name:"自己所有固定資産と交換に固定資産取得した場合の取得原価決定",imp:"B",q:"自己所有の固定資産と交換に固定資産を取得した場合において，取得した固定資産の取得原価はどのように決定されるか，理由とともに説明しなさい。"},
   {id:"z4-7",name:"自己所有有価証券と交換に固定資産取得した場合の取得原価決定",imp:"B",q:"自己所有の有価証券と交換に固定資産を取得した場合において，取得した固定資産の取得原価はどのように決定されるか，理由とともに説明しなさい。"},
   {id:"z4-8",name:"無償で固定資産を取得した場合の会計処理方法の論拠と問題点",imp:"B",q:"無償で固定資産を取得した場合の会計処理方法としては，取得原価をゼロとする方法と，公正な評価額をもって取得原価とする方法が考えられる。前者の方法の論拠及び理論的な問題点を説明しなさい。"},
   {id:"z4-9",name:"減価償却の目的と目的を果たすために必要とされる点",imp:"B",q:"減価償却の目的を述べ，この目的を果たすために必要とされる点を説明しなさい。"},
   {id:"z4-14",name:"繰延資産の計上の根拠",imp:"B",q:"繰延資産の計上の根拠を説明しなさい。"},
   {id:"z4-15",name:"株式分割・無償交付等に係る費用を繰延資産に計上できるか",imp:"B",q:"株式分割，無償交付等に係る費用を繰延資産に計上することはできるか，理由とともに説明しなさい。"},
   {id:"z4-16",name:"株式交付費を資本から直接控除する方法ではなく費用処理する理由",imp:"B",q:"制度会計上，株式交付費は資本から直接控除する方法ではなく，費用として処理（繰延資産に計上し償却する処理を含む）する方法が採用されている。その理由を説明しなさい。"},
   {id:"z4-17",name:"負債性引当金と概念フレームワークにおける負債の定義との関係",imp:"B",q:"「企業会計原則注解」注18に基づき計上される負債性引当金と，討議資料「財務会計の概念フレームワーク」における負債の定義との関係を説明しなさい。また，発生の可能性の低い偶発事象について引当金を計上することができるか説明しなさい。"},
   {id:"z4-18",name:"引当金の計上根拠（費用性・損失性引当金）",imp:"B",q:"引当金の計上根拠について，費用性引当金と損失性引当金に分けて説明しなさい。"},
   {id:"z4-19",name:"将来の修繕に係る支出を引当金に計上する方法の論拠・問題点・解消方法",imp:"B",q:"将来の修繕に係る支出を引当金に計上する方法の論拠を説明するとともにその問題点を挙げ，これを解消するために採り得る方法について説明しなさい。"},
  ]},
 {ch:"第５章", chName:"概念フレームワーク", items:[

   {id:"z5-2",name:"財務報告において特に重要とされる情報",imp:"A",q:"財務報告において提供される情報の中で，特に重要とされるものは何か，理由とともに説明しなさい。"},
   {id:"z5-3",name:"会計情報に期待される役割（企業価値との関係）",imp:"A",q:"会計情報に期待される役割について，企業価値との関係から説明しなさい。"},
   {id:"z5-4",name:"ディスクロージャー制度の主たる当事者（投資家と経営者の役割）",imp:"A",q:"ディスクロージャー制度の主たる当事者のうち投資家と経営者の役割について，両者の関係を示しつつ説明しなさい。"},
   {id:"z5-8",name:"セグメント情報等の開示とマネジメント・アプローチの採用理由（２特性の優劣関係）",imp:"B",q:"「セグメント情報等の開示に関する会計基準」では，マネジメント・アプローチの採用理由として，討議資料「財務会計の概念フレームワーク」における「会計情報の質的特性」に示される２つの特性間の優劣関係に言及している。そこで，この２つの特性を示すとともに，その優劣関係について説明しなさい。"},
   {id:"z5-9",name:"セグメント情報開示のマネジメント・アプローチのメリット・デメリット",imp:"B",q:"セグメント情報の開示にあたりマネジメント・アプローチを採用することについて，そのメリットとデメリットを，討議資料「財務会計の概念フレームワーク」の考え方を踏まえて説明しなさい。"},
   {id:"z5-10",name:"自己創設のれんを計上することは認められるか（財務報告の目的の観点）",imp:"A",q:"自己創設のれんを計上することは認められるか，討議資料「財務会計の概念フレームワーク」における財務報告の目的の観点から説明しなさい。"},
   {id:"z5-11",name:"概念フレームワークにおける資産の定義・支配・経済的資源の意味",imp:"A",q:"討議資料「財務会計の概念フレームワーク」における資産の定義を述べるとともに，支配及び経済的資源の意味について説明しなさい。"},
   {id:"z5-12",name:"概念フレームワークにおける負債の定義",imp:"A",q:"討議資料「財務会計の概念フレームワーク」における負債の定義を述べなさい。"},
   {id:"z5-13",name:"繰延税金資産には資産性があるか（資産の定義に照らして）",imp:"A",q:"繰延税金資産には資産性があるか，討議資料「財務会計の概念フレームワーク」における資産の定義に照らして説明しなさい。"},
   {id:"z5-14",name:"繰延資産には資産性があるか（資産の定義に照らして）",imp:"B",q:"繰延資産には資産性があるか，討議資料「財務会計の概念フレームワーク」における資産の定義に照らして説明しなさい。"},
   {id:"z5-15",name:"製品保証引当金は概念フレームワークにおける負債の定義を充足するか",imp:"B",q:"製品保証引当金は討議資料「財務会計の概念フレームワーク」における負債の定義を充足するか，説明しなさい。"},
   {id:"z5-16",name:"修繕引当金は概念フレームワークにおける負債の定義を充足するか",imp:"A",q:"修繕引当金は討議資料「財務会計の概念フレームワーク」における負債の定義を充足するか，説明しなさい。"},
   {id:"z5-17",name:"概念フレームワークにおける株主資本の定義",imp:"A",q:"討議資料「財務会計の概念フレームワーク」において株主資本はどのように定義されているか述べなさい。"},
   {id:"z5-18",name:"株主資本が株主に帰属する部分に限定される理由",imp:"B",q:"株主資本が報告主体の所有者である株主に帰属する部分に限定される理由を説明しなさい。"},
   {id:"z5-20",name:"利益の測定にとっての基本的な制約（純利益・包括利益との関係）",imp:"A",q:"討議資料「財務会計の概念フレームワーク」において示されている，利益の測定にとっての基本的な制約について説明しなさい。なお，純利益及び包括利益と当該制約との関係についても言及すること。"},
   {id:"z5-22",name:"その他の包括利益のリサイクリング（純利益の性質・クリーンサープラス関係等）",imp:"A",q:"その他の包括利益のリサイクリングについては，①リサイクリングをしない方法と②リサイクリングをする方法がある。それぞれの意義を述べるとともに，特徴を純利益の性質，クリーン・サープラス関係，一致の原則の成否及び包括利益の二重計上の観点から説明しなさい。"},
   {id:"z5-23",name:"財務諸表の構成要素の定義充足後に認識対象となるための２つの制約条件",imp:"A",q:"討議資料「財務会計の概念フレームワーク」によれば，財務諸表の構成要素の定義を充足した各種項目が財務諸表上での認識対象となるためには，２つの制約条件を満たすことが求められるが，その内容と必要とされる理由を説明しなさい。"},
   {id:"z5-24",name:"未償却原価による測定値の意味",imp:"B",q:"未償却原価による測定値の意味を説明しなさい。"},
   {id:"z5-25",name:"有形固定資産は原価評価・売買目的有価証券は時価評価される理由",imp:"A",q:"有形固定資産は原価評価されるのに対し，売買目的有価証券は時価評価される。このように，評価基準が異なる理由を説明しなさい。"},
   {id:"z5-26",name:"リスクを調整した割引率による割引価値の意味と問題点",imp:"B",q:"負債の測定値のうち，リスクを調整した割引率による割引価値の意味を説明するとともに，この測定値で負債を測定する場合の問題点を説明しなさい。"},
   {id:"z5-27",name:"投資のリスクからの解放概念に基づく投資の成果の認識時点",imp:"B",q:"投資のリスクからの解放概念に基づく投資の成果の認識時点について，事業投資と金融投資に分けて説明しなさい。"},
  ]},
 {ch:"第６章", chName:"純資産", items:[
   {id:"z6-1",name:"資本の部から純資産の部への変更の特徴と期待される効果",imp:"B",q:"「貸借対照表の純資産の部の表示に関する会計基準」の公表により，「資産の部」「負債の部」「資本の部」とされていた貸借対照表の区分が，「資産の部」「負債の部」「純資産の部」に変更された。従来の「資本の部」と変更後の「純資産の部」の特徴を述べるとともに，変更により期待される効果について説明しなさい。"},
   {id:"z6-2",name:"「資本の部」という表記を「純資産の部」に代えた理由",imp:"B",q:"「貸借対照表の純資産の部の表示に関する会計基準」が，これまでの「資本の部」という表記を「純資産の部」に代えた理由を説明しなさい。"},
   {id:"z6-3",name:"純資産の部に変更された項目３つと変更前後の取扱いの理由",imp:"A",q:"「貸借対照表の純資産の部の表示に関する会計基準」の公表により，表示区分が純資産の部に変更された項目を３つ挙げ，変更前の取扱いとその理由及び変更された理由を説明しなさい。"},
   {id:"z6-4",name:"株主資本と株主資本以外の各項目への区分の観点",imp:"B",q:"純資産の部はいかなる観点から株主資本と株主資本以外の各項目に区分されるか，『貸借対照表の純資産の部の表示に関する会計基準』が「株主資本」という名称を用いた理由に触れつつ説明しなさい。"},
   {id:"z6-5",name:"純資産の部を株主資本と株主資本以外の各項目に区分する理由",imp:"A",q:"純資産の部を株主資本と株主資本以外の各項目に区分する理由を説明しなさい。"},
   {id:"z6-6",name:"純資産を株主資本とそれ以外に区分した結果の損益計算書と貸借対照表の関係",imp:"A",q:"純資産の部を株主資本と株主資本以外の各項目に区分した結果，損益計算書と貸借対照表の関係はどのようになったか説明しなさい。"},
   {id:"z6-10",name:"評価・換算差額等を純資産の部に株主資本とは区別して記載する理由",imp:"A",q:"貸借対照表において評価・換算差額等を純資産の部に株主資本とは区別して記載する理由について説明しなさい。"},
   {id:"z6-11",name:"評価・換算差額等を株主資本とは区別して記載する理由（株主資本の特徴を踏まえて）",imp:"A",q:"貸借対照表において評価・換算差額等を株主資本とは区別して記載する理由について，株主資本を構成する項目の特徴を踏まえて説明しなさい。"},
   {id:"z6-12",name:"新株予約権を純資産の部に株主資本とは区別して記載する理由",imp:"A",q:"貸借対照表において新株予約権を純資産の部に株主資本とは区別して記載する理由を説明しなさい。"},
   {id:"z6-14",name:"非支配株主持分を純資産の部に株主資本とは区別して記載する理由",imp:"B",q:"連結貸借対照表において非支配株主持分を純資産の部に株主資本とは区別して記載する理由を説明しなさい。"},
   {id:"z6-15",name:"連結貸借対照表上，株主資本以外の項目の３つの区分の観点",imp:"B",q:"連結貸借対照表上，株主資本以外の項目は３つに区分される。これらの区分はどのような観点から行われているか，説明しなさい。"},
   {id:"z6-19",name:"資本剰余金の各項目と利益剰余金の各項目を混同してはならない理由",imp:"A",q:"資本剰余金の各項目と利益剰余金の各項目を混同してはならない理由を説明しなさい。"},
   {id:"z6-20",name:"利益剰余金が負の残高のときその他資本剰余金で補てんする会計処理は混同に該当するか",imp:"B",q:"利益剰余金が負の残高のときにその他資本剰余金で補てんする会計処理は資本剰余金と利益剰余金の混同に該当するか，理由とともに説明しなさい。"},
   {id:"z6-21",name:"その他資本剰余金による補てんの対象となる利益剰余金が年度決算時の負の残高に限られる理由",imp:"B",q:"制度会計上，その他資本剰余金による補てんの対象となる利益剰余金は，年度決算時の負の残高に限られる。その理由を説明しなさい。"},
   {id:"z6-22",name:"自己株式の会計上の性格（資産説・資本の控除説）",imp:"A",q:"自己株式の会計上の性格について，①資産として扱う考え方と②資本の控除として扱う考え方の，それぞれの論拠を説明しなさい。"},
   {id:"z6-23",name:"自己株式を無償取得した場合の２つの方法の論拠と制度会計上の取扱い",imp:"A",q:"自己株式を無償取得した場合，①自己株式を時価で測定する方法と②自己株式の数のみの増加として処理する方法の，それぞれの論拠を説明しなさい。また，制度会計上いずれの方法が採用されているか，その理由とともに説明しなさい。"},
   {id:"z6-24",name:"自己株式を純資産の部の株主資本の控除とする場合の会計処理の２つの方法",imp:"B",q:"自己株式を純資産の部の株主資本の控除とする場合の会計処理について，①取得原価で一括して株主資本全体の控除項目とする方法と②株主資本の構成要素に配分して直接減額する方法の，それぞれの論拠及び背後にある考え方を説明しなさい。"},
   {id:"z6-25",name:"自己株式処分差益を資本剰余金として処理する理由",imp:"A",q:"自己株式処分差益を資本剰余金として処理する理由を説明しなさい。"},
   {id:"z6-26",name:"自己株式処分差損の取扱いの２つの考え方と制度会計上の採用理由",imp:"A",q:"自己株式処分差損の取扱いについて，２つの考え方を説明するとともに，制度会計上いずれの考え方が採用されているか，理由とともに説明しなさい。"},
   {id:"z6-29",name:"自己株式の会計上の性格を資本の控除とみる場合の付随費用の取扱い",imp:"A",q:"自己株式の会計上の性格を資本の控除とみる場合，自己株式の取得，処分及び消却に関する付随費用については，①損益計算書に計上する考え方と②取得に要した費用は取得価額に含め，処分及び消却に要した費用は自己株式処分差額等の調整とする考え方がある。それぞれの考え方における付随費用の性格を述べるとともに，その論拠を説明しなさい。また，制度会計上いずれの考え方が採用されているか，その理由とともに説明しなさい。"},
   {id:"z6-30",name:"株式交付費を資本から直接控除する方法ではなく費用処理する理由",imp:"B"},
   {id:"z6-31",name:"自己新株予約権の会計上の性格",imp:"B",q:"自己新株予約権の会計上の性格について，簡潔に説明しなさい。"},
   {id:"z6-33",name:"自己新株予約権を純資産の部の新株予約権から控除して表示する理由",imp:"B",q:"貸借対照表において自己新株予約権を純資産の部の新株予約権から控除して表示する理由を説明しなさい。"},
   {id:"z6-34",name:"その他資本剰余金の残高が負になった場合の処理の理由",imp:"A",q:"制度会計上，その他資本剰余金の残高が負の値になった場合，その他資本剰余金を負の残高にはせず，その他資本剰余金を零とし，当該負の値をその他利益剰余金から減額する処理が行われる。その理由を説明しなさい。"},
   {id:"z6-35",name:"その他資本剰余金の負の値の補てんを会計期間末においてする方法が採用される理由",imp:"B",q:"制度会計上，その他資本剰余金の残高が負の値になった場合のその他利益剰余金による補てんは，負の値となったその他資本剰余金をその都度補てんする方法ではなく，会計期間末において補てんする方法が採用されている。その理由を説明しなさい。"},

 {ch:"第10章", chName:"固定資産の減損", items:[
   {id:"z10-1",name:"事業用の固定資産を取得原価から減価償却累計額等を控除した金額で評価する理由",imp:"B",q:"事業用の固定資産は取得原価から減価償却累計額等を控除した金額で評価され，損益計算においては，そのような資産評価に基づく実現利益が計上される。その理由を説明しなさい。"},
   {id:"z10-2",name:"固定資産の減損とは何か・減損処理の本質",imp:"A",q:"固定資産の減損とは，（Ａ）状態であり，減損処理とは，そのような場合に，（Ｂ）する会計処理である。上記の空欄Ａ及び空欄Ｂに当てはまる文章を示すとともに，固定資産の減損処理の本質について説明しなさい。"},
   {id:"z10-3",name:"固定資産の減損処理と金融商品の時価評価との特徴の比較",imp:"A",q:"固定資産の減損処理は金融商品に適用されている時価評価と比較してどのような特徴を有しているか，説明しなさい。"},
   {id:"z10-4",name:"「期末の帳簿価額を将来の回収可能性に照らして見直すだけでは減損損失を正しく認識できない」という指摘の意味",imp:"B",q:"固定資産の減損処理に関して，「期末の帳簿価額を将来の回収可能性に照らして見直すだけでは，収益性の低下による減損損失を正しく認識することはできない」との指摘の意味を説明しなさい。"},
   {id:"z10-5",name:"減損処理と臨時償却の共通点と相違点",imp:"B",q:"減損処理と臨時償却の共通点と相違点を説明しなさい。"},
   {id:"z10-6",name:"資産のグルーピングを概ね独立したキャッシュ・フローを生み出す最小の単位で行う理由",imp:"B",q:"資産のグルーピングを，他の資産または資産グループのキャッシュ・フローから概ね独立したキャッシュ・フローを生み出す最小の単位で行う理由を説明しなさい。"},
   {id:"z10-7",name:"減損の兆候がある資産・資産グループについて減損損失を認識するかどうかの判定を行う理由",imp:"B",q:"すべての資産または資産グループではなく，減損の兆候がある資産または資産グループについて減損損失を認識するかどうかの判定を行うこととした理由を説明しなさい。"},
   {id:"z10-8",name:"減損損失を認識するかどうかの判定にあたって割引前将来キャッシュ・フローの総額と比較する理由",imp:"A",q:"制度会計上，減損損失を認識するかどうかの判定にあたって，帳簿価額と比較されるのは割引前将来キャッシュ・フローの総額とされている。その理由を説明しなさい。"},
   {id:"z10-9",name:"割引前将来キャッシュ・フローの見積期間が制限されている理由",imp:"B",q:"制度会計上，減損損失を認識するかどうかを判定するために見積られる割引前将来キャッシュ・フローについては，その見積期間が制限されている。その理由を説明しなさい。"},
   {id:"z10-10",name:"減損損失の測定にあたり正味売却価額と使用価値のいずれか高い方を回収可能価額とする理由",imp:"A",q:"減損損失の測定にあたり，正味売却価額と使用価値のいずれか高い方を回収可能価額とする理由を説明しなさい。"},
   {id:"z10-11",name:"回収可能価額の算定にあたって現在時点の正味売却価額を算定する必要はないとされる理由",imp:"B",q:"回収可能価額の算定にあたっては，必ずしも現在時点の正味売却価額を算定する必要はないとされている。その理由を説明しなさい。"},
   {id:"z10-12",name:"帳簿価額を時価まで減額すべきとする見解（投資の継続性の観点）",imp:"B",q:"減損損失を認識すべきであると判定された資産または資産グループについて，帳簿価額を時価まで減額すべきとする見解がある。この考え方を投資の継続性の観点から説明しなさい。"},
   {id:"z10-13",name:"将来キャッシュ・フローを企業に固有の事情を反映した仮定及び予測に基づいて見積る理由",imp:"B",q:"将来キャッシュ・フローを，企業に固有の事情を反映した合理的で説明可能な仮定及び予測に基づいて見積る理由を説明しなさい。"},
   {id:"z10-16",name:"資産除去債務が負債に計上されている場合に除去費用部分を将来キャッシュ・フローに含めない理由",imp:"B",q:"資産除去債務が負債に計上されている場合には，将来キャッシュ・フローの見積りに除去費用部分を含めない理由を説明しなさい。"},
   {id:"z10-20",name:"より大きな単位でグルーピングを行う方法を採用した場合にのれんを加えることによる減損損失の増加額をのれんに配分する理由",imp:"B",q:"より大きな単位でグルーピングを行う方法を採用した場合，のれんを加えることによって算定される減損損失の増加額は，原則として，のれんに配分する。その理由を説明しなさい。"},
   {id:"z10-21",name:"減損処理を行った資産についても減損損失を控除した帳簿価額に基づき減価償却を行う理由",imp:"B",q:"制度会計上，減損処理を行った資産についても，減損損失を控除した帳簿価額に基づき減価償却を行う。その理由を説明しなさい。"},
   {id:"z10-22",name:"減損損失の戻入は行われない理由２つ",imp:"A",q:"制度会計上，減損損失の戻入は行われない。その理由を２つ挙げなさい。"},
  ]},
 {ch:"第11章", chName:"棚卸資産", items:[
   {id:"z11-2",name:"仕入割引の会計処理（営業外収益とする方法・送状価額から控除する方法）",imp:"A",q:"仕入割引の会計処理について，①営業外収益とする方法と②送状価額から控除する方法の，それぞれの論拠及び背後にある考え方を説明しなさい。"},
   {id:"z11-7",name:"後入先出法の長所及び短所",imp:"B",q:"後入先出法の長所及び短所をそれぞれ説明しなさい。"},
   {id:"z11-8",name:"棚卸資産の評価に関する会計基準において後入先出法が認められなくなった理由",imp:"B",q:"「棚卸資産の評価に関する会計基準」において後入先出法が認められなくなった理由について，損益計算の側面から説明しなさい。"},
   {id:"z11-9",name:"原価法が原則的な評価基準とされていた理由と低価法を容認する理由",imp:"A",q:"「棚卸資産の評価に関する会計基準」の公表前は，原価法が棚卸資産の原則的な評価基準とされており，低価法は例外的に認められる評価基準とされていた。①原価法が原則的な評価基準とされていた理由及び②低価法を採用することが容認されていた理由をそれぞれ説明しなさい。"},
   {id:"z11-10",name:"通常の販売目的で保有する棚卸資産の収益性が低下した場合における簿価切下げの考え方",imp:"A",q:"通常の販売目的で保有する棚卸資産の収益性が低下した場合における簿価切下げの考え方を説明しなさい。"},
   {id:"z11-11",name:"期末における正味売却価額が取得原価より下落している場合の２つの見解",imp:"A",q:"通常の販売目的で保有する棚卸資産について，期末における正味売却価額が取得原価よりも下落している場合に，①取得原価をもって貸借対照表価額とする見解と②正味売却価額をもって貸借対照表価額とする見解がある。それぞれの見解では取得原価基準の本質をどのようにみているか述べなさい。"},
   {id:"z11-12",name:"収益性の低下の判断基準が正味売却価額と帳簿価額との比較とされる理由",imp:"A",q:"通常の販売目的で保有する棚卸資産について，収益性の低下の判断基準が正味売却価額と帳簿価額との比較とされる理由を説明しなさい。"},
   {id:"z11-13",name:"品質低下または陳腐化に起因する簿価切下げとそれ以外の簿価切下げの取扱いに差を設けていない理由",imp:"B",q:"制度会計上，品質低下または陳腐化に起因する簿価切下げとそれ以外に起因する簿価切下げは，取扱いに差異を設けていない。その理由を説明しなさい。"},
   {id:"z11-14",name:"正味売却価額に将来販売時点と期末時点の両方が含まれる理由",imp:"B",q:"制度会計上，通常の販売目的で保有する棚卸資産は，取得原価をもって貸借対照表価額とするが，期末における正味売却価額が取得原価よりも下落している場合には，当該正味売却価額をもって貸借対照表価額とすることとされている。この「期末における正味売却価額」には，「将来販売時点の正味売却価額」と「期末時点の正味売却価額」のいずれも含まれるが，その理由を説明しなさい。"},
   {id:"z11-15",name:"前期に計上した簿価切下額の戻入れの洗替え法と切放し法それぞれの論拠",imp:"B",q:"制度会計上，前期に計上した簿価切下額の戻入れに関しては，①洗替え法と②切放し法のいずれかの方法を選択適用できる。それぞれの方法の論拠を説明しなさい。"},
  ]},
 {ch:"第12章", chName:"資産除去債務", items:[
   {id:"z12-2",name:"資産除去債務の会計処理として引当金処理ではなく資産負債の両建処理が採用されている理由２つ",imp:"A",q:"制度会計上，資産除去債務の会計処理として，引当金処理ではなく資産負債の両建処理が採用されている。その理由を２つ挙げなさい。"},
   {id:"z12-3",name:"資産除去債務の負債計上に否定的な見解（概念フレームワークの認識規準）",imp:"B",q:"資産除去債務の負債計上に否定的な見解について，討議資料「財務会計の概念フレームワーク」における認識規準にしたがって説明しなさい。"},
   {id:"z12-4",name:"資産除去債務の測定値として自己の支出見積りを用いる理由２つ",imp:"B",q:"資産除去債務の測定値として自己の支出見積りを用いる理由を２つ挙げなさい。"},
   {id:"z12-5",name:"資産除去債務の算定に際し無リスクの割引率を用いる理由３つ",imp:"A",q:"資産除去債務の算定に際し無リスクの割引率を用いる理由を３つ挙げなさい。"},
   {id:"z12-7",name:"資産除去債務に対応する除去費用を別の資産として計上する方法が採用されなかった理由",imp:"B",q:"制度会計上，資産除去債務に対応する除去費用を資産計上する方法について，資産除去債務に関連する有形固定資産とは区別して把握し，別の資産として計上する方法が採用されなかった理由を説明しなさい。"},
   {id:"z12-8",name:"関連する有形固定資産の帳簿価額を増加させる方法が採用されている理由",imp:"B",q:"制度会計上，資産除去債務に対応する除去費用を資産計上する方法について，関連する有形固定資産の帳簿価額を増加させる方法が採用されている理由を説明しなさい。"},
   {id:"z12-11",name:"時の経過による資産除去債務の調整額の算定に当初負債計上時の割引率を固定する理由２つ",imp:"B",q:"時の経過による資産除去債務の調整額は，期首の負債の帳簿価額に当初負債計上時の割引率を乗じて算定する。このように，割引率を負債計上時の割引率に固定する理由を２つ挙げなさい。"},
   {id:"z12-12",name:"時の経過による調整額の営業外費用計上説と対象固定資産の減価償却費と同区分説の論拠",imp:"A",q:"時の経過による資産除去債務の調整額について，①営業外費用として計上すべきとする見解と②対象となる有形固定資産の減価償却費と同じ区分に含めて計上すべきとする見解の，それぞれの論拠を説明しなさい。"},
   {id:"z12-13",name:"資産除去債務の履行時に生じる決済差額の計上区分の理由",imp:"A",q:"資産除去債務の履行時に生じる決済差額について，資産除去債務に対応する除去費用に係る費用配分額と同じ区分に含めて計上する理由を説明しなさい。"},
  ]},
 {ch:"第13章", chName:"リース", items:[
   {id:"z13-1",name:"ファイナンス・リース取引について通常の売買取引に係る方法に準じて会計処理を行う背景にある考え方",imp:"A",q:"「リース取引に関する会計基準」では，ファイナンス・リース取引について，通常の売買取引に係る方法に準じて会計処理を行う。この会計処理の背景にある考え方を説明しなさい。"},
   {id:"z13-2",name:"「リース取引に関する会計基準」の２区分モデルと「リースに関する会計基準」の単一モデルの比較",imp:"A",q:"「リース取引に関する会計基準」が採用する２区分の会計処理モデルと，「リースに関する会計基準」が採用する単一の会計処理モデルのそれぞれについて，考え方を対比しつつ借手の会計処理を説明しなさい。"},
   {id:"z13-3",name:"「リース取引に関する会計基準」の２区分の会計処理モデルの問題点",imp:"A",q:"「リース取引に関する会計基準」は，リースをファイナンス・リースとオペレーティング・リースに分類して，それぞれ異なる会計処理を適用する２区分の会計処理モデルを採用している。このモデルの問題点を指摘しなさい。"},
   {id:"z13-4",name:"「リースに関する会計基準」の単一の会計処理モデルの長所",imp:"A",q:"「リースに関する会計基準」は，借手のすべてのリースについて資産及び負債を計上する単一の会計処理モデルを採用している。このモデルの長所を挙げなさい。"},
   {id:"z13-6",name:"所有権移転外ファイナンス・リースの借手におけるリース資産及びリース債務の計上額の基礎",imp:"B",q:"「リース取引に関する会計基準」によれば，所有権移転外ファイナンス・リースの借手におけるリース資産及びリース債務の計上額について，リース料総額の割引現在価値と貸手の購入価額または借手の見積現金購入価額を基礎とする。基礎とする理由をそれぞれ説明しなさい。"},
   {id:"z13-7",name:"借手の資産及び負債の測定にあたり「リース取引に関する会計基準」と「リースに関する会計基準」の相違",imp:"A",q:"リースの借手において計上する資産及び負債の測定にあたり，「リース取引に関する会計基準」では，貸手の購入価額（または借手の見積現金購入価額）を考慮するが，「リースに関する会計基準」では，これを考慮しない。それぞれの理由を説明しなさい。"},
   {id:"z13-8",name:"所有権移転外ファイナンス・リースの借手においてリース物件の価値の側面を考慮することの問題点",imp:"B",q:"「リース取引に関する会計基準」によれば，所有権移転外ファイナンス・リースの借手において，リース資産及びリース債務の計上額についてリース物件の価値の側面を考慮するが，この問題点を指摘しなさい。"},
   {id:"z13-9",name:"「リース取引に関する会計基準」と「リースに関する会計基準」における借手のリースの費用配分",imp:"B",q:"「リース取引に関する会計基準」と「リースに関する会計基準」のそれぞれについて，借手のリースの費用配分がどのように行われるか説明しなさい。"},
   {id:"z13-10",name:"土地のリースが所有権移転外ファイナンス・リースに該当することはない理由",imp:"B",q:"土地のリースは，所有権移転外ファイナンス・リースに該当することはない。その理由を説明しなさい。"},
   {id:"z13-12",name:"ファイナンス・リースの貸手において計上される資産の性格が所有権移転と移転外で異なる理由",imp:"B",q:"ファイナンス・リースの貸手において計上される資産の性格が，所有権移転ファイナンス・リース（リース債権）と所有権移転外ファイナンス・リース（リース投資資産）で異なる理由を説明しなさい。"},
   {id:"z13-13",name:"「リース取引に関する会計基準」における貸手の会計処理の①と②の方法と収益認識基準との不整合",imp:"B",q:"「リース取引に関する会計基準」は，貸手の会計処理について，取引実態に応じ，次のいずれかの方法を選択して継続適用することとしている。①リース取引開始日に売上高と売上原価を計上する方法②リース料受取時に売上高と売上原価を計上する方法③売上高を計上せずに利息相当額を各期へ配分する方法このうち，①と②の方法は，「収益認識に関する会計基準」との不整合が指摘される。どのような点が整合していないのか，それぞれ説明しなさい。"},
   {id:"z13-14",name:"セール・アンド・リースバック取引の①金融取引として処理する方法と②資産の譲渡とリースに分けて処理する方法",imp:"A",q:"セール・アンド・リースバック取引については，①金融取引として会計処理する方法と，②資産の譲渡とリースに分けて会計処理する方法が考えられる。それぞれの考え方と，その会計処理が適合するケースについて説明しなさい。"},
   {id:"z13-15",name:"「リース取引に関する会計基準」によるセール・アンド・リースバックでファイナンス・リースに該当する場合の売却損益の繰延処理の理由",imp:"A",q:"「リース取引に関する会計基準」によれば，セール・アンド・リースバック取引におけるリースがファイナンス・リースに該当する場合，売手である借手は，リースの対象となる物件の売却に伴う損益を繰延処理する。その理由を説明しなさい。"},
  ]},
 {ch:"第14章", chName:"研究開発とソフトウェア", items:[
   {id:"z14-1",name:"研究開発費をすべて発生時に費用処理する理由３つ",imp:"B",q:"研究開発費をすべて発生時に費用処理する理由を３つ挙げなさい。"},
   {id:"z14-2",name:"社内開発費の取扱いとして一定の要件を満たす場合には資産計上を求めるべきという見解の論拠",imp:"B",q:"社内開発費の取扱いとして，一定の要件を満たす場合には資産計上を求めるべきという見解がある。この見解の論拠を説明しなさい。"},

 {ch:"第15章", chName:"収益認識", items:[
   {id:"z15-1",name:"収益認識基準の基本となる原則と製品を２年間の保守サービス付きで販売した場合の収益の認識手順",imp:"A",q:"「収益認識に関する会計基準」の基本となる原則を示すとともに，製品を２年間の保守サービス付きで顧客へ販売した場合における収益の認識の手順について説明しなさい。なお，製品と保守サービスは別個の履行義務であるものとする。"},
   {id:"z15-2",name:"製品Xを毎月初めに300個ずつ12か月にわたり合計3,600個を引渡す契約の契約変更の会計処理",imp:"B",q:"製造業を営む当社は，製品Ｘを毎月初めに300個ずつ12か月にわたり合計3,600個を引渡す契約を顧客と締結した。製品Ｘは通常，１個当たり80千円で販売しているため，総額288,000千円を契約上の対価とした。しかし，８か月が経過し2,400個を引渡した時点で，期間を６か月延長し1,800個の製品Ｘを追加で引渡すことを顧客から依頼されたため，これを受諾し契約変更を行った。この際，追加の1,800個については独立販売価格よりも低い１個当たり50千円で販売することとしたため，契約上の対価を378,000千円に変更した。当社はこの契約変更をどのように会計処理すべきか説明しなさい。"},
   {id:"z15-3",name:"製品の販売とともに製品保証を提供する契約において受取った代金全額を製品の販売時に収益に計上した会計処理の妥当性",imp:"A",q:"製造業を営む当社は，製品の販売とともに製品保証を提供する契約を顧客と締結し，受取った代金の全額を製品の販売時に収益に計上した。この会計処理の妥当性について説明しなさい。なお，製品保証の内容は次のとおりであり，製品保証の期間及び内容に基づき，延長保証を保証サービスと判断した。・製品保証には次に示す基本保証と延長保証が含まれている。基本保証：購入日から１年間にわたり製品が合意された仕様に従って機能することの保証延長保証：基本保証終了後２年間にわたり製品の全ての欠陥について修理または交換を行うことの保証・通常，延長保証を付けずに製品を独立して販売しており，また，延長保証も別個に販売している。"},
   {id:"z15-4",name:"販売額の１％をポイントとして顧客に付与している場合の取引価格全額を売上高に計上しポイント引当金を計上した会計処理の妥当性",imp:"A",q:"小売業を営む当社は，販売額の１％をポイントとして顧客に付与している。このポイントは，次回購入時に１ポイントにつき１円として購入代金に充てることができる。なお，当社のポイントは，契約を締結しなければ顧客が受取れない重要な権利を顧客に提供するものである。当社は顧客へ商品を販売した際，取引価格の全額を売上高に計上するとともに，将来のポイントの使用に備えてポイント引当金を計上したが，この会計処理の妥当性について説明しなさい。"},
   {id:"z15-5",name:"顧客への財またはサービスの提供に他の当事者が関与している場合に企業が代理人に該当する状況と会計処理",imp:"A",q:"顧客への財またはサービスの提供に他の当事者が関与している場合において，企業が代理人に該当する状況について述べるとともに，その会計処理を説明しなさい。"},
   {id:"z15-6",name:"小売業を営む当社が仕入先より商品を仕入れ店舗に陳列し販売している取引の会計処理（消化仕入）",imp:"A",q:"小売業を営む当社は，仕入先より商品を仕入れ，店舗に陳列し，個人顧客に対し販売している。仕入先との契約は次のとおりであり，これに基づき，当社が行うべき会計処理について述べなさい。①当社は店舗への商品納品時には検収を行わず，店舗にある商品の法的所有権は仕入先が保有している。当該所有権は顧客への商品販売時に仕入先から当社に移転し，同時に顧客に移転する。②商品に関する保管管理責任及び商品に関するリスクは仕入先が有している。③当社は店舗に並べる商品の種類や価格帯等のマーチャンダイジングについて一定の関与を行うが，個々の消化仕入商品の品揃えや販売価格の決定権は仕入先にある。④当社は商品の販売代金を顧客から受取り，販売代金にあらかじめ定められた料率を乗じた金額について，仕入先に対する支払義務を負う。"},
   {id:"z15-7",name:"建設業においてA社の所有する土地上にA社のための建物を建設する契約の履行義務が一定の期間にわたり充足されるものと判断した理由",imp:"B",q:"建設業を営む当社は，顧客であるＡ社と，Ａ社の所有する土地上にＡ社のための建物を建設する契約を締結した。当社は，Ａ社が建設中の建物を支配しており，約束した財またはサービスの束を一定の期間にわたり充足される単一の履行義務として処理するものと判断した。当社の履行義務が一定の期間にわたり充足されるものであると判断した理由を説明しなさい。"},
   {id:"z15-8",name:"建設業においてA社のための建物を建設する契約で履行義務の充足に係る進捗度を合理的に見積ることができないと判断し収益の認識を行わなかった取扱いの妥当性",imp:"A",q:"建設業を営む当社は，顧客であるＡ社と，Ａ社の所有する土地上にＡ社のための建物を建設する契約を締結した。この契約は一定の期間にわたり充足される単一の履行義務に該当し，対価は500,000千円，工事期間は３年を予定しているが，当社が約束どおりに契約を履行できなかったこと以外の理由で，Ａ社が契約を解約する場合には，当社に生じた費用をＡ社が補償することが契約で定められている。当期に発生した原価は20,000千円であったが，契約締結後２ヶ月で到来した決算日の時点で工事仕様の細部が未定のまま工事が進行しているため，当社は履行義務の充足に係る進捗度を合理的に見積ることができないと判断し，収益の認識を行わなかった。この取扱いの妥当性を説明しなさい。"},
   {id:"z15-9",name:"商品の割賦販売について割賦基準・回収基準または回収期限到来基準を適用して収益を認識することは認められるか",imp:"A",q:"「収益認識に関する会計基準」では，商品の割賦販売について割賦基準（回収基準または回収期限到来基準）を適用して収益を認識することは認められるか，説明しなさい。"},
   {id:"z15-10",name:"製造業を営む当社がA社に製品を引き渡した時点で収益を認識している会計処理の妥当性（委託販売）",imp:"B",q:"製造業を営む当社は，製造した製品を消費者に販売するために，小売業者であるＡ社に製品を引き渡している。この取引では，Ａ社に製品を引き渡した時点でＡ社は当社へ対価を支払う義務はなく，Ａ社から当社への支払いはＡ社が製品を顧客へ販売した月の翌月に行われる。また，Ａ社に引き渡した製品を当社が第三者に販売するために，当社はＡ社に製品の返還を要求することができる。当社はＡ社に製品を引き渡した時点で収益を認識しているが，この会計処理の妥当性について説明しなさい。"},
   {id:"z15-11",name:"建設業において建物の完成がX２年３月31日より１日早まるごとに対価が増額される場合の取引価格決定上の留意点",imp:"B",q:"建設業を営む当社は，顧客仕様の建物を建設する契約を顧客と締結した。約束された対価は100,000千円であるが，建物の完成がＸ２年３月31日より１日早まるごとに対価が2,000千円増額される。この場合，取引価格を決定する上で留意すべき点を説明しなさい。"},
   {id:"z15-12",name:"建設業においてA社のための建物を建設する契約で割増金部分を取引価格に含めなかった取扱いの妥当性",imp:"B",q:"建設業を営む当社は，顧客であるＡ社と，Ａ社の所有する土地上にＡ社のための建物を建設する契約を締結した。この契約は一定の期間にわたり充足される単一の履行義務に該当し，対価は500,000千円であるが，36か月以内に完成した場合には50,000千円の割増金がＡ社から追加で支払われることとなっている。この契約に基づく建設工事は天候や規制上の承認等の影響を受けやすいが，当社は類似した契約についての経験が少ない。当社はこの契約における割増金部分を取引価格に含めなかったが，この取扱いの妥当性について説明しなさい。"},
   {id:"z15-14",name:"現金販売価格2,000千円の商品を24回分割払いで販売し総受取額2,400千円を売上収益に計上した処理の妥当性",imp:"B",q:"当社は現金販売価格2,000千円の商品を顧客へ販売し，直ちに引き渡したが，代金は100千円ずつ24回に分割して毎月末に支払いを受ける条件となっている。当社では商品の販売時に総受取額2,400千円を売上収益に計上したが，この処理の妥当性について説明しなさい。"},
   {id:"z15-15",name:"返品条件付販売における商品の販売時の会計処理",imp:"B",q:"小売業を営む当社は顧客に対し商品を現金販売しているが，この取引は返品条件付販売であり，顧客からの申し出があれば当初の売価により無条件で商品を引き取ることになっている。この取引について，商品の販売時に当社が行うべき会計処理を説明しなさい。なお，商品の回収コストには重要性がないと見積られており，また，返品された商品は利益が生じるように原価以上の販売価格で再販売可能である。"},
   {id:"z15-16",name:"工事損失引当金の会計処理の背景にある考え方",imp:"B",q:"工事契約について，工事損失が発生する可能性が高く，かつ，その金額を合理的に見積ることができる場合には，工事損失引当金を計上しなければならない。この会計処理の背景にある考え方を説明しなさい。"},
   {id:"z15-17",name:"有償支給取引の原則的な会計処理（買い戻す義務を負っている場合と負っていない場合）",imp:"B",q:"企業が，対価と交換に原材料等（以下「支給品」という）を外部に譲渡し，加工後に当該支給品を購入する取引がある（以下「有償支給取引」という）。有償支給取引の原則的な会計処理について，支給品を買い戻す義務を負っている場合と買い戻す義務を負っていない場合に分けて説明しなさい。"},
  ]},
 {ch:"第16章", chName:"連結財務諸表", items:[
   {id:"z16-0",name:"連結基礎概念の要点6つ",imp:"A"},
   {id:"z16-00",name:"連結基礎概念と現行会計処理の採用分類　9つ",imp:"A"},
   {id:"z16-1",name:"連結基礎概念の①親会社説と②経済的単一体説それぞれの考え方",imp:"A",q:"連結基礎概念には①親会社説と②経済的単一体説がある。それぞれの考え方を説明しなさい。"},
   {id:"z16-2",name:"連結貸借対照表における非支配株主持分の表示区分（①親会社説②経済的単一体説）",imp:"A",q:"連結貸借対照表における非支配株主持分の表示区分について，①親会社説と②経済的単一体説のそれぞれの立場から説明しなさい。"},
   {id:"z16-3",name:"連結損益計算書における非支配株主に帰属する当期純利益の表示方法（①親会社説②経済的単一体説）",imp:"A",q:"連結損益計算書における非支配株主に帰属する当期純利益の表示方法について，①親会社説と②経済的単一体説のそれぞれの立場から説明しなさい。"},
   {id:"z16-4",name:"平成25年改正前の「連結財務諸表に関する会計基準」が親会社説の考え方によっていた理由２つ",imp:"B",q:"平成25年の改正前の「連結財務諸表に関する会計基準」が，親会社説の考え方によっていた理由を２つ挙げなさい。"},
   {id:"z16-5",name:"平成25年改正後が親会社株主に帰属する当期純利益を区分して内訳表示または付記することとした理由２つ",imp:"B",q:"平成25年の改正後の「連結財務諸表に関する会計基準」が，親会社株主に帰属する当期純利益を区分して内訳表示または付記することとした理由を２つ挙げなさい。"},
   {id:"z16-6",name:"平成25年改正後が非支配株主持分を株主資本とは区別して表示することとした理由",imp:"A",q:"平成25年の改正後の「連結財務諸表に関する会計基準」が非支配株主持分を株主資本とは区別して表示することとした理由を説明しなさい。"},
   {id:"z16-7",name:"子会社の判定基準の①持株基準と②支配力基準の意義と特徴",imp:"A",q:"子会社の判定基準には①持株基準と②支配力基準がある。それぞれの意義と特徴を説明しなさい。"},
   {id:"z16-8",name:"子会社の判定基準として支配力基準が採用されている理由",imp:"A",q:"制度会計上，子会社の判定基準として支配力基準が採用されている理由を説明しなさい。"},
   {id:"z16-10",name:"P社はA社の議決権の45%を所有しているがA社がP社の子会社であると判定される理由２例",imp:"B",q:"Ｐ社はＡ社の議決権の45％を所有しているが，Ｐ社Ａ社間で取引は行われておらず，財務及び営業または事業の方針に影響を及ぼす契約等も存在しない。Ａ社がＰ社の子会社であると判定されるとすればどのような理由が考えられるか，２つ例を挙げなさい。"},
   {id:"z16-11",name:"共同支配の実態にある合弁会社に対し比例連結を採用することは認められるか",imp:"B",q:"制度会計上，共同支配の実態にある合弁会社に対し比例連結を採用することは認められるか，理由とともに説明しなさい。"},
   {id:"z16-12",name:"親会社及び子会社が採用する会計方針を原則として統一するものとされている理由",imp:"B",q:"親会社及び子会社が採用する会計方針は，同一環境下で行われた同一の性質の取引等について，原則として統一するものとされている。その理由を説明しなさい。"},
   {id:"z16-13",name:"親会社と各子会社の会計方針を画一的に統一することは求められていない理由",imp:"B",q:"同一環境下で行われた同一の性質の取引等について，親会社及び子会社が採用する会計方針は，原則として統一するものとされており，親会社と各子会社の会計方針を画一的に統一することは求められていない。その理由を説明しなさい。"},
   {id:"z16-14",name:"在外子会社の財務諸表がIFRSまたは米国会計基準に準拠して作成されている場合の修正が要請されている理由",imp:"A",q:"在外子会社の財務諸表が国際財務報告基準（ＩＦＲＳ）または米国会計基準に準拠して作成されている場合，それを連結決算手続上利用することができるものの，一部の項目については在外子会社の会計処理を修正することが求められている。この修正が要請されている理由を説明しなさい。"},
   {id:"z16-15",name:"我が国の会計基準に共通する考え方とは何か（在外子会社の会計処理修正）",imp:"A",q:"在外子会社の財務諸表が国際財務報告基準（ＩＦＲＳ）または米国会計基準に準拠して作成されている場合，それを連結決算手続上利用することができるものの，一部の項目については各会計基準に準拠した会計処理が，「我が国の会計基準に共通する考え方と乖離する」ものであることから，在外子会社の会計処理を修正することが求められている。この我が国の会計基準に共通する考え方とは何か，例示しなさい。"},
   {id:"z16-16",name:"子会社の資産及び負債の評価方法の①部分時価評価法と②全面時価評価法",imp:"A",q:"子会社の資産及び負債の評価方法には①部分時価評価法と②全面時価評価法がある。それぞれの考え方，時価評価方法及び整合する連結基礎概念を説明しなさい。"},
   {id:"z16-17",name:"子会社株式の取得が複数の取引により達成された場合の取得原価の算定方法の論拠（投資の継続性）",imp:"A",q:"子会社株式の取得が複数の取引により達成された場合，親会社の子会社に対する投資の金額については，①支配を獲得するに至った個々の取引ごとの原価の合計額とする方法と②支配獲得日の時価とする方法がある。それぞれの論拠を，投資の継続性の観点から説明しなさい。"},
   {id:"z16-18",name:"子会社の資本の範囲についての新株予約権を含める・含めない考え方の論拠",imp:"B",q:"子会社の資本の範囲については，①新株予約権を子会社の資本に含めるとする考え方と②新株予約権を子会社の資本に含めないとする考え方がある。それぞれの論拠を説明しなさい。"},
   {id:"z16-19",name:"連結財務諸表におけるのれんの計上範囲の①購入のれん方式と②全部のれん方式",imp:"B",q:"連結財務諸表におけるのれんの計上範囲については，①購入（買入）のれん方式と②全部のれん方式がある。それぞれの方式の論拠を説明しなさい。"},
   {id:"z16-20",name:"子会社に欠損が生じている場合の会計処理（連結基礎概念との関連）",imp:"B",q:"子会社に欠損が生じている場合の会計処理について，連結基礎概念と関連させて説明しなさい。"},
   {id:"z16-21",name:"子会社株式の追加取得及び一部売却の会計処理（連結基礎概念との関連）",imp:"A",q:"子会社株式の追加取得及び一部売却の会計処理については２つの考え方がある。これについて，連結基礎概念と関連させて説明しなさい。"},

const STORE_KEY = 'zaimu-riron';
let itemState = {}, chState = {}, appState = {rounds:[{label:'第1回', scope:null, deadline:null, startDate:null}], currentRound:0};
let kwState = {};
let timerState = {};
let showingWeakness = false;
let showingTraining = false;
let trainingThreshold = 50;

function load() {
  try {
    const i = localStorage.getItem(STORE_KEY + '-item');
    const c = localStorage.getItem(STORE_KEY + '-ch');
    const a = localStorage.getItem(STORE_KEY + '-app');
    const k = localStorage.getItem(STORE_KEY + '-kw');
    if (i) itemState = JSON.parse(i);
    if (c) chState = JSON.parse(c);
    if (a) appState = JSON.parse(a);
    if (k) kwState = JSON.parse(k);
    const tm = localStorage.getItem(STORE_KEY + '-timer');
    if (tm) timerState = JSON.parse(tm);
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem(STORE_KEY + '-item', JSON.stringify(itemState));
    localStorage.setItem(STORE_KEY + '-ch', JSON.stringify(chState));
    localStorage.setItem(STORE_KEY + '-app', JSON.stringify(appState));
    localStorage.setItem(STORE_KEY + '-kw', JSON.stringify(kwState));
    localStorage.setItem(STORE_KEY + '-timer', JSON.stringify(timerState));
  } catch(e) {}
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ── キーワード ── */
function getKeywords(id){return kwState[id]||[]}
function addKeyword(id,word){
  if(!word.trim())return;
  if(!kwState[id])kwState[id]=[];
  if(kwState[id].some(k=>k.word===word.trim()))return;
  kwState[id].push({word:word.trim(),results:[]});
  save();
}
function deleteKeyword(id,idx){
  if(!kwState[id])return;
  kwState[id].splice(idx,1);
  save();
}
function setKwResult(id,idx,result){
  if(!kwState[id]||!kwState[id][idx])return;
  const kw=kwState[id][idx];
  const round=curRound();
  const ex=kw.results.findIndex(r=>r.round===round);
  if(ex>=0){
    if(kw.results[ex].result===result)kw.results.splice(ex,1);
    else kw.results[ex]={round,result,date:today()};
  }else{
    kw.results.push({round,result,date:today()});
  }
  save();
}
function getKwResult(id,idx){
  const kws=kwState[id];if(!kws||!kws[idx])return null;
  const r=kws[idx].results.find(r=>r.round===curRound());
  return r?r.result:null;
}
function kwStats(id){
  const kws=kwState[id];if(!kws||!kws.length)return null;
  let ok=0,ng=0,none=0;
  kws.forEach(kw=>{const r=kw.results.find(r=>r.round===curRound());if(!r)none++;else if(r.result==='o')ok++;else ng++;});
  return{ok,ng,none,total:kws.length};
}

function buildKwSection(item){
  const kws=getKeywords(item.id);
  const stats=kwStats(item.id);
  let statsHTML='';
  if(stats){
    const p=[];
    if(stats.ok>0)p.push(`<span class="ks-ok">○${stats.ok}</span>`);
    if(stats.ng>0)p.push(`<span class="ks-ng">×${stats.ng}</span>`);
    if(stats.none>0)p.push(`<span>${stats.none}未</span>`);
    if(p.length)statsHTML=`<span class="kw-stats">${p.join(' ')}</span>`;
  }
  const kwListHTML=kws.map((kw,idx)=>{
    const res=getKwResult(item.id,idx);
    const rc=res==='o'?'kw-row kw-passed':res==='x'?'kw-row kw-failed':'kw-row';
    return `<div class="${rc}">
      <span class="kw-text">${escHtml(kw.word)}</span>
      <button class="kw-del" onclick="removeKw('${item.id}',${idx})">&#x2715;</button>
    </div>`;
  }).join('');
  return `<div id="kwwrap-${item.id}">
    <button class="kw-reveal-btn" id="kwreveal-${item.id}" onclick="toggleKwSection('${item.id}')">キーワード</button>
    <div class="kw-section" id="kwsec-${item.id}">
      <div class="kw-inner">
        ${kws.length?`<div class="kw-list">${kwListHTML}</div>`:''}
        <div class="kw-add-row" id="kwinput-${item.id}">
          <input class="kw-input" id="kwfield-${item.id}" type="text" placeholder="＋ キーワードを追加..." maxlength="30"
            oncompositionstart="_isComposing=true"
            oncompositionend="_isComposing=false"
            onkeydown="if(event.key==='Enter'&&!event.isComposing&&!_isComposing){event.preventDefault();commitKw('${item.id}')}">
          <button class="kw-add-confirm-btn" onclick="commitKw('${item.id}')">追加</button>
        </div>
        <button class="kw-close-btn" onclick="toggleKwSection('${item.id}')">閉じる</button>
      </div>
    </div>
  </div>`;
}

function refreshKwSection(id,keepOpen){
  const wrap=document.getElementById('kwwrap-'+id);
  if(!wrap)return;
  const wasOpen=wrap.querySelector('.kw-section')?.classList.contains('kw-open');
  const inputVisible=wrap.querySelector('.kw-add-row')?.style.display!=='none';
  const item=DATA.flatMap(c=>c.items).find(i=>i.id===id);
  if(!item)return;
  const tmp=document.createElement('div');
  tmp.innerHTML=buildKwSection(item);
  const newWrap=tmp.firstElementChild;
  wrap.replaceWith(newWrap);
  if(keepOpen&&wasOpen){
    newWrap.querySelector('.kw-section')?.classList.add('kw-open');
    const btn=newWrap.querySelector('.kw-reveal-btn');
    if(btn)btn.style.display='none';
  }
  if(inputVisible){
    const inp=newWrap.querySelector('.kw-add-row');
    if(inp)inp.style.display='flex';
  }
}

function toggleKwSection(id){
  const wrap=document.getElementById('kwwrap-'+id);
  if(!wrap)return;
  const btn=wrap.querySelector('.kw-reveal-btn');
  const sec=wrap.querySelector('.kw-section');
  if(!btn||!sec)return;
  const isOpen=sec.classList.contains('kw-open');
  if(isOpen){
    sec.classList.remove('kw-open');
    btn.style.display='';
    const f=wrap.querySelector('.kw-input');if(f)f.value='';
  }else{
    sec.classList.add('kw-open');
    btn.style.display='none';
  }
}

let _commitGuard=false;
let _isComposing=false;
function commitKw(id){
  if(_commitGuard||_isComposing)return;
  const f=document.getElementById('kwfield-'+id);if(!f)return;
  const w=f.value.trim();if(!w)return;
  _commitGuard=true;
  addKeyword(id,w);f.value='';
  refreshKwSection(id,true);
  setTimeout(()=>{_commitGuard=false;},300);
}
function removeKw(id,idx){deleteKeyword(id,idx);refreshKwSection(id,true)}

// ── SCROLL LOCK ──
let _scrollLockDepth = 0;
function _lockScroll() { if (++_scrollLockDepth === 1) document.body.style.overflow = 'hidden'; }
function _unlockScroll() { if (--_scrollLockDepth <= 0) { _scrollLockDepth = 0; document.body.style.overflow = ''; } }

/* ── キーワード評価ポップアップ ── */
let kwEvalItemId=null;
function openKwEvalPopup(id){
