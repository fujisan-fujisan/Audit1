function today() { return new Date().toISOString().split('T')[0]; }
function curRound() { return appState.currentRound; }
function curScope() { return (appState.rounds[curRound()] || {}).scope || 'all'; }
function curDeadline() { return (appState.rounds[curRound()] || {}).deadline || null; }

function itemInScope(item) {
  const scope = curScope();
  if (scope === 'all') return true;
  if (scope === 'A') return item.imp === 'A';
  if (scope === 'B') return item.imp === 'B';
  return true;
}

function scopedItems() { return DATA.flatMap(c => c.items).filter(itemInScope); }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr).getTime() - Date.now()) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const p = dateStr.split('-');
  if (p.length < 3) return dateStr;
  return `${parseInt(p[1])}月${parseInt(p[2])}日`;
}

function getItemR(id, round) {
  const r = round !== undefined ? round : curRound();
  return (itemState[id] || {})[r] || {};
}

function setItemR(id, data) {
  if (!itemState[id]) itemState[id] = {};
  itemState[id][curRound()] = data;
}

function getChR(key) { return (chState[String(key)] || {})[curRound()] || {}; }

function chKey(ch) {
  return ch.ch
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/[^0-9]/g, '');
}

function applyFilter() {
  DATA.forEach(ch => {
    const key = chKey(ch);
    const card = document.getElementById('chcard-' + key);
    if (!card) return;
    let anyVisible = false;
    ch.items.forEach(item => {
      const row = document.getElementById('irow-' + item.id);
      if (!row) return;
      if (!itemInScope(item)) { row.style.display = 'none'; return; }
      row.style.display = '';
      anyVisible = true;
    });
    card.classList.toggle('hidden', !anyVisible);
  });
}

// ── RENDER ──
function render() {
  // オーバーレイが残っていたら必ず閉じる
  _scrollLockDepth = 0; document.body.style.overflow = '';
  document.querySelectorAll('.overlay.open').forEach(el => el.classList.remove('open'));
  const ct = document.getElementById('content');
  ct.innerHTML = '';
  DATA.forEach(ch => {
    const el = buildChCard(ch);
    if (el) ct.appendChild(el);
  });
  renderRoundTabs();
  updateProgress();
  applyFilter();
  updateNextRoundBtn();
}

function buildChCard(ch) {
  const key = chKey(ch);
  const r = getChR(key);
  const scopedChItems = ch.items.filter(itemInScope);
  const total = scopedChItems.length;
  const done = scopedChItems.filter(i => getItemR(i.id).u).length;
  const isDone = done === total && total > 0;
  if (total === 0) return null;

  const card = document.createElement('div');
  card.className = 'ch-card';
  card.id = 'chcard-' + key;

  const hd = document.createElement('div');
  hd.className = 'ch-header';
  hd.onclick = () => {
    card.classList.toggle('open');
    const set = new Set(JSON.parse(localStorage.getItem('zaimu-riron-chopen') || '[]'));
    if (card.classList.contains('open')) set.add(key); else set.delete(key);
    localStorage.setItem('zaimu-riron-chopen', JSON.stringify([...set]));
  };
  hd.innerHTML = `
    <span class="ch-chevron">▶</span>
    <div class="ch-info">
      <div class="ch-name">${ch.ch}　${ch.chName}</div>
      <div class="ch-sub">A:${ch.items.filter(i=>i.imp==='A').length} B:${ch.items.filter(i=>i.imp==='B').length}</div>
    </div>
    <span class="ch-badge ${isDone ? 'done' : ''}" id="chprog-${key}">${done}/${total}</span>`;
  card.appendChild(hd);

  const iw = document.createElement('div');
  iw.className = 'items-wrap';
  ch.items.forEach(item => {
    if (!itemInScope(item)) return;
    iw.appendChild(buildItemRow(item));
  });
  card.appendChild(iw);

  const ft = document.createElement('div');
  ft.className = 'ch-footer';
  ft.id = 'chfoot-' + key;
  ft.innerHTML = buildChFooter(key, r);
  card.appendChild(ft);

  return card;
}

function buildChFooter(key, r) {
  let statHTML = '';
  if (r.date) statHTML += `<span class="ch-stat"><span class="ch-stat-lbl">実施日</span>${formatDate(r.date)}</span>`;
  if (r.time) statHTML += `<span class="ch-stat"><span class="ch-stat-lbl">所要時間</span>${r.time} 分</span>`;
  if (timerState[key]) {
    return `
      <div class="ch-footer-row">
        <span class="ch-timer-label">計測中...</span>
        <button class="ch-record-btn ch-end-btn" onclick="endTimer('${key}')">終了</button>
      </div>`;
  }
  return `
    <div class="ch-footer-row">
      ${statHTML}
      <button class="ch-record-btn" onclick="startTimer('${key}')">開始</button>
    </div>`;
}

function startTimer(key) {
  timerState[key] = Date.now();
  save();
  const foot = document.getElementById('chfoot-' + key);
  if (foot) foot.innerHTML = buildChFooter(key, (chState[key] || {})[curRound()] || {});
}

function endTimer(key) {
  const start = timerState[key];
  if (!start) return;
  const elapsedMins = Math.max(1, Math.round((Date.now() - start) / 60000));
  const dateVal = today();
  if (!chState[key]) chState[key] = {};
  chState[key][curRound()] = { date: dateVal, time: String(elapsedMins) };
  delete timerState[key];
  save();
  const foot = document.getElementById('chfoot-' + key);
  if (foot) foot.innerHTML = buildChFooter(key, chState[key][curRound()]);
}

function buildItemRow(item) {
  const r = getItemR(item.id);
  const u = r.u || null;
  const grayed = isGrayed(item.id);
  const skipNext = r.skipNext;

  const nrpHTML = `
    <div class="nrp" style="${u ? '' : 'display:none'}">
      <span class="nrp-label">次回</span>
      <button class="nrp-btn${skipNext === true ? ' nrp-skip' : ''}" onclick="setSkipNext('${item.id}')">スキップ</button>
    </div>`;

  const row = document.createElement('div');
  row.className = 'item-row' + (grayed ? ' item-skipped' : '');
  row.id = 'irow-' + item.id;
  row.innerHTML = `
    <div class="item-top">
      <span class="item-name"><span style="color:var(--text-3);font-family:'DM Mono',monospace;font-size:12px;margin-right:5px;">${item.id.replace('z','')}</span>${item.q?`<button class="q-btn" style="margin-right:6px;margin-left:0" onclick="event.stopPropagation();showQ('${item.id}')">問題文</button>`:''}${escHtml(item.name)}</span>
      <span class="imp-badge imp-${item.imp}">${item.imp}</span>
      ${grayed ? '<span class="skip-chip">SKIP</span>' : ''}
      <div class="u-btns">
        <button class="ub ${u==='oo'?'sel-oo':''}" onclick="setU('${item.id}','oo')">○○</button>
        <button class="ub ${u==='o' ?'sel-o' :''}" onclick="setU('${item.id}','o')" >○</button>
        <button class="ub ${u==='n' ?'sel-n' :''}" onclick="setU('${item.id}','n')" >ー</button>
        <button class="ub ${u==='x' ?'sel-x' :''}" onclick="setU('${item.id}','x')" >×</button>
        <button class="ub ${u==='xx'?'sel-xx':''}" onclick="setU('${item.id}','xx')">××</button>
      </div>
    </div>
    ${nrpHTML}`;
  return row;
}

// ── ROUND STATS ──
function getRoundStats(roundIdx) {
  let totalMins = 0;
  Object.keys(chState).forEach(key => {
    const rec = (chState[key] || {})[roundIdx];
    if (rec && rec.time) totalMins += parseInt(rec.time) || 0;
  });
  let lastDate = null;
  Object.keys(chState).forEach(key => {
    const rec = (chState[key] || {})[roundIdx];
    if (rec && rec.date) {
      if (!lastDate || rec.date > lastDate) lastDate = rec.date;
    }
  });
  const rd = appState.rounds[roundIdx] || {};
  let dayCount = null;
  if (rd.startDate && lastDate) {
    const d1 = new Date(rd.startDate);
    const d2 = new Date(lastDate);
    dayCount = Math.round((d2 - d1) / 86400000) + 1;
  }
  return { totalMins, dayCount };
}

function fmtTime(mins) {
  if (mins === 0) return null;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}時間${m > 0 ? m + '分' : ''}` : `${m}分`;
}

function renderRoundTabs() {
  const tabs = document.getElementById('round-tabs');
  tabs.innerHTML = '';
  appState.rounds.forEach((rd, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === curRound() ? ' active' : '');
    const scopeTag = rd.scope === 'A' ? '(A)' : rd.scope === 'B' ? '(B)' : '(全)';
    const stats = getRoundStats(i);
    const timePart = fmtTime(stats.totalMins);
    const dayPart = stats.dayCount !== null ? `${stats.dayCount}日` : null;
    const statStr = (dayPart || timePart) ? ' · ' + [dayPart, timePart].filter(Boolean).join(' ') : '';
    btn.textContent = (rd.label || `第${i+1}回`) + scopeTag + statStr;
    btn.onclick = () => switchRound(i);
    tabs.appendChild(btn);
  });
}

function switchRound(i) {
  appState.currentRound = i;
  save();
  render();
}

function updateProgress() {
  const items = scopedItems();
  const activeItems = items.filter(i => !isGrayed(i.id));
  const total = activeItems.length;
  const done = activeItems.filter(i => getItemR(i.id).u).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-lbl').textContent = `${done} / ${total} 完了`;
  document.getElementById('prog-bar').style.width = pct + '%';
  updateRoundInfoBar(pct);
}

function updateRoundInfoBar(pct) {
  const bar = document.getElementById('round-info-bar');
  if (!bar) return;
  const rd = appState.rounds[curRound()] || {};
  const scopeLabel = rd.scope === 'A' ? 'A のみ' : rd.scope === 'B' ? 'B のみ' : '全部';
  const dl = rd.deadline;
  const days = daysUntil(dl);
  const daysStr = days === null ? '未設定' : days < 0 ? `${Math.abs(days)}日超過` : `残り${days}日`;
  const daysClass = days === null ? '' : days <= 7 ? 'warn' : 'ok';

  const items = scopedItems();
  const activeItems = items.filter(i => !isGrayed(i.id));
  const remaining = activeItems.filter(i => !getItemR(i.id).u).length;
  let paceHTML = '';
  if (days !== null && days > 0) {
    const perDay = remaining / days;
    const basePace = rd.basePace || (activeItems.length / days);
    const ratio = perDay / basePace;
    const paceClass = ratio > 1.2 ? 'warn' : ratio > 1.0 ? '' : 'ok';
    const perDayStr = perDay >= 10 ? Math.round(perDay) + '問' : perDay.toFixed(1) + '問';
    const diff = perDay - basePace;
    const diffStr = diff > 0.05 ? '+' + diff.toFixed(1) + '問/日' : diff < -0.05 ? diff.toFixed(1) + '問/日' : '基準通り';
    const diffStyle = diff > 0.05 ? 'color:var(--x-color)' : diff < -0.05 ? 'color:var(--o-color)' : 'color:var(--text-3)';
    paceHTML = `<div class="ri-item"><span class="ri-lbl">1日ペース</span><span class="ri-val ${paceClass}">${perDayStr}<span style="font-size:10px;font-weight:500;margin-left:4px;${diffStyle}">(${diffStr})</span></span></div>`;
  } else if (days !== null && days <= 0) {
    paceHTML = `<div class="ri-item"><span class="ri-lbl">1日ペース</span><span class="ri-val warn">期限超過</span></div>`;
  }

  bar.innerHTML = `
    <div class="ri-item"><span class="ri-lbl">回</span><span class="ri-val">${rd.label || ''}</span></div>
    <div class="ri-item"><span class="ri-lbl">対象</span><button class="ri-deadline-btn" onclick="openScopeModal(curRound()===0)">${scopeLabel}</button></div>
    <div class="ri-item"><span class="ri-lbl">期限</span><button class="ri-deadline-btn" onclick="openDeadlineModal()">${dl ? formatDate(dl) : '未設定'}</button></div>
    <div class="ri-item"><span class="ri-lbl">残り</span><span class="ri-val ${daysClass}">${daysStr}</span></div>
    <div class="ri-item"><span class="ri-lbl">進捗</span><span class="ri-val">${pct}%</span></div>
    ${paceHTML}`;
}

function updateNextRoundBtn() {
  const items = scopedItems();
  const activeItems = items.filter(i => !isGrayed(i.id));
  const total = activeItems.length;
  const done = activeItems.filter(i => getItemR(i.id).u).length;
  const pct = total ? done / total * 100 : 0;
  document.getElementById('next-round-wrap').style.display = pct >= 70 ? 'block' : 'none';
}

function setU(itemId, type) {
  const r = getItemR(itemId);
  if (r.u === type) { r.u = null; r.date = null; }
  else { r.u = type; r.date = today(); }
  setItemR(itemId, r);
  save();
  refreshItem(itemId);
  refreshChProg(itemId);
  updateProgress();
  updateNextRoundBtn();
  // 採点した（解除でない）かつキーワードがあればポップアップ
  if(r.u && getKeywords(itemId).length > 0){
    openKwEvalPopup(itemId);
  }
}

// ── 次ラウンドスキップ ──
function isSkippedThisRound(itemId) {
  const prevRound = curRound() - 1;
  if (prevRound < 0) return false;
  return getItemR(itemId, prevRound).skipNext === true;
}

function isGrayed(itemId) {
  return isSkippedThisRound(itemId) && !getItemR(itemId).u;
}

function setSkipNext(itemId) {
  const r = getItemR(itemId);
  r.skipNext = r.skipNext === true ? null : true;
  setItemR(itemId, r);
  save();
  const row = document.getElementById('irow-' + itemId);
  if (!row) return;
  const nrp = row.querySelector('.nrp');
  if (!nrp) return;
  const skipBtn = nrp.querySelector('.nrp-btn');
  if (skipBtn) skipBtn.className = 'nrp-btn' + (r.skipNext === true ? ' nrp-skip' : '');
}

function refreshItem(itemId) {
  const r = getItemR(itemId);
  const row = document.getElementById('irow-' + itemId);
  if (!row) return;

  ['oo','o','n','x','xx'].forEach(t => {
    const btn = row.querySelector(`.ub[onclick*="'${t}'"]`);
    if (!btn) return;
    btn.classList.remove('sel-oo','sel-o','sel-n','sel-x','sel-xx');
    if (r.u === t) btn.classList.add('sel-' + t);
  });

  const nrp = row.querySelector('.nrp');
  if (nrp) {
    nrp.style.display = r.u ? '' : 'none';
    const skipBtn = nrp.querySelector('.nrp-btn');
    if (skipBtn) skipBtn.className = 'nrp-btn' + (r.skipNext === true ? ' nrp-skip' : '');
  }

  const grayed = isGrayed(itemId);
  row.classList.toggle('item-skipped', grayed);
  const skipChip = row.querySelector('.skip-chip');
  if (grayed && !skipChip) {
    const impBadge = row.querySelector('.imp-badge');
    if (impBadge) {
      const chip = document.createElement('span');
      chip.className = 'skip-chip';
      chip.textContent = 'SKIP';
      impBadge.insertAdjacentElement('afterend', chip);
    }
  } else if (!grayed && skipChip) {
    skipChip.remove();
  }
}

function refreshChProg(itemId) {
  const ch = DATA.find(c => c.items.find(i => i.id === itemId));
  if (!ch) return;
  const key = chKey(ch);
  const scoped = ch.items.filter(itemInScope);
  const total = scoped.length;
  const done = scoped.filter(i => getItemR(i.id).u).length;
  const isDone = done === total && total > 0;
  const el = document.getElementById('chprog-' + key);
  if (el) {
    el.textContent = `${done}/${total}`;
    el.className = 'ch-badge' + (isDone ? ' done' : '');
  }
}

// ── ページ切替 ──
function showPage(page, btn) {
  document.getElementById('kw-manage-view').style.display = 'none';
  document.getElementById('kw-manage-btn').classList.remove('active');
  showingKwManage = false;
  showingWeakness = page === 'history';
  showingTraining = page === 'training';
  document.getElementById('main-view').style.display = (showingWeakness || showingTraining) ? 'none' : 'block';
  document.getElementById('weakness-view').style.display = showingWeakness ? 'block' : 'none';
  document.getElementById('training-view').style.display = showingTraining ? 'block' : 'none';
  document.querySelectorAll('.vtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo(0, 0);
  if (showingWeakness) renderHistoryPage();
  if (showingTraining) renderTrainingPage();
}

let showingKwManage = false;

function toggleKwManagePage() {
  showingKwManage = !showingKwManage;
  document.getElementById('kw-manage-btn').classList.toggle('active', showingKwManage);
  if (showingKwManage) {
    document.getElementById('main-view').style.display = 'none';
    document.getElementById('weakness-view').style.display = 'none';
    document.getElementById('training-view').style.display = 'none';
    document.getElementById('kw-manage-view').style.display = 'block';
    window.scrollTo(0, 0);
    renderKwManagePage();
  } else {
    document.getElementById('kw-manage-view').style.display = 'none';
    document.getElementById('main-view').style.display = (showingWeakness || showingTraining) ? 'none' : 'block';
    document.getElementById('weakness-view').style.display = showingWeakness ? 'block' : 'none';
    document.getElementById('training-view').style.display = showingTraining ? 'block' : 'none';
    window.scrollTo(0, 0);
  }
}

let kwActiveChIdx = 0;

function renderKwManagePage() {
  const view = document.getElementById('kw-manage-view');
  const visibleChs = DATA.filter(ch => ch.items.filter(itemInScope).length > 0);
  if (kwActiveChIdx >= visibleChs.length) kwActiveChIdx = 0;

  // 章タブ（横スクロール）
  let html = `<div id="kw-ch-tabs" style="display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin:0 -14px;padding:0 14px;gap:0;">`;
  visibleChs.forEach((ch, idx) => {
    const active = idx === kwActiveChIdx;
    html += `<button onclick="selectKwCh(${idx})" style="flex-shrink:0;padding:9px 12px;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:transparent;border:none;border-bottom:2px solid ${active ? 'var(--text)' : 'transparent'};color:${active ? 'var(--text)' : 'var(--text-3)'};cursor:pointer;white-space:nowrap;transition:all .15s;">${ch.ch}</button>`;
  });
  html += `</div>`;

  html += `<div id="kw-ch-content">`;
  html += buildKwChContent(visibleChs[kwActiveChIdx]);
  html += `</div>`;

  view.innerHTML = html;

  // アクティブタブを中央付近にスクロール
  const tabBar = view.querySelector('#kw-ch-tabs');
  const activeBtn = tabBar?.querySelectorAll('button')[kwActiveChIdx];
  if (tabBar && activeBtn) {
    tabBar.scrollLeft = activeBtn.offsetLeft - tabBar.offsetWidth / 2 + activeBtn.offsetWidth / 2;
  }
}

function buildKwChContent(ch) {
  if (!ch) return '';
  const scopedChItems = ch.items.filter(itemInScope);
  let html = `<div style="font-size:10px;font-weight:700;color:var(--text-2);padding:10px 0 8px;letter-spacing:.06em;">${ch.ch}　${ch.chName}</div>`;
  scopedChItems.forEach(item => {
    const kws = getKeywords(item.id);
    html += `<div class="ch-card" style="margin-bottom:8px;">`;
    html += `<div style="padding:10px 14px;">`;
    html += `<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;">`;
    html += `<span class="imp-badge imp-${item.imp}">${item.imp}</span>`;
    html += `<span style="font-size:11px;color:var(--text);flex:1;line-height:1.5;">${item.q?`<button class="q-btn" style="margin-right:6px;margin-left:0" onclick="event.stopPropagation();showQ('${item.id}')">問題文</button>`:''}${escHtml(item.name)}</span>`;
    html += `</div>`;
    html += `<div id="kwmlist-${item.id}" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">${buildKwManageChips(item.id, kws)}</div>`;
    html += `<div style="display:flex;gap:6px;align-items:center;">`;
    html += `<input class="kw-input" id="kwfield-${item.id}" type="text" placeholder="＋ キーワードを追加..." maxlength="30" oncompositionstart="_isComposing=true" oncompositionend="_isComposing=false" onkeydown="if(event.key==='Enter'&&!event.isComposing&&!_isComposing){event.preventDefault();commitKwManage('${item.id}')}">`;
    html += `<button class="kw-add-confirm-btn" onclick="commitKwManage('${item.id}')">追加</button>`;
    html += `</div>`;
    html += `</div>`;
    html += `</div>`;
  });
  return html;
}

function selectKwCh(idx) {
  kwActiveChIdx = idx;
  const view = document.getElementById('kw-manage-view');

  // タブのアクティブスタイル更新
  view.querySelectorAll('#kw-ch-tabs button').forEach((btn, i) => {
    btn.style.borderBottomColor = i === idx ? 'var(--text)' : 'transparent';
    btn.style.color = i === idx ? 'var(--text)' : 'var(--text-3)';
  });

  // コンテンツ差し替え
  const visibleChs = DATA.filter(ch => ch.items.filter(itemInScope).length > 0);
  const contentEl = view.querySelector('#kw-ch-content');
  if (contentEl) contentEl.innerHTML = buildKwChContent(visibleChs[idx]);
}

function buildKwManageChips(id, kws) {
  if (!kws.length) return `<span style="font-size:10px;color:var(--text-3);">キーワードなし</span>`;
  return kws.map((kw, idx) =>
    `<div style="display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:3px 6px 3px 9px;font-size:11px;">
      <span style="color:var(--text);font-family:'Noto Sans JP',sans-serif;">${escHtml(kw.word)}</span>
      <button class="kw-del" onclick="removeKwManage('${id}',${idx})">&#x2715;</button>
    </div>`
  ).join('');
}

function commitKwManage(id) {
  const f = document.getElementById('kwfield-' + id);
  if (!f) return;
  const w = f.value.trim();
  if (!w) return;
  addKeyword(id, w);
  f.value = '';
  refreshKwManageItem(id);
}

function removeKwManage(id, idx) {
  deleteKeyword(id, idx);
  refreshKwManageItem(id);
}

function refreshKwManageItem(id) {
  const el = document.getElementById('kwmlist-' + id);
  if (!el) return;
  el.innerHTML = buildKwManageChips(id, getKeywords(id));
}

let histActiveChIdx = 0;

function renderHistoryPage() {
  const view = document.getElementById('weakness-view');
  const totalRounds = appState.rounds.length;
  const roundHeaders = Array.from({length: totalRounds}, (_, i) => {
    const rd = appState.rounds[i] || {};
    return rd.label || `第${i+1}回`;
  });
  const roundStats = roundHeaders.map((label, i) => {
    const stats = getRoundStats(i);
    const rd = appState.rounds[i] || {};
    const timePart = fmtTime(stats.totalMins);
    const dayPart = stats.dayCount !== null ? `${stats.dayCount}日` : null;
    const statStr = [dayPart, timePart].filter(Boolean).join(' / ');
    const scopeTag = rd.scope === 'A' ? 'A' : rd.scope === 'B' ? 'B' : '全';
    return { label, statStr, scopeTag };
  });

  // スコープ内の章だけ抽出
  const visibleChs = DATA.filter(ch => ch.items.filter(itemInScope).length > 0);
  if (histActiveChIdx >= visibleChs.length) histActiveChIdx = 0;

  // ── ラウンド情報 ──
  let html = `<div class="hist-page-header">
    <div class="hist-page-title">履歴一覧</div>
    <div class="hist-page-subtitle">問題ごとの回答履歴</div>
  </div>`;
  html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">`;
  roundStats.forEach(({label, statStr, scopeTag}, i) => {
    const isActive = i === curRound();
    html += `<div style="background:${isActive?'var(--text)':'var(--surface)'};color:${isActive?'#fff':'var(--text)'};border:1px solid ${isActive?'var(--text)':'var(--border)'};border-radius:var(--radius);padding:8px 12px;min-width:0;">
      <div style="font-size:10px;font-weight:700;font-family:'DM Mono',monospace;margin-bottom:3px;opacity:${isActive?'1':'0.7'}">${label}（${scopeTag}）</div>
      ${statStr?`<div style="font-size:11px;font-family:'DM Mono',monospace;">${statStr}</div>`:`<div style="font-size:10px;opacity:0.5;">記録なし</div>`}
    </div>`;
  });
  html += `</div>`;

  // ── 章タブ（横スクロール）──
  html += `<div id="hist-ch-tabs" style="display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin:0 -14px 0;padding:0 14px;gap:0;">`;
  visibleChs.forEach((ch, idx) => {
    const active = idx === histActiveChIdx;
    html += `<button onclick="selectHistCh(${idx})" style="flex-shrink:0;padding:9px 12px;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:transparent;border:none;border-bottom:2px solid ${active?'var(--text)':'transparent'};color:${active?'var(--text)':'var(--text-3)'};cursor:pointer;white-space:nowrap;transition:all .15s;">${ch.ch}</button>`;
  });
  html += `</div>`;

  // ── 選択中の章の内容 ──
  const ch = visibleChs[histActiveChIdx];
  const scopedChItems = ch.items.filter(itemInScope);
  html += `<div id="hist-ch-content" style="padding-top:4px;">`;
  html += `<div style="font-size:10px;font-weight:700;color:var(--text-2);padding:10px 0 8px;letter-spacing:.06em;">${ch.ch}　${ch.chName}</div>`;

  const SCORE_LABEL = {oo:'○○', o:'○', n:'ー', x:'×', xx:'××'};
  const SCORE_COLOR = {
    oo:'#0a5c35', o:'var(--o-color)', n:'#666', x:'var(--x-color)', xx:'#8b0000'
  };

  scopedChItems.forEach(item => {
    const kws = getKeywords(item.id);
    // 各ラウンドの評価を収集（記録済みのラウンドのみ）
    const roundEntries = roundHeaders.map((label, i) => {
      const rd = (itemState[item.id] || {})[i] || {};
      const u = rd.u ? rd.u : null;
      return { label, roundIdx: i, u, date: rd.date || null };
    }).filter(e => e.u !== null);

    // 最新ラウンドのスコアからキーワード評価を取得してスコア計算
    // キーワードの○率（全ラウンド通算）
    let scoreVal = null;
    let scorePct = 0;
    if (kws.length > 0) {
      const allResults = kws.flatMap(kw => kw.results);
      if (allResults.length > 0) {
        const okCount = allResults.filter(r => r.result === 'o').length;
        scoreVal = Math.round(okCount / allResults.length * 100);
        scorePct = scoreVal;
      }
    } else if (roundEntries.length > 0) {
      const lastU = roundEntries[roundEntries.length - 1].u;
      const uMap = {oo:100, o:80, n:50, x:25, xx:0};
      scoreVal = lastU in uMap ? uMap[lastU] : null;
      scorePct = scoreVal !== null ? scoreVal : 0;
    }

    const scoreColor = scoreVal === null ? 'var(--text-3)'
      : scoreVal >= 80 ? '#0a5c35'
      : scoreVal >= 60 ? 'var(--o-color)'
      : scoreVal >= 40 ? '#d4a017'
      : 'var(--x-color)';

    const totalAttempts = roundEntries.length;
    const impCls = `imp-${item.imp}`;

    // 展開ボディ：評価バー（独立）＋ キーワードテーブル
    let bodyHTML;
    if (roundEntries.length === 0) {
      bodyHTML = '<div class="rec-no-kw">記録がありません</div>';
    } else {
      // ── 評価バー（常に独立表示）──
      const evalCells = roundEntries.map(e => {
        const sym = e.u==='oo'?'○○':e.u==='o'?'○':e.u==='n'?'ー':e.u==='x'?'×':e.u==='xx'?'××':'–';
        const col = SCORE_COLOR[e.u] || 'var(--text-3)';
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px;">
          <span style="font-size:9px;font-family:'DM Mono',monospace;color:var(--text-3);">${e.label.replace('第','').replace('回','')}回</span>

      const evalBar = `<div style="display:flex;align-items:center;gap:4px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:${kws.length?'10px':'0'};">
        <span style="font-size:12px;font-weight:700;color:var(--text);margin-right:8px;flex-shrink:0;">評価</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">${evalCells}</div>
      </div>`;

      // ── キーワードテーブル──
      let kwTableHTML = '';
      if (kws.length > 0) {
        const headers = roundEntries.map(e => `<th>${e.label.replace('第','').replace('回','')}回</th>`).join('');
        const kwRows = kws.map(kw => {
          const cells = roundEntries.map(e => {
            const res = kw.results.find(r => r.round === e.roundIdx);
            const s = res ? res.result : null;
            const label = s === 'o' ? '○' : s === 'x' ? '×' : '–';
            const col = s === 'o' ? 'var(--o-color)' : s === 'x' ? 'var(--x-color)' : 'var(--text-3)';
            return `<td style="color:${col};font-weight:${s?700:400}">${label}</td>`;
          }).join('');
          return `<tr><td class="kw-name-col">${escHtml(kw.word)}</td>${cells}</tr>`;
        }).join('');
        kwTableHTML = `<div class="rec-kw-table"><table>
          <thead><tr><th class="kw-name-col"></th>${headers}</tr></thead>
          <tbody>${kwRows}</tbody>
        </table></div>`;
      }
      bodyHTML = evalBar + kwTableHTML;
    }

    html += `<div class="rec-item" id="recitem-${item.id}">
      <div class="rec-item-header" onclick="this.closest('.rec-item').classList.toggle('open')">
        <div class="rec-item-name">${item.q?`<button class="q-btn" style="margin-right:6px;margin-left:0" onclick="event.stopPropagation();showQ('${item.id}')">問題文</button>`:''}${escHtml(item.name)}</div>
        <span class="rec-imp ${impCls}">${item.imp}</span>
        <div class="rec-u-track"><div class="rec-u-fill" style="width:${scorePct}%;background:${scoreColor}"></div></div>
        <div class="rec-score" style="color:${scoreColor}">${scoreVal !== null ? scoreVal+'%' : '–'}</div>
        <div class="rec-count">${totalAttempts ? totalAttempts+'回' : '–'}</div>
      </div>
      <div class="rec-item-body">${bodyHTML}</div>
    </div>`;
  });

  html += `</div>`;

  view.innerHTML = html;

  // アクティブタブのスタイルを反映（初回のみスクロール位置を合わせる）
  const tabBar = view.querySelector('#hist-ch-tabs');
  const activeBtn = tabBar?.querySelectorAll('button')[histActiveChIdx];
  if (tabBar && activeBtn && !view._tabInitialized) {
    tabBar.scrollLeft = activeBtn.offsetLeft - tabBar.offsetWidth/2 + activeBtn.offsetWidth/2;
    view._tabInitialized = true;
  }
}

// ── 苦手トレーニング（フィルターのみ・周回の記録には一切書き込まない） ──
function computeItemScore(item) {
  const kws = getKeywords(item.id);
  if (kws.length > 0) {
    const allResults = kws.flatMap(kw => kw.results);
    if (allResults.length > 0) {
      const okCount = allResults.filter(r => r.result === 'o').length;
      return Math.round(okCount / allResults.length * 100);
    }
    return null;
  }
  const stateForItem = itemState[item.id] || {};
  const roundIdxs = Object.keys(stateForItem).map(Number).filter(i => stateForItem[i] && stateForItem[i].u);
  if (roundIdxs.length === 0) return null;
  const lastU = stateForItem[Math.max(...roundIdxs)].u;
  const uMap = {oo:100, o:80, n:50, x:25, xx:0};
  return lastU in uMap ? uMap[lastU] : null;
}

function renderTrainingPage() {
  const view = document.getElementById('training-view');

  const filterHtml = `
    <div class="ch-card" style="padding:12px 14px;margin-bottom:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:2px;">理解率フィルター</div>
      <div style="font-size:10px;color:var(--text-3);margin-bottom:10px;">ここでの評価は周回の記録には保存されません（項目を閉じるとリセットされます）</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="ub" style="min-width:32px;" onclick="adjustTrainingThreshold(-10)">−</button>
        <input type="range" id="training-th-slider" min="0" max="100" step="10" value="${trainingThreshold}" oninput="onTrainingThresholdChange(this.value)" style="flex:1;">
        <button class="ub" style="min-width:32px;" onclick="adjustTrainingThreshold(10)">＋</button>
      </div>
      <div style="text-align:center;margin-top:6px;font-family:'DM Mono',monospace;font-weight:700;font-size:13px;" id="training-th-label">${trainingThreshold}% 以下</div>
    </div>`;

  const chGroups = DATA.map(ch => {
    const chItems = ch.items
      .filter(itemInScope)
      .map(item => ({ item, score: computeItemScore(item) }))
      .filter(x => x.score !== null && x.score <= trainingThreshold);
    return { ch, chItems };
  }).filter(x => x.chItems.length > 0);

  let listHtml;
  if (chGroups.length === 0) {
    listHtml = `<div style="text-align:center;color:var(--text-3);font-size:12px;padding:40px 0;">条件に一致する問題はありません（理解率が未記録の項目は対象外です）</div>`;
  } else {
    listHtml = chGroups.map(({ch, chItems}) => buildTrainingChCard(ch, chItems)).join('');
  }

  view.innerHTML = filterHtml + listHtml;
}

function buildTrainingChCard(ch, chItems) {
  return `<div class="tr-ch-card">
    <div class="tr-ch-header" onclick="toggleTrainingCh(this)">
      <span class="ch-chevron">▶</span>
      <div class="ch-info">
        <div class="ch-name">${ch.ch}　${ch.chName}</div>
      </div>
      <span class="ch-badge">${chItems.length}問</span>
    </div>
    <div class="tr-items-wrap">
      ${chItems.map(({item, score}) => buildTrainingCard(item, score)).join('')}
    </div>
  </div>`;
}

function toggleTrainingCh(headerEl) {
  const chCard = headerEl.closest('.tr-ch-card');
  const isOpen = chCard.classList.toggle('open');
  if (!isOpen) {
    chCard.querySelectorAll('.ch-card.open').forEach(c => {
      c.classList.remove('open');
      c.querySelectorAll('.ub').forEach(b => b.classList.remove('sel-oo', 'sel-o', 'sel-n', 'sel-x', 'sel-xx'));
    });
  }
}

function onTrainingThresholdChange(v) {
  trainingThreshold = parseInt(v, 10);
  renderTrainingPage();
}

function adjustTrainingThreshold(delta) {
  trainingThreshold = Math.min(100, Math.max(0, trainingThreshold + delta));
  renderTrainingPage();
}

function buildTrainingCard(item, score) {
  const scoreColor = score >= 80 ? '#0a5c35' : score >= 60 ? 'var(--o-color)' : score >= 40 ? '#d4a017' : 'var(--x-color)';
  const kws = getKeywords(item.id);
  const kwHtml = kws.length
    ? kws.map(k => `<span style="font-size:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 7px;color:var(--text-2);">${escHtml(k.word)}</span>`).join('')
    : `<span style="font-size:10px;color:var(--text-3);">キーワードなし</span>`;

  return `<div class="ch-card">
    <div class="ch-header" onclick="toggleTrainingCard(this)">
      <span class="ch-chevron">▶</span>
      <div class="ch-info">
        <div class="ch-name">${item.q ? `<button class="q-btn" style="margin-right:6px;margin-left:0" onclick="event.stopPropagation();showQ('${item.id}')">問題文</button>` : ''}${escHtml(item.name)}</div>
        <div class="ch-sub">重要度${item.imp}</div>
      </div>
      <span class="ch-badge" style="color:${scoreColor};border-color:${scoreColor};">${score}%</span>
    </div>
    <div class="items-wrap">
      <div style="padding:10px 14px;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;flex-wrap:wrap;gap:4px;">${kwHtml}</div>
        <div class="u-btns">
          <button class="ub" onclick="event.stopPropagation();toggleTrainingEval(this,'oo')">○○</button>
          <button class="ub" onclick="event.stopPropagation();toggleTrainingEval(this,'o')">○</button>
          <button class="ub" onclick="event.stopPropagation();toggleTrainingEval(this,'n')">ー</button>
          <button class="ub" onclick="event.stopPropagation();toggleTrainingEval(this,'x')">×</button>
          <button class="ub" onclick="event.stopPropagation();toggleTrainingEval(this,'xx')">××</button>
        </div>
      </div>
    </div>
  </div>`;
}

// 開閉のみ・ここでの評価は保存されないため、閉じたら選択状態をリセットする
function toggleTrainingCard(headerEl) {
  const card = headerEl.closest('.ch-card');
  card.classList.toggle('open');
  if (!card.classList.contains('open')) {
    card.querySelectorAll('.ub').forEach(b => b.classList.remove('sel-oo', 'sel-o', 'sel-n', 'sel-x', 'sel-xx'));
  }
}

function toggleTrainingEval(btn, type) {
  const group = btn.closest('.u-btns');
  const wasSel = btn.classList.contains('sel-' + type);
  group.querySelectorAll('.ub').forEach(b => b.classList.remove('sel-oo', 'sel-o', 'sel-n', 'sel-x', 'sel-xx'));
  if (!wasSel) btn.classList.add('sel-' + type);
}

// ── SCOPE MODAL ──
let pendingScope = null;
let pendingScopeIsFirst = false;

function openScopeModal(isFirst) {
  pendingScope = null;
  pendingScopeIsFirst = isFirst || false;
  const n = pendingScopeIsFirst ? 1 : appState.rounds.length + 1;
  document.getElementById('scope-modal-title').textContent = `第${n}回を始める`;
  if (pendingScopeIsFirst) {
    const cur = appState.rounds[0] || {};
    document.getElementById('scope-startdate').value = cur.startDate || today();
    document.getElementById('scope-deadline').value = cur.deadline || '';
    const curS = cur.scope || null;
    document.querySelectorAll('.scope-opt').forEach(b => b.classList.remove('sel'));
    if (curS) {
      const idx = curS === 'all' ? 0 : curS === 'A' ? 1 : 2;
      document.querySelectorAll('.scope-opt')[idx].classList.add('sel');
      pendingScope = curS;
      checkScopeConfirmBtn();
    } else {
      document.getElementById('scope-confirm-btn').style.opacity = '.4';
      document.getElementById('scope-confirm-btn').style.pointerEvents = 'none';
    }
  } else {
    document.getElementById('scope-startdate').value = today();
    document.getElementById('scope-deadline').value = '';
    document.querySelectorAll('.scope-opt').forEach(b => b.classList.remove('sel'));
    document.getElementById('scope-confirm-btn').style.opacity = '.4';
    document.getElementById('scope-confirm-btn').style.pointerEvents = 'none';
  }
  _lockScroll();
  document.getElementById('scope-overlay').classList.add('open');
}

function checkScopeConfirmBtn() {
  const hasScope = !!pendingScope;
  const hasStart = !!document.getElementById('scope-startdate').value;
  const ok = hasScope && hasStart;
  document.getElementById('scope-confirm-btn').style.opacity = ok ? '1' : '.4';
  document.getElementById('scope-confirm-btn').style.pointerEvents = ok ? 'auto' : 'none';
}

function selectScope(scope) {
  pendingScope = scope;
  document.querySelectorAll('.scope-opt').forEach(b => b.classList.remove('sel'));
  const idx = scope === 'all' ? 0 : scope === 'A' ? 1 : 2;
  document.querySelectorAll('.scope-opt')[idx].classList.add('sel');
  checkScopeConfirmBtn();
}

document.getElementById('scope-confirm-btn').onclick = function() {
  if (!pendingScope) return;
  const startDate = document.getElementById('scope-startdate').value || today();
  const deadline = document.getElementById('scope-deadline').value || null;
  const baseDays = deadline ? daysUntil(deadline) : null;
  const baseTotal = DATA.flatMap(c => c.items).filter(item => {
    if (pendingScope === 'A') return item.imp === 'A';
    if (pendingScope === 'B') return item.imp === 'B';
    return true;
  }).length;
  const basePace = (baseDays && baseDays > 0) ? baseTotal / baseDays : null;
  if (pendingScopeIsFirst) {
    appState.rounds[0].scope = pendingScope;
    appState.rounds[0].startDate = startDate;
    appState.rounds[0].deadline = deadline;
    appState.rounds[0].basePace = basePace;
  } else {
    const n = appState.rounds.length + 1;
    appState.rounds.push({label: `第${n}回`, scope: pendingScope, startDate, deadline, basePace});
    appState.currentRound = appState.rounds.length - 1;
  }
  save();
  _unlockScroll();
  document.getElementById('scope-overlay').classList.remove('open');
  render();
};

document.getElementById('scope-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('scope-overlay')) {
    _unlockScroll();
    document.getElementById('scope-overlay').classList.remove('open');
  }
});

function openDeadlineModal() {
  document.getElementById('deadline-input').value = curDeadline() || '';
  _lockScroll();
  document.getElementById('deadline-overlay').classList.add('open');
}
function closeDeadlineModal() { _unlockScroll(); document.getElementById('deadline-overlay').classList.remove('open'); }
function saveDeadline() {
  const newDeadline = document.getElementById('deadline-input').value || null;
  const rd = appState.rounds[curRound()];
  rd.deadline = newDeadline;
  const baseDays = newDeadline ? daysUntil(newDeadline) : null;
  const baseTotal = scopedItems().length;
  rd.basePace = (baseDays && baseDays > 0) ? baseTotal / baseDays : null;
  save();
  closeDeadlineModal();
  updateProgress();
}
document.getElementById('deadline-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('deadline-overlay')) closeDeadlineModal();
});

// ── BACKUP / RESTORE ──
async function exportData() {
  const data = {
    version: 1, label: '財務会計論（理論）', exportedAt: new Date().toISOString(),
    itemState: JSON.parse(localStorage.getItem(STORE_KEY + '-item') || '{}'),
    chState: JSON.parse(localStorage.getItem(STORE_KEY + '-ch') || '{}'),
    appState: JSON.parse(localStorage.getItem(STORE_KEY + '-app') || '{}'),
    kwState: JSON.parse(localStorage.getItem(STORE_KEY + '-kw') || '{}'),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const file = new File([blob], 'zaimu_riron_backup.json', {type: 'application/json'});
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); return; } catch(e) {}
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'zaimu_riron_backup.json';
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.itemState || !data.appState) throw new Error('invalid');
      if (!confirm('現在のデータを上書きして復元しますか？')) return;
      localStorage.setItem(STORE_KEY + '-item', JSON.stringify(data.itemState));
      localStorage.setItem(STORE_KEY + '-ch', JSON.stringify(data.chState || {}));
      localStorage.setItem(STORE_KEY + '-app', JSON.stringify(data.appState));
      localStorage.setItem(STORE_KEY + '-kw', JSON.stringify(data.kwState || {}));
      location.reload();
    } catch(err) { alert('ファイルの読み込みに失敗しました。'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── 全オーバーレイを強制クローズ ──
function closeAllOverlays() {
  _scrollLockDepth = 0; document.body.style.overflow = '';
  document.querySelectorAll('.overlay.open').forEach(el => el.classList.remove('open'));
  document.getElementById('close-all-btn').style.display = 'none';
}

// オーバーレイが開いたら緊急ボタンを表示、閉じたら隠す
const overlayObserver = new MutationObserver(() => {
  const anyOpen = document.querySelectorAll('.overlay.open').length > 0;
  document.getElementById('close-all-btn').style.display = anyOpen ? '' : 'none';
});
document.querySelectorAll('.overlay').forEach(el => {
  overlayObserver.observe(el, { attributes: true, attributeFilter: ['class'] });
});

// ESCキーで全モーダルを閉じる
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAllOverlays();
});

// ── 問題文モーダル ──
function showQ(id){
  let item;
  for(const ch of DATA){item=ch.items.find(i=>i.id===id);if(item)break;}
  if(!item||!item.q)return;
  document.getElementById('q-modal-id').textContent=id;
  document.getElementById('q-modal-text').textContent=item.q;
  document.getElementById('q-overlay').classList.add('open');
}
function closeQ(){document.getElementById('q-overlay').classList.remove('open');}
</script>
