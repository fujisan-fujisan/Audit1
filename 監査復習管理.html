<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>監査論 復習管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f7f7f5;--white:#fff;--border:#e5e5e0;--border2:#d0d0c8;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --accent:#2d5be3;--accent-bg:#eef2fd;
  --green:#1a9e5c;--green-bg:#e8f7f0;
  --yellow:#c47a00;--yellow-bg:#fef6e4;
  --red:#c93b2a;--red-bg:#fdeeed;
  --A:#c93b2a;--A-bg:#fdeeed;
  --B:#c47a00;--B-bg:#fef6e4;
  --C:#2d5be3;--C-bg:#eef2fd;
  --shadow:0 1px 3px rgba(0,0,0,.07);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

/* ── STICKY HEADER ── */
.sticky{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
.hd-main{padding:14px 16px 10px;}
.hd-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.08em;margin-bottom:10px;}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.prog-pct{font-size:26px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;line-height:1;}
.prog-lbl{font-size:11px;color:var(--text2);}
.prog-wrap{background:var(--border);border-radius:999px;height:7px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),#6b9af7);border-radius:999px;transition:width .5s ease;}
.hd-meta{display:flex;gap:8px;margin-top:10px;}
.meta-card{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 10px;}
.meta-lbl{font-size:10px;color:var(--text3);}
.meta-val{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
.meta-val.ok{color:var(--green);}
.meta-val.warn{color:var(--red);}
.meta-sub{font-size:10px;color:var(--text2);}
.btn-dl{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 14px;font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;}
.filters{display:flex;gap:6px;padding:9px 16px;border-top:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fb{padding:5px 12px;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
.fb.on{background:var(--text);border-color:var(--text);color:#fff;}
.fb.onA{background:var(--A);border-color:var(--A);color:#fff;}
.fb.onB{background:var(--B);border-color:var(--B);color:#fff;}
.fb.onC{background:var(--C);border-color:var(--C);color:#fff;}

/* ── CONTENT ── */
.content{padding:14px 14px;max-width:680px;margin:0 auto;}

/* Chapter */
.ch-block{margin-bottom:20px;}
.ch-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;padding-bottom:7px;border-bottom:2px solid var(--border);margin-bottom:7px;}

/* Section card */
.sec-card{background:var(--white);border:1px solid var(--border);border-radius:11px;margin-bottom:5px;overflow:hidden;box-shadow:var(--shadow);}
.sec-card.hidden{display:none;}

.sec-header{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.sec-header:active{background:var(--bg);}
.sec-chevron{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.sec-card.open .sec-chevron{transform:rotate(90deg);}
.sec-name{flex:1;font-size:13px;font-weight:600;line-height:1.4;}
.sec-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sec-progress{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 6px;}
.sec-progress.done{background:var(--green-bg);border-color:var(--green);color:var(--green);}

/* Section footer (date/time row) */
.sec-footer{border-top:1px solid var(--border);padding:8px 12px;background:var(--bg);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sec-footer-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--white);color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap;}
.sec-footer-btn:hover{border-color:var(--accent);color:var(--accent);}
.sec-stat{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;}

/* Items list */
.items-wrap{border-top:1px solid var(--border);display:none;}
.sec-card.open .items-wrap{display:block;}

.item-row{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.item-row:last-child{border-bottom:none;}
.item-top{display:flex;align-items:center;gap:7px;}
.item-num{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0;min-width:30px;}
.item-name{flex:1;font-size:12px;line-height:1.4;}
.imp{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:999px;flex-shrink:0;}
.imp-A{background:var(--A-bg);color:var(--A);}
.imp-B{background:var(--B-bg);color:var(--B);}
.imp-C{background:var(--C-bg);color:var(--C);}
.u-btns{display:flex;gap:3px;flex-shrink:0;}
.ub{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border2);background:var(--bg);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text2);}
.ub:active{transform:scale(.9);}
.ub.sel-o{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.ub.sel-t{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow);}
.ub.sel-x{background:var(--red-bg);border-color:var(--red);color:var(--red);}

.item-memo-wrap{display:flex;gap:6px;align-items:flex-start;}
.item-memo{flex:1;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;resize:none;outline:none;min-height:28px;line-height:1.5;transition:border-color .2s;}
.item-memo:focus{border-color:var(--accent);}
.item-memo::placeholder{color:var(--text3);}

/* ── ROUND COMPLETE ── */
.round-banner{display:none;background:var(--green-bg);border:1px solid var(--green);border-radius:11px;padding:14px;margin:14px;text-align:center;}
.round-banner.show{display:block;}
.round-banner h3{color:var(--green);font-size:15px;margin-bottom:6px;}
.round-banner p{font-size:12px;color:var(--text2);margin-bottom:10px;}
.btn-next{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:18px 18px 0 0;padding:18px 18px 40px;width:100%;max-width:680px;max-height:80vh;overflow-y:auto;}
.modal-handle{width:34px;height:4px;background:var(--border2);border-radius:999px;margin:0 auto 14px;}
.modal h2{font-size:14px;font-weight:700;margin-bottom:3px;}
.modal-sub{font-size:11px;color:var(--text2);margin-bottom:14px;}
.form-group{margin-bottom:12px;}
.form-lbl{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.finput{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:9px 11px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.finput:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-primary{flex:1;padding:11px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-secondary{padding:11px 14px;border-radius:9px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;}
.hist-list{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}
.hist-round{font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.hist-meta{color:var(--text2);text-align:right;line-height:1.6;}
</style>
</head>
<body>

<div class="sticky">
  <div class="hd-main">
    <div class="hd-title">監査論 復習管理</div>
    <div class="prog-top">
      <div class="prog-pct" id="prog-pct">0%</div>
      <div class="prog-lbl" id="prog-lbl">0 / 0 節完了</div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="hd-meta">
      <div class="meta-card">
        <div class="meta-lbl">復習回</div>
        <div class="meta-val" id="round-disp">第1回</div>
        <div class="meta-sub">進行中</div>
      </div>
      <div class="meta-card">
        <div class="meta-lbl">期限</div>
        <div class="meta-val" id="dl-val">未設定</div>
        <div class="meta-sub" id="dl-sub">—</div>
      </div>
      <button class="btn-dl" onclick="openDL()">期限設定</button>
    </div>
  </div>
  <div class="filters">
    <button class="fb on" onclick="setFilter('all',this)">すべて</button>
    <button class="fb" onclick="setFilter('A',this)">重要度 A</button>
    <button class="fb" onclick="setFilter('B',this)">重要度 B</button>
    <button class="fb" onclick="setFilter('C',this)">重要度 C</button>
    <button class="fb" onclick="setFilter('未',this)">未完了</button>
    <button class="fb" onclick="setFilter('×',this)">要復習 ×</button>
  </div>
</div>

<div class="round-banner" id="round-banner">
  <h3>🎉 第<span id="comp-r">1</span>回 復習完了！</h3>
  <p>全節の復習が完了しました。次の回を始めましょう。</p>
  <button class="btn-next" onclick="startNext()">第<span id="next-r">2</span>回を開始する</button>
</div>

<div class="content" id="content"></div>

<!-- DEADLINE MODAL -->
<div class="overlay" id="dl-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>期限を設定する</h2>
    <div class="modal-sub" id="dl-modal-sub">第1回の期限を設定してください</div>
    <div class="form-group">
      <label class="form-lbl">期限日</label>
      <input type="date" class="finput" id="dl-input">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeDL()">キャンセル</button>
      <button class="btn-primary" onclick="saveDL()">設定する</button>
    </div>
  </div>
</div>

<!-- SEC DETAIL MODAL (date/time/history) -->
<div class="overlay" id="sec-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="sec-modal-title"></h2>
    <div class="modal-sub" id="sec-modal-sub"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-lbl">復習日</label>
        <input type="date" class="finput" id="sec-date">
      </div>
      <div class="form-group">
        <label class="form-lbl">所要時間（分）</label>
        <input type="number" class="finput" id="sec-time" placeholder="例: 30" min="1">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSec()">キャンセル</button>
      <button class="btn-primary" onclick="saveSec()">保存</button>
    </div>
    <div class="hist-list" id="sec-hist"></div>
  </div>
</div>

// ────────────────────────────────
// STATE
// ────────────────────────────────
// secState[secId] = { rounds:[{date,time},…] }
// itemState[itemId] = { rounds:[{u, memo},…] }
// appState = {currentRound, deadlines:{round:dateStr}}
let secState={}, itemState={}, appState={currentRound:1,deadlines:{}};

function load(){
  try{
    const s=localStorage.getItem('aud-sec');
    const i=localStorage.getItem('aud-item');
    const a=localStorage.getItem('aud-app');
    if(s) secState=JSON.parse(s);
    if(i) itemState=JSON.parse(i);
    if(a) appState=JSON.parse(a);
  }catch(e){}
}
function save(){
  try{
    localStorage.setItem('aud-sec',JSON.stringify(secState));
    localStorage.setItem('aud-item',JSON.stringify(itemState));
    localStorage.setItem('aud-app',JSON.stringify(appState));
  }catch(e){}
}
function today(){return new Date().toISOString().split('T')[0];}
function getRound(){return appState.currentRound;}

function getSecR(secId){
  const r=getRound();
  return (secState[secId]?.rounds||[])[r-1]||{};
}
function setSecR(secId,data){
  if(!secState[secId]) secState[secId]={rounds:[]};
  while(secState[secId].rounds.length<getRound()) secState[secId].rounds.push({});
  secState[secId].rounds[getRound()-1]=data;
}
function getItemR(itemId){
  const r=getRound();
  return (itemState[itemId]?.rounds||[])[r-1]||{};
}
function setItemR(itemId,data){
  if(!itemState[itemId]) itemState[itemId]={rounds:[]};
  while(itemState[itemId].rounds.length<getRound()) itemState[itemId].rounds.push({});
  itemState[itemId].rounds[getRound()-1]=data;
}

// ────────────────────────────────
// FILTER
// ────────────────────────────────
let curFilter='all';
function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.fb').forEach(b=>b.className='fb');
  if(f==='A') btn.classList.add('onA');
  else if(f==='B') btn.classList.add('onB');
  else if(f==='C') btn.classList.add('onC');
  else btn.classList.add('on');
  applyFilter();
}
function secDominantImp(sec){
  const total=sec.items.length;
  if(!total) return 'C';
  const a=sec.items.filter(i=>i.imp==='A').length;
  if(a/total>=0.5) return 'A';
  if(a/total>=0.2) return 'B';
  return 'C';
}
function secHasCross(sec){
  return sec.items.some(i=>getItemR(i.id).u==='x');
}
function secIsUndone(sec){
  return sec.items.every(i=>!getItemR(i.id).u);
}
function applyFilter(){
  DATA.forEach(ch=>{
    ch.sections.forEach(sec=>{
      const card=document.getElementById('sec-'+sec.id);
      if(!card) return;
      let show=true;
      const imp=secDominantImp(sec);
      if(curFilter==='A') show=imp==='A';
      else if(curFilter==='B') show=imp==='B';
      else if(curFilter==='C') show=imp==='C';
      else if(curFilter==='未') show=secIsUndone(sec);
      else if(curFilter==='×') show=secHasCross(sec);
      card.classList.toggle('hidden',!show);
    });
  });
}

// ────────────────────────────────
// RENDER
// ────────────────────────────────
function render(){
  const ct=document.getElementById('content');
  ct.innerHTML='';
  DATA.forEach(ch=>{
    const cb=document.createElement('div');
    cb.className='ch-block';
    cb.innerHTML=`<div class="ch-label">${ch.ch}　${ch.chName}</div>`;
    ch.sections.forEach((sec,si)=>{
      cb.appendChild(buildSecCard(sec,si+1));
    });
    ct.appendChild(cb);
  });
}

function buildSecCard(sec,num){
  const card=document.createElement('div');
  card.className='sec-card';
  card.id='sec-'+sec.id;

  // header
  const hd=document.createElement('div');
  hd.className='sec-header';
  hd.onclick=()=>toggleSec(sec.id);
  hd.innerHTML=`
    <span class="sec-chevron">▶</span>
    <span class="sec-name">第${num}節　${sec.name}</span>
    <span class="sec-meta">
      <span class="sec-progress" id="prog-${sec.id}">${secProgText(sec)}</span>
    </span>`;
  card.appendChild(hd);

  // items wrap
  const iw=document.createElement('div');
  iw.className='items-wrap';
  sec.items.forEach((item,idx)=>{
    iw.appendChild(buildItemRow(item,idx+1));
  });
  card.appendChild(iw);

  // sec footer
  const sf=document.createElement('div');
  sf.className='sec-footer';
  sf.id='secf-'+sec.id;
  sf.innerHTML=buildSecFooter(sec.id);
  card.appendChild(sf);

  return card;
}

function buildItemRow(item,num){
  const r=getItemR(item.id);
  const row=document.createElement('div');
  row.className='item-row';
  row.id='item-'+item.id;
  row.innerHTML=`
    <div class="item-top">
      <span class="item-num">${num}</span>
      <span class="item-name">${item.name}</span>
      <span class="imp imp-${item.imp}">${item.imp}</span>
      <div class="u-btns">
        <button class="ub ${r.u==='o'?'sel-o':''}" onclick="setU('${item.id}','o')">○</button>
        <button class="ub ${r.u==='t'?'sel-t':''}" onclick="setU('${item.id}','t')">△</button>
        <button class="ub ${r.u==='x'?'sel-x':''}" onclick="setU('${item.id}','x')">×</button>
      </div>
    </div>
    <div class="item-memo-wrap">
      <textarea class="item-memo" placeholder="メモ..." rows="1"
        onchange="saveMemo('${item.id}',this.value)"
        oninput="autoResize(this)">${r.memo||''}</textarea>
    </div>`;
  return row;
}

function buildSecFooter(secId){
  const r=getSecR(secId);
  const parts=[];
  if(r.date) parts.push(`<span class="sec-stat">📅 ${r.date}</span>`);
  if(r.time) parts.push(`<span class="sec-stat">⏱ ${r.time}分</span>`);
  parts.push(`<button class="sec-footer-btn" onclick="openSec('${secId}')">復習日・時間を記録</button>`);
  return parts.join('');
}

function secProgText(sec){
  const total=sec.items.length;
  const done=sec.items.filter(i=>getItemR(i.id).u).length;
  return `${done}/${total}`;
}

function toggleSec(id){
  const card=document.getElementById('sec-'+id);
  card.classList.toggle('open');
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

// ────────────────────────────────
// INTERACTIONS
// ────────────────────────────────
function setU(itemId,type){
  const r=getItemR(itemId);
  r.u=r.u===type?null:type;
  setItemR(itemId,r);
  save();
  refreshItem(itemId);
  // find parent sec
  DATA.forEach(ch=>ch.sections.forEach(sec=>{
    if(sec.items.find(i=>i.id===itemId)){
      refreshSecProg(sec);
      updateProgress();
      checkRoundComplete();
    }
  }));
}

function saveMemo(itemId,val){
  const r=getItemR(itemId);
  r.memo=val;
  setItemR(itemId,r);
  save();
}

function refreshItem(itemId){
  const r=getItemR(itemId);
  const row=document.getElementById('item-'+itemId);
  if(!row) return;
  ['o','t','x'].forEach(t=>{
    const btn=row.querySelector(`.ub[onclick*="'${t}'"]`);
    if(!btn) return;
    btn.classList.remove('sel-o','sel-t','sel-x');
    if(r.u===t) btn.classList.add('sel-'+t);
  });
}

function refreshSecProg(sec){
  const el=document.getElementById('prog-'+sec.id);
  if(!el) return;
  const txt=secProgText(sec);
  const total=sec.items.length;
  const done=sec.items.filter(i=>getItemR(i.id).u).length;
  el.textContent=txt;
  el.className='sec-progress'+(done===total&&total>0?' done':'');
}

// ────────────────────────────────
// PROGRESS
// ────────────────────────────────
function allSections(){
  return DATA.flatMap(ch=>ch.sections);
}
function updateProgress(){
  const secs=allSections();
  const total=secs.length;
  const done=secs.filter(sec=>sec.items.every(i=>getItemR(i.id).u)).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-lbl').textContent=done+' / '+total+' 節完了';
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('round-disp').textContent='第'+getRound()+'回';
  updateDL();
  applyFilter();
}

function updateDL(){
  const dl=appState.deadlines[getRound()];
  const v=document.getElementById('dl-val');
  const s=document.getElementById('dl-sub');
  if(!dl){v.textContent='未設定';v.className='meta-val';s.textContent='—';return;}
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(dl);d.setHours(0,0,0,0);
  const diff=Math.round((d-now)/(86400000));
  v.textContent=dl.slice(5).replace('-','/');
  v.className='meta-val '+(diff<=3?'warn':'ok');
  s.textContent=diff>0?`残り${diff}日`:diff===0?'今日まで':`${Math.abs(diff)}日超過`;
}

// ────────────────────────────────
// ROUND COMPLETE
// ────────────────────────────────
function checkRoundComplete(){
  const secs=allSections();
  const allDone=secs.every(sec=>sec.items.every(i=>getItemR(i.id).u));
  const banner=document.getElementById('round-banner');
  const r=getRound();
  if(allDone){
    document.getElementById('comp-r').textContent=r;
    document.getElementById('next-r').textContent=r+1;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}
function startNext(){
  appState.currentRound++;
  save();
  document.getElementById('round-banner').classList.remove('show');
  render();
  updateProgress();
  openDL();
}

// ────────────────────────────────
// DEADLINE MODAL
// ────────────────────────────────
function openDL(){
  const r=getRound();
  document.getElementById('dl-modal-sub').textContent=`第${r}回の期限を設定してください`;
  document.getElementById('dl-input').value=appState.deadlines[r]||'';
  document.getElementById('dl-overlay').classList.add('open');
}
function closeDL(){document.getElementById('dl-overlay').classList.remove('open');}
function saveDL(){
  const v=document.getElementById('dl-input').value;
  if(v) appState.deadlines[getRound()]=v;
  save(); updateDL(); closeDL();
}
document.getElementById('dl-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDL();});

// ────────────────────────────────
// SEC DETAIL MODAL
// ────────────────────────────────
let editSecId=null;
function openSec(secId){
  editSecId=secId;
  const sec=DATA.flatMap(c=>c.sections).find(s=>s.id===secId);
  const r=getSecR(secId);
  document.getElementById('sec-modal-title').textContent=sec.name;
  document.getElementById('sec-modal-sub').textContent=`第${getRound()}回 復習記録`;
  document.getElementById('sec-date').value=r.date||today();
  document.getElementById('sec-time').value=r.time||'';
  // history
  const allR=(secState[secId]?.rounds||[]);
  const past=allR.map((rr,i)=>({round:i+1,data:rr})).filter(x=>x.data&&(x.data.date||x.data.time)&&x.round!==getRound());
  const hEl=document.getElementById('sec-hist');
  hEl.innerHTML=past.length?'<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;">過去の復習履歴</div>'+
    past.map(x=>`<div class="hist-item"><span class="hist-round">第${x.round}回</span><span class="hist-meta">${x.data.date||''}${x.data.time?'　'+x.data.time+'分':''}</span></div>`).join(''):'';
  document.getElementById('sec-overlay').classList.add('open');
}
function closeSec(){document.getElementById('sec-overlay').classList.remove('open');editSecId=null;}
function saveSec(){
  if(!editSecId) return;
  const r=getSecR(editSecId);
  r.date=document.getElementById('sec-date').value;
  r.time=document.getElementById('sec-time').value;
  setSecR(editSecId,r);
  save();
  document.getElementById('secf-'+editSecId).innerHTML=buildSecFooter(editSecId);
  closeSec();
}
document.getElementById('sec-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSec();});

// ────────────────────────────────
// INIT
// ────────────────────────────────
load();
render();
updateProgress();
DATA.forEach(ch=>ch.sections.forEach(sec=>refreshSecProg(sec)));
checkRoundComplete();
if(!appState.deadlines[1]) setTimeout(openDL,500);
</script>
