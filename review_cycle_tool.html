<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>復習周期管理</title>
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #e8e8e5;
  --border-strong: #d0d0cb;
  --text: #111111;
  --text-2: #666666;
  --text-3: #aaaaaa;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.header-top { padding: 14px 16px 12px; }
.header-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.app-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text-3);
  text-transform: uppercase;
}
.header-actions { display: flex; gap: 6px; }
.btn-icon {
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--text-2);
  font-size: 11px;
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn-icon:hover { background: var(--text); border-color: var(--text); color: #fff; }

/* Remaining days */
.remaining-row { display: flex; align-items: baseline; gap: 6px; }
.remaining-num {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.remaining-num.warn { color: #f97316; }
.remaining-num.expired { color: #dc2626; }
.remaining-days-label { font-size: 12px; color: var(--text-3); }
.deadline-label { font-size: 11px; color: var(--text-3); margin-left: 2px; }

/* ── Tab bar ── */
.tab-bar {
  display: flex;
  border-top: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 9px 0;
  border: none;
  background: none;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  color: var(--text-3);
  cursor: pointer;
  letter-spacing: .06em;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab-btn.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* ── Content ── */
.content { padding: 14px 14px 0; max-width: 720px; margin: 0 auto; }

/* ── Desktop table ── */
.table-wrap {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
@media (min-width: 600px) {
  .table-wrap { display: block; }
  .cards-wrap { display: none !important; }
}

table { width: 100%; border-collapse: collapse; }
thead { background: var(--bg); border-bottom: 1px solid var(--border); }
thead th {
  padding: 10px 14px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-align: center;
  letter-spacing: .08em;
  text-transform: uppercase;
  white-space: nowrap;
}
thead th.col-name { text-align: left; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:nth-child(even) { background: #fafaf9; }
tbody tr:hover { background: #f3f3f1; }
td {
  padding: 10px 14px;
  font-size: 13px;
  text-align: center;
  vertical-align: middle;
}
td.col-name {
  text-align: left;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
td.col-calc {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
}

/* Number inputs */
.num-input {
  width: 72px;
  text-align: center;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 6px 6px;
  font-size: 13px;
  font-family: 'DM Mono', 'Courier New', monospace;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -moz-appearance: textfield;
}
.num-input::-webkit-inner-spin-button,
.num-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.num-input:focus {
  border-color: #4a7edc;
  box-shadow: 0 0 0 3px rgba(74,126,220,.12);
}

/* Result display */
.badge {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
}

/* ── Mobile cards ── */
.cards-wrap { display: flex; flex-direction: column; gap: 8px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.card-name { font-size: 14px; font-weight: 700; color: var(--text); }
.card-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
.input-group label {
  display: block;
  font-size: 10px;
  color: var(--text-3);
  font-weight: 700;
  letter-spacing: .06em;
  margin-bottom: 4px;
}
.input-group .num-input { width: 100%; }
.card-calc {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

/* ── Log View ── */
.log-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0 12px;
  gap: 8px;
  border-radius: var(--radius);
  transition: background .2s, padding .2s;
}
.log-nav.is-today {
  background: #eef2ff;
  padding: 10px 10px 14px;
  margin-bottom: 2px;
}
.log-nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.log-nav-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }
.log-date-center {
  flex: 1;
  text-align: center;
}
.log-date-main {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.log-date-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}
.log-date-sub.today-badge {
  display: inline-block;
  background: #4f46e5;
  color: #ffffff;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
}
.today-link {
  display: none;
  margin-top: 4px;
  padding: 2px 10px;
  border-radius: 20px;
  border: 1px solid var(--border-strong);
  background: none;
  font-size: 10px;
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  font-weight: 700;
  color: var(--text-3);
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .15s;
}
.today-link:hover { background: var(--text); color: #fff; border-color: var(--text); }
.today-link.show { display: inline-block; }

/* Log swipe area */
.log-swipe-wrap {
  overflow: hidden;
  touch-action: pan-y;
  user-select: none;
  -webkit-user-select: none;
}
#log-slide-inner {
  will-change: transform;
}

/* Log entry cards */
.log-entry-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.log-entry-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.log-subject-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.log-hours-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.log-hours-input {
  width: 56px;
  text-align: center;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 6px 4px;
  font-size: 13px;
  font-family: 'DM Mono', 'Courier New', monospace;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -moz-appearance: textfield;
}
.log-hours-input::-webkit-inner-spin-button,
.log-hours-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.log-hours-input:focus { border-color: #4a7edc; box-shadow: 0 0 0 3px rgba(74,126,220,.12); }
.log-hours-unit {
  font-size: 11px;
  color: var(--text-3);
  white-space: nowrap;
}
.log-range-input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  color: var(--text);
  background: #fafaf9;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.log-range-input:focus {
  border-color: #4a7edc;
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(74,126,220,.12);
}
.log-range-input::placeholder { color: var(--text-3); }

/* Log footer */
.log-footer {
  padding: 8px 0 4px;
}
.log-total {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  min-height: 20px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-meta">
      <div class="app-title">復習周期管理</div>
      <div class="header-actions">
        <button class="btn-icon" onclick="exportData()">バックアップ</button>
        <button class="btn-icon" onclick="document.getElementById('import-input').click()">復元</button>
        <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
    <div class="remaining-row">
      <span class="remaining-num" id="remaining-num">–</span>
      <span class="remaining-days-label" id="remaining-days-label">日</span>
      <span class="deadline-label" id="deadline-label"></span>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-cycles" onclick="switchTab('cycles')">周回管理</button>
    <button class="tab-btn" id="tab-logs" onclick="switchTab('logs')">学習記録</button>
  </div>
</div>

<div class="content" id="view-cycles">

  <!-- Desktop table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-name">科目</th>
          <th>① 1周の時間<br><span style="font-weight:400;text-transform:none;letter-spacing:0">(分)</span></th>
          <th>② 1日の時間<br><span style="font-weight:400;text-transform:none;letter-spacing:0">(分/日)</span></th>
          <th>1周の日数</th>
          <th>最大周回数</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- Mobile cards -->
  <div class="cards-wrap" id="cards-wrap"></div>

</div>

<div class="content" id="view-logs" style="display:none">
  <div class="log-nav" id="log-nav">
    <button class="log-nav-btn" onclick="navigateLog(-1)">‹</button>
    <div class="log-date-center">
      <div class="log-date-main" id="log-date-main">–</div>
      <div class="log-date-sub" id="log-date-sub"></div>
      <button class="today-link" id="today-link" onclick="goToToday()">今日に戻る</button>
    </div>
    <button class="log-nav-btn" onclick="navigateLog(1)">›</button>
  </div>
  <div class="log-swipe-wrap" id="log-swipe-wrap">
    <div id="log-slide-inner">
      <div id="log-entries"></div>
      <div class="log-footer">
        <span class="log-total" id="log-total"></span>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'review-cycle-tool-v1';
const LOGS_KEY    = 'review-cycle-logs-v1';

const SUBJECTS = [
  { id: 'zaimu_keisan', name: '財務計算' },
  { id: 'zaimu_riron',  name: '財務理論' },
  { id: 'kanri_keisan', name: '管理計算' },
  { id: 'kanri_riron',  name: '管理理論' },
  { id: 'kansa',        name: '監査論'   },
  { id: 'kaisha',       name: '企業法'   },
  { id: 'hojin',        name: '法人税'   },
  { id: 'shotoku',      name: '所得税'   },
  { id: 'shohi',        name: '消費税'   },
  { id: 'sozei_riron',  name: '租税理論' },
  { id: 'keiei',        name: '経営学'   },
];

let settings = {};
let logs     = {};
let currentLogDate = '';

// ── Storage ──────────────────────────────────────
function loadSettings() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) settings = JSON.parse(s);
  } catch(e) {}
}

function saveSettings() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
  } catch(e) {}
}

function loadLogs() {
  try {
    const s = localStorage.getItem(LOGS_KEY);
    if (s) logs = JSON.parse(s);
  } catch(e) {}
}

function saveLogs() {
  try {
    localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
  } catch(e) {}
}

// ── Date utilities ────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function calcRemainingDays() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const deadline = new Date(today.getFullYear(), 7, 21);
  return Math.floor((deadline - today) / (1000 * 60 * 60 * 24));
}

function getDeadlineLabel() {
  const today = new Date();
  const deadline = new Date(today.getFullYear(), 7, 21);
  return (deadline.getMonth() + 1) + '月' + deadline.getDate() + '日まで';
}

// ── Per-subject calculation ───────────────────────
function calcDaysPerReview(hoursPerReview, hoursPerDay) {
  const h = parseFloat(hoursPerReview);
  const d = parseFloat(hoursPerDay);
  if (!h || !d || h <= 0 || d <= 0) return null;
  return h / d;
}

function calcMaxReviews(hoursPerReview, hoursPerDay, remainingDays) {
  const dpr = calcDaysPerReview(hoursPerReview, hoursPerDay);
  if (dpr === null || remainingDays <= 0) return null;
  return remainingDays / dpr;
}

function getBadgeText(reviews, remainingDays) {
  if (remainingDays <= 0) return '期限切れ';
  if (reviews === null) return '–';
  return reviews.toFixed(1) + '周';
}

// ── Header update ─────────────────────────────────
function updateHeader() {
  const days = calcRemainingDays();
  const numEl = document.getElementById('remaining-num');
  const lblEl = document.getElementById('remaining-days-label');
  const dlEl  = document.getElementById('deadline-label');

  numEl.className = 'remaining-num';
  if (days <= 0) {
    numEl.textContent = '期限切れ';
    numEl.classList.add('expired');
    lblEl.textContent = '';
  } else {
    numEl.textContent = days;
    lblEl.textContent = '日';
    if (days <= 30) numEl.classList.add('warn');
  }
  dlEl.textContent = getDeadlineLabel();
}

// ── Setting change handler ────────────────────────
function onInput(id, field, value) {
  if (!settings[id]) settings[id] = {};
  settings[id][field] = value;
  saveSettings();
  refreshRow(id);
}

// ── Refresh a single subject's display ───────────
function refreshRow(id) {
  const remainingDays = calcRemainingDays();
  const s = settings[id] || {};
  const reviews = calcMaxReviews(s.hoursPerReview, s.hoursPerDay, remainingDays);
  const dpr     = calcDaysPerReview(s.hoursPerReview, s.hoursPerDay);
  const text    = getBadgeText(reviews, remainingDays);
  const dprText = dpr !== null ? dpr.toFixed(1) + '日' : '–';

  const calcCell  = document.getElementById('calc-' + id);
  const badgeCell = document.getElementById('badge-' + id);
  if (calcCell)  calcCell.textContent = dprText;
  if (badgeCell) badgeCell.textContent = text;

  const mCalc  = document.getElementById('m-calc-' + id);
  const mBadge = document.getElementById('m-badge-' + id);
  if (mCalc)  mCalc.textContent  = dpr !== null ? '1周 = ' + dprText : '';
  if (mBadge) mBadge.textContent = text;
}

// ── Build DOM ─────────────────────────────────────
function buildTable() {
  const remainingDays = calcRemainingDays();
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  SUBJECTS.forEach(function({ id, name }) {
    const s = settings[id] || {};
    const reviews = calcMaxReviews(s.hoursPerReview, s.hoursPerDay, remainingDays);
    const dpr     = calcDaysPerReview(s.hoursPerReview, s.hoursPerDay);
    const text    = getBadgeText(reviews, remainingDays);

    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="col-name">' + name + '</td>' +
      '<td><input class="num-input" type="number" min="0" step="5" placeholder="–"' +
        ' value="' + (s.hoursPerReview || '') + '"' +
        ' oninput="onInput(\'' + id + '\',\'hoursPerReview\',this.value)"></td>' +
      '<td><input class="num-input" type="number" min="0" step="5" placeholder="–"' +
        ' value="' + (s.hoursPerDay || '') + '"' +
        ' oninput="onInput(\'' + id + '\',\'hoursPerDay\',this.value)"></td>' +
      '<td class="col-calc" id="calc-' + id + '">' + (dpr !== null ? dpr.toFixed(1) + '日' : '–') + '</td>' +
      '<td><span class="badge" id="badge-' + id + '">' + text + '</span></td>';
    tbody.appendChild(tr);
  });
}

function buildCards() {
  const remainingDays = calcRemainingDays();
  const wrap = document.getElementById('cards-wrap');
  wrap.innerHTML = '';

  SUBJECTS.forEach(function({ id, name }) {
    const s = settings[id] || {};
    const reviews = calcMaxReviews(s.hoursPerReview, s.hoursPerDay, remainingDays);
    const dpr     = calcDaysPerReview(s.hoursPerReview, s.hoursPerDay);
    const text    = getBadgeText(reviews, remainingDays);

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-header">' +
        '<span class="card-name">' + name + '</span>' +
        '<span class="badge" id="m-badge-' + id + '">' + text + '</span>' +
      '</div>' +
      '<div class="card-inputs">' +
        '<div class="input-group">' +
          '<label>① 1周の時間（分）</label>' +
          '<input class="num-input" type="number" min="0" step="5" placeholder="–"' +
            ' value="' + (s.hoursPerReview || '') + '"' +
            ' oninput="onInput(\'' + id + '\',\'hoursPerReview\',this.value)">' +
        '</div>' +
        '<div class="input-group">' +
          '<label>② 1日の時間（分/日）</label>' +
          '<input class="num-input" type="number" min="0" step="5" placeholder="–"' +
            ' value="' + (s.hoursPerDay || '') + '"' +
            ' oninput="onInput(\'' + id + '\',\'hoursPerDay\',this.value)">' +
        '</div>' +
      '</div>' +
      '<div class="card-calc" id="m-calc-' + id + '">' + (dpr !== null ? '1周 = ' + dpr.toFixed(1) + '日' : '') + '</div>';
    wrap.appendChild(card);
  });
}

// ── Backup / Restore ──────────────────────────────
async function exportData() {
  const data = {
    version: 2,
    label: '復習周期管理ツール',
    exportedAt: new Date().toISOString(),
    settings,
    logs,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const file = new File([blob], 'review_cycle_backup.json', { type: 'application/json' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); return; } catch(e) {}
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'review_cycle_backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.settings) throw new Error('invalid');
      if (!confirm('現在のデータを上書きして復元しますか？')) return;
      settings = data.settings;
      saveSettings();
      if (data.logs) { logs = data.logs; saveLogs(); }
      location.reload();
    } catch(err) {
      alert('ファイルの読み込みに失敗しました。');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Tab switching ─────────────────────────────────
function switchTab(tab) {
  const isCycles = tab === 'cycles';
  document.getElementById('view-cycles').style.display = isCycles ? '' : 'none';
  document.getElementById('view-logs').style.display   = isCycles ? 'none' : '';
  document.getElementById('tab-cycles').classList.toggle('active', isCycles);
  document.getElementById('tab-logs').classList.toggle('active', !isCycles);
  if (!isCycles) renderLogView();
}

// ── Study Log ─────────────────────────────────────
function goToToday() {
  currentLogDate = todayStr();
  renderLogView();
}

function offsetDate(dateStr, dir) {
  var d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + dir);
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function navigateLog(dir) {
  currentLogDate = offsetDate(currentLogDate, dir);
  renderLogView();
}

function updateLogEntry(subjectId, field, value) {
  if (!logs[currentLogDate]) logs[currentLogDate] = {};
  if (!logs[currentLogDate][subjectId]) logs[currentLogDate][subjectId] = {};
  logs[currentLogDate][subjectId][field] = value;
  saveLogs();
  if (field === 'hours') updateLogTotals();
}

function updateLogTotals() {
  const day = logs[currentLogDate] || {};
  const total = SUBJECTS.reduce(function(sum, s) {
    return sum + (parseFloat((day[s.id] || {}).hours) || 0);
  }, 0);
  const el = document.getElementById('log-total');
  if (el) el.textContent = total > 0 ? '合計 ' + total + '分' : '';
}

function renderLogView() {
  const today = todayStr();
  const isToday = currentLogDate === today;

  const d = new Date(currentLogDate + 'T00:00:00');
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const diff = Math.round(
    (new Date(currentLogDate + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000
  );

  document.getElementById('log-date-main').textContent =
    (d.getMonth() + 1) + '月' + d.getDate() + '日（' + weekdays[d.getDay()] + '）';
  var subEl = document.getElementById('log-date-sub');
  subEl.classList.toggle('today-badge', isToday);
  subEl.textContent =
    isToday     ? '今日' :
    diff === -1 ? '昨日' :
    diff === 1  ? '明日' :
    diff < 0    ? Math.abs(diff) + '日前' :
                  diff + '日後';
  document.getElementById('log-nav').classList.toggle('is-today', isToday);
  document.getElementById('today-link').classList.toggle('show', !isToday);

  const day = logs[currentLogDate] || {};
  const container = document.getElementById('log-entries');
  container.innerHTML = '';

  SUBJECTS.forEach(function(s) {
    const entry = day[s.id] || {};
    const safeRange = (entry.range || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');

    const card = document.createElement('div');
    card.className = 'log-entry-card';
    card.innerHTML =
      '<div class="log-entry-top">' +
        '<span class="log-subject-name">' + s.name + '</span>' +
        '<div class="log-hours-wrap">' +
          '<input class="log-hours-input" type="number" min="0" max="1440" step="5" placeholder="–"' +
            ' value="' + (entry.hours || '') + '"' +
            ' oninput="updateLogEntry(\'' + s.id + '\',\'hours\',this.value)">' +
          '<span class="log-hours-unit">分</span>' +
        '</div>' +
      '</div>' +
      '<input class="log-range-input" type="text" placeholder="勉強した範囲・内容"' +
        ' value="' + safeRange + '"' +
        ' oninput="updateLogEntry(\'' + s.id + '\',\'range\',this.value)">';
    container.appendChild(card);
  });

  updateLogTotals();
}

// ── Swipe detection (continuous drag) ────────────
(function() {
  var startX = 0, startY = 0, dragX = 0;
  var dragging = false, animating = false;
  var wrap  = document.getElementById('log-swipe-wrap');
  var inner = document.getElementById('log-slide-inner');

  wrap.addEventListener('touchstart', function(e) {
    if (animating) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragX = 0;
    dragging = false;
    inner.style.transition = 'none';
  }, { passive: true });

  wrap.addEventListener('touchmove', function(e) {
    if (animating) return;
    var dx = e.touches[0].clientX - startX;
    var dy = e.touches[0].clientY - startY;
    if (!dragging) {
      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
      if (Math.abs(dy) > Math.abs(dx)) return;
      dragging = true;
    }
    e.preventDefault();
    dragX = dx;
    inner.style.transform = 'translateX(' + dx + 'px)';
  }, { passive: false });

  wrap.addEventListener('touchend', function() {
    if (!dragging) return;
    dragging = false;
    var threshold = Math.min(80, window.innerWidth * 0.28);
    if (Math.abs(dragX) > threshold) {
      var dir = dragX > 0 ? -1 : 1;
      var slideOut = (dragX > 0 ? 1 : -1) * window.innerWidth;
      animating = true;
      inner.style.transition = 'transform 0.18s ease-out';
      inner.style.transform = 'translateX(' + slideOut + 'px)';
      setTimeout(function() {
        currentLogDate = offsetDate(currentLogDate, dir);
        renderLogView();
        var slideIn = (dragX > 0 ? -1 : 1) * window.innerWidth;
        inner.style.transition = 'none';
        inner.style.transform = 'translateX(' + slideIn + 'px)';
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            inner.style.transition = 'transform 0.22s ease-out';
            inner.style.transform = 'translateX(0)';
            setTimeout(function() { animating = false; }, 220);
          });
        });
      }, 180);
    } else {
      inner.style.transition = 'transform 0.2s ease-out';
      inner.style.transform = 'translateX(0)';
    }
  }, { passive: true });
})();

// ── Init ─────────────────────────────────────────
loadSettings();
loadLogs();
currentLogDate = todayStr();
updateHeader();
buildTable();
buildCards();
</script>
