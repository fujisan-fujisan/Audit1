<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>監査論 復習管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --text: #e8e8f0;
    --text2: #8888aa;
    --A: #f97b6b;
    --B: #f7c36a;
    --C: #6bcbf9;
    --circle: #4ecdc4;
    --triangle: #f7c36a;
    --cross: #f97b6b;
    --none: #3a3a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  header {
    background: linear-gradient(135deg, #1a1a22 0%, #12121a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-btn.A { --fc: var(--A); }
  .filter-btn.B { --fc: var(--B); }
  .filter-btn.C { --fc: var(--C); }
  .filter-btn.A.active { background: var(--A); border-color: var(--A); }
  .filter-btn.B.active { background: var(--B); border-color: var(--B); color: #111; }
  .filter-btn.C.active { background: var(--C); border-color: var(--C); color: #111; }

  .content {
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  .chapter {
    margin-bottom: 20px;
  }

  .chapter-header {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chapter-num {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 12px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: start;
    gap: 8px;
    padding: 10px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid transparent;
    transition: border-color 0.2s, background 0.2s;
    cursor: default;
  }

  .row:hover {
    border-color: var(--border);
    background: var(--surface2);
  }

  .row.hidden { display: none; }

  .row-left { min-width: 0; }

  .row-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .row-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 500;
  }

  .badge-A { background: rgba(249,123,107,0.15); color: var(--A); border: 1px solid rgba(249,123,107,0.3); }
  .badge-B { background: rgba(247,195,106,0.15); color: var(--B); border: 1px solid rgba(247,195,106,0.3); }
  .badge-C { background: rgba(107,203,249,0.15); color: var(--C); border: 1px solid rgba(107,203,249,0.3); }

  .date-label {
    font-size: 10px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  .memo-text {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    line-height: 1.5;
    word-break: break-all;
  }

  .row-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .understanding-btns {
    display: flex;
    gap: 4px;
  }

  .u-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
  }

  .u-btn:hover { transform: scale(1.1); }
  .u-btn.active-circle { background: rgba(78,205,196,0.2); border-color: var(--circle); color: var(--circle); }
  .u-btn.active-triangle { background: rgba(247,195,106,0.2); border-color: var(--triangle); color: var(--triangle); }
  .u-btn.active-cross { background: rgba(249,123,107,0.2); border-color: var(--cross); color: var(--cross); }

  .edit-btn {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
  }

  .modal h2 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
    line-height: 1.4;
  }

  .modal label {
    font-size: 12px;
    color: var(--text2);
    display: block;
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .modal input[type="date"],
  .modal textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal input[type="date"]:focus,
  .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 80px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .btn-save {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  .btn-cancel {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .stats {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>監査論 <span>復習管理</span></h1>
    <div class="stats">
      <div class="stat"><div class="dot" style="background:var(--circle)"></div><span id="stat-circle">0</span></div>
      <div class="stat"><div class="dot" style="background:var(--triangle)"></div><span id="stat-triangle">0</span></div>
      <div class="stat"><div class="dot" style="background:var(--cross)"></div><span id="stat-cross">0</span></div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label">0 / 0 節 完了</div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-btn A" data-filter="A" onclick="setFilter('A',this)">重要度 A</button>
    <button class="filter-btn B" data-filter="B" onclick="setFilter('B',this)">重要度 B</button>
    <button class="filter-btn C" data-filter="C" onclick="setFilter('C',this)">重要度 C</button>
    <button class="filter-btn" data-filter="未" onclick="setFilter('未',this)">未復習</button>
    <button class="filter-btn" data-filter="×" onclick="setFilter('×',this)">要復習 ×</button>
  </div>
</header>

<div class="content" id="content"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <label>復習日</label>
    <input type="date" id="modal-date">
    <label>メモ・コメント</label>
    <textarea id="modal-memo" placeholder="気になった点、次回の確認事項など..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<script>
const DATA = [
  { ch: "第１章", chName: "監査総論", sections: [
    { id:"1-1", name:"監査総論", imp:"C" },
    { id:"1-2", name:"監査基準論", imp:"A" },
  ]},
  { ch: "第２章", chName: "監査主体論と品質管理", sections: [
    { id:"2-1", name:"監査主体論", imp:"A" },
    { id:"2-2", name:"監査の品質管理", imp:"A" },
  ]},
  { ch: "第３章", chName: "監査実施論", sections: [
    { id:"3-1", name:"監査実施論－総論", imp:"A" },
    { id:"3-2", name:"確認", imp:"A" },
    { id:"3-3", name:"分析的手続", imp:"A" },
    { id:"3-4", name:"内部統制", imp:"A" },
    { id:"3-5", name:"リスク・アプローチ監査－総論", imp:"A" },
    { id:"3-6", name:"重要な虚偽表示リスクの識別と評価", imp:"A" },
    { id:"3-7", name:"評価した重要な虚偽表示リスクへの対応", imp:"A" },
    { id:"3-8", name:"リスク・アプローチに関するその他の論点", imp:"C" },
    { id:"3-9", name:"監査の計画及び実施における重要性", imp:"A" },
    { id:"3-10", name:"監査の過程で識別した虚偽表示の評価", imp:"B" },
    { id:"3-11", name:"監査計画", imp:"B" },
    { id:"3-12", name:"監査調書", imp:"B" },
    { id:"3-13", name:"監査サンプリング", imp:"C" },
    { id:"3-14", name:"会計上の見積りの監査", imp:"A" },
    { id:"3-15", name:"特定項目の監査証拠の入手", imp:"A" },
    { id:"3-16", name:"［事例対策］勘定別の監査手続", imp:"A" },
    { id:"3-17", name:"経営者確認書", imp:"A" },
  ]},
  { ch: "第４章", chName: "監査報告論", sections: [
    { id:"4-1", name:"監査意見－総論", imp:"A" },
    { id:"4-2", name:"監査報告書－総論", imp:"A" },
    { id:"4-3", name:"監査報告書の基本形", imp:"A" },
    { id:"4-4", name:"除外事項付意見を表明する場合の監査報告書", imp:"A" },
    { id:"4-5", name:"監査上の主要な検討事項", imp:"A" },
    { id:"4-6", name:"その他の記載内容", imp:"A" },
    { id:"4-7", name:"追記情報", imp:"A" },
    { id:"4-8", name:"監査報告に関するその他の論点", imp:"A" },
  ]},
  { ch: "第５章", chName: "他者の作業の利用", sections: [
    { id:"5-1", name:"グループ監査における特別な考慮事項", imp:"A" },
    { id:"5-2", name:"専門家の業務の利用", imp:"B" },
    { id:"5-3", name:"内部監査の利用", imp:"B" },
  ]},
  { ch: "第６章", chName: "その他の重要論点", sections: [
    { id:"6-1", name:"継続企業の前提に関する開示と監査", imp:"A" },
    { id:"6-2", name:"財務諸表監査における不正への対応", imp:"A" },
    { id:"6-3", name:"不正リスク対応基準", imp:"B" },
    { id:"6-4", name:"財務諸表監査における法令の検討", imp:"B" },
    { id:"6-5", name:"監査役等とのコミュニケーション", imp:"A" },
    { id:"6-6", name:"内部統制の不備に関するコミュニケーション", imp:"B" },
    { id:"6-7", name:"監査人の交代", imp:"B" },
    { id:"6-8", name:"初年度監査の期首残高の検討", imp:"C" },
    { id:"6-9", name:"関連当事者の監査", imp:"B" },
  ]},
  { ch: "第７章", chName: "年度の財務諸表監査以外の保証業務", sections: [
    { id:"7-1", name:"財務情報等に係る保証業務の概念的枠組み", imp:"C" },
    { id:"7-2", name:"期中レビュー", imp:"A" },
    { id:"7-3", name:"財務報告に係る内部統制の報告と監査", imp:"A" },
    { id:"7-4", name:"中間監査", imp:"C" },
  ]},
  { ch: "第８章", chName: "新しい保証業務", sections: [
    { id:"8-1", name:"特別目的の財務諸表の監査と準拠性の意見の表明", imp:"B" },
    { id:"8-2", name:"個別の財務表又は財務諸表項目等に対する監査", imp:"C" },
    { id:"8-3", name:"要約財務諸表に関する報告業務", imp:"C" },
  ]},
  { ch: "第９章", chName: "その他の諸論点", sections: [
    { id:"9-1", name:"IT環境下の監査", imp:"B" },
    { id:"9-2", name:"業務を委託している企業の監査上の留意事項", imp:"C" },
    { id:"9-3", name:"監査業務の契約条件の合意", imp:"C" },
  ]},
];

// State: { [id]: { understanding: 'circle'|'triangle'|'cross'|null, date: string, memo: string } }
let state = {};

function loadState() {
  try {
    const s = localStorage.getItem('audit-tracker-v1');
    if (s) state = JSON.parse(s);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('audit-tracker-v1', JSON.stringify(state)); } catch(e) {}
}

function getS(id) {
  return state[id] || { understanding: null, date: '', memo: '' };
}

let currentFilter = 'all';
let editingId = null;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderVisibility();
}

function renderVisibility() {
  document.querySelectorAll('.row').forEach(row => {
    const imp = row.dataset.imp;
    const u = row.dataset.understanding;
    let show = true;
    if (currentFilter === 'A') show = imp === 'A';
    else if (currentFilter === 'B') show = imp === 'B';
    else if (currentFilter === 'C') show = imp === 'C';
    else if (currentFilter === '未') show = (!u || u === 'null');
    else if (currentFilter === '×') show = u === 'cross';
    row.classList.toggle('hidden', !show);
  });
}

function setUnderstanding(id, type) {
  const s = getS(id);
  s.understanding = s.understanding === type ? null : type;
  if (!s.date && s.understanding) {
    s.date = new Date().toISOString().split('T')[0];
  }
  state[id] = s;
  saveState();
  refreshRow(id);
  updateProgress();
}

function refreshRow(id) {
  const s = getS(id);
  const row = document.getElementById('row-' + id);
  if (!row) return;
  row.dataset.understanding = s.understanding || '';

  ['circle','triangle','cross'].forEach(t => {
    const btn = row.querySelector('.u-btn[data-type="'+t+'"]');
    if (!btn) return;
    btn.classList.remove('active-circle','active-triangle','active-cross');
    if (s.understanding === t) btn.classList.add('active-' + t);
  });

  const dateEl = row.querySelector('.date-label');
  if (dateEl) dateEl.textContent = s.date ? '📅 ' + s.date : '';

  const memoEl = row.querySelector('.memo-text');
  if (memoEl) memoEl.textContent = s.memo || '';
}

function updateProgress() {
  const all = Object.keys(collectAllIds());
  const total = all.length;
  const done = all.filter(id => {
    const u = getS(id).understanding;
    return u === 'circle' || u === 'triangle';
  }).length;
  const cross = all.filter(id => getS(id).understanding === 'cross').length;
  const circle = all.filter(id => getS(id).understanding === 'circle').length;
  const triangle = all.filter(id => getS(id).understanding === 'triangle').length;

  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' / ' + total + ' 節 完了 (' + pct + '%)';
  document.getElementById('stat-circle').textContent = circle;
  document.getElementById('stat-triangle').textContent = triangle;
  document.getElementById('stat-cross').textContent = cross;
}

function collectAllIds() {
  const ids = {};
  DATA.forEach(ch => ch.sections.forEach(s => { ids[s.id] = true; }));
  return ids;
}

function openModal(id, name) {
  editingId = id;
  const s = getS(id);
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-date').value = s.date || new Date().toISOString().split('T')[0];
  document.getElementById('modal-memo').value = s.memo || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function saveModal() {
  if (!editingId) return;
  const s = getS(editingId);
  s.date = document.getElementById('modal-date').value;
  s.memo = document.getElementById('modal-memo').value;
  state[editingId] = s;
  saveState();
  refreshRow(editingId);
  closeModal();
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  DATA.forEach(ch => {
    const chDiv = document.createElement('div');
    chDiv.className = 'chapter';

    const chHeader = document.createElement('div');
    chHeader.className = 'chapter-header';
    chHeader.innerHTML = `<span class="chapter-num">${ch.ch}</span>${ch.chName}`;
    chDiv.appendChild(chHeader);

    ch.sections.forEach((sec, i) => {
      const s = getS(sec.id);
      const row = document.createElement('div');
      row.className = 'row';
      row.id = 'row-' + sec.id;
      row.dataset.imp = sec.imp;
      row.dataset.understanding = s.understanding || '';

      row.innerHTML = `
        <div class="row-left">
          <div class="row-title">第${i+1}節 ${sec.name}</div>
          <div class="row-meta">
            <span class="badge badge-${sec.imp}">${sec.imp}</span>
            <span class="date-label">${s.date ? '📅 ' + s.date : ''}</span>
          </div>
          <div class="memo-text">${s.memo || ''}</div>
        </div>
        <div class="row-right">
          <div class="understanding-btns">
            <button class="u-btn ${s.understanding==='circle'?'active-circle':''}" data-type="circle" onclick="setUnderstanding('${sec.id}','circle')" title="理解できた">○</button>
            <button class="u-btn ${s.understanding==='triangle'?'active-triangle':''}" data-type="triangle" onclick="setUnderstanding('${sec.id}','triangle')" title="なんとなく">△</button>
            <button class="u-btn ${s.understanding==='cross'?'active-cross':''}" data-type="cross" onclick="setUnderstanding('${sec.id}','cross')" title="要復習">×</button>
          </div>
          <button class="edit-btn" onclick="openModal('${sec.id}','第${i+1}節 ${sec.name}')">メモ</button>
        </div>
      `;
      chDiv.appendChild(row);
    });

    content.appendChild(chDiv);
  });
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadState();
render();
updateProgress();
</script>
</body>
</html>
