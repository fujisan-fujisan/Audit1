<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="icons/zaimu-keisan.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>財務会計論（計算）復習管理</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="財務計算">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">


<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #e8e8e5;
  --border-strong: #d0d0cb;
  --text: #111111;
  --text-2: #666666;
  --text-3: #aaaaaa;
  --o-color: #1a7a4a;
  --o-bg: #edf7f2;
  --x-color: #c0392b;
  --x-bg: #fdf0ee;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding-bottom: 80px;
  font-size: 14px; line-height: 1.5;
}

/* HEADER */
.header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); }
.header-top { padding: 12px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
.app-title { font-size: 11px; font-weight: 700; letter-spacing: .12em; color: var(--text-3); text-transform: uppercase; }
.header-actions { display: flex; gap: 6px; }
.btn-sm { padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: transparent; color: var(--text-2); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn-sm:hover, .btn-sm.active { background: var(--text); border-color: var(--text); color: #fff; }


.imp-badge { font-size: 13px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
.imp-A { background: #fdf0ee; color: #c0392b; }
.imp-B { background: #fdf4e3; color: #7c5c00; }
.imp-hidden { display: none; }
.tabs { display: flex; border-top: 1px solid var(--border); }
.tab { flex: 1; padding: 10px 8px; font-size: 12px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; background: transparent; border: none; cursor: pointer; color: var(--text-3); border-bottom: 2px solid transparent; transition: all .15s; }
.tab.active { color: var(--text); border-bottom-color: var(--text); }

/* CONTENT */
.content { padding: 12px 14px; max-width: 700px; margin: 0 auto; }

/* CHAPTER GROUP */
.ch-group { margin-bottom: 10px; }
.ch-group-header { display: flex; align-items: center; gap: 8px; padding: 12px 14px; cursor: pointer; user-select: none; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.ch-group.open .ch-group-header { border-radius: var(--radius) var(--radius) 0 0; background: var(--text); }
.ch-group.open .ch-group-title { color: #fff; }
.ch-group.open .ch-group-count { color: rgba(255,255,255,0.6); }
.ch-group.open .ch-group-chevron { color: rgba(255,255,255,0.7); }
.ch-group-header:active { background: var(--bg); }
.ch-group-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.ch-group-body { display: none; margin-left: 12px; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
.ch-group.open .ch-group-body { display: block; }
.ch-group-body .prob-card { border-radius: 0; border-left: none; border-right: none; border-top: none; margin-bottom: 0; }
.ch-group-body .prob-card:last-child { border-bottom: none; }

/* PROBLEM CARD */
.prob-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.prob-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.prob-header:active { background: var(--bg); }

/* 左側：タイトル + 問題番号 */
.prob-left { flex: 1; min-width: 0; }
.prob-title { font-size: 13px; font-weight: 700; }
.prob-id-sub { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', monospace; margin-top: 1px; }

/* 右側：実施情報 横並び */
.prob-right { display: flex; flex-direction: row; align-items: center; gap: 4px; flex-shrink: 0; }
.prob-right-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.prob-right-item:nth-child(1) { min-width: 52px; }
.prob-right-item:nth-child(2) { min-width: 48px; }
.prob-right-item:nth-child(3) { min-width: 40px; }
.prob-right-val { font-size: 17px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; line-height: 1; color: #1a3a6e; text-align: center; }
.prob-right-eval-val { font-size: 17px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; line-height: 1; text-align: center; }
.prob-right-lbl { font-size: 8px; color: var(--text-3); letter-spacing: .06em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.eval-oo { color: #1a7a4a; }
.eval-o  { color: var(--o-color); }
.eval-n  { color: #777; }
.eval-x  { color: var(--x-color); }
.eval-xx { color: #900; }
.eval-none { color: var(--text-3); }

/* PROB DETAIL MODAL */
.prob-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 150; align-items: center; justify-content: center; padding: 20px; }
.prob-detail-overlay.open { display: flex; }
.prob-detail-modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.25); }
.prob-detail-header { background: var(--bg); border-radius: 14px 14px 0 0; padding: 16px 16px 14px; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--border); }
.prob-detail-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
.prob-detail-meta { display: flex; gap: 16px; align-items: center; }
.prob-detail-close { position: absolute; top: 14px; right: 14px; background: rgba(0,0,0,0.08); border: none; color: var(--text-2); width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.prob-detail-body { padding: 0; }
.prob-detail-hist { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
.prob-detail-actions { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.prob-detail-sub { padding: 10px 16px; display: flex; gap: 6px; align-items: center; }
.prob-detail-delete { padding: 10px 16px 16px; }

/* 記録するボタン */
.btn-record { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--text); color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .04em; }
.btn-record:active { opacity: .85; }

.hist-empty { font-size: 11px; color: var(--text-3); text-align: center; padding: 10px 0; }
.hist-entry { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; }
.hist-entry-header { padding: 8px 12px; display: flex; gap: 8px; align-items: center; background: var(--bg); }
.hist-entry-num { font-size: 10px; font-weight: 700; color: var(--text-3); font-family: 'DM Mono', monospace; min-width: 20px; }
.hist-entry-date { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.hist-entry-time { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.hist-entry-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.hist-ronten-row { display: flex; align-items: center; gap: 6px; }
.hist-ronten-name { font-size: 11px; color: var(--text); flex: 1; line-height: 1.4; }

.prob-meta-badge { font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: 'Zen Maru Gothic', sans-serif; }
.badge-oo { background: #e8f7f0; color: #1a7a4a; }
.badge-o  { background: var(--o-bg); color: var(--o-color); }
.badge-n  { background: #f0f0ee; color: #555; }
.badge-x  { background: var(--x-bg); color: var(--x-color); }
.badge-xx { background: #fde; color: #900; }
.badge-none { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }

/* サブコントロール */
.prob-sub-controls { padding: 10px 14px 10px 24px; display: flex; gap: 6px; align-items: center; }
.btn-sub { padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: transparent; color: var(--text-2); font-family: 'Noto Sans JP', sans-serif; font-size: 11px; cursor: pointer; white-space: nowrap; transition: all .15s; }
.btn-sub:hover { border-color: var(--text); color: var(--text); }
.move-btns { display: flex; gap: 2px; margin-left: auto; }
.move-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border-strong); background: var(--bg); color: var(--text-3); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; }
.move-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }
.move-btn:disabled { opacity: .3; cursor: default; }
.move-btn:disabled:hover { background: var(--bg); color: var(--text-3); border-color: var(--border-strong); }
.del-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border-strong); background: var(--bg); color: var(--text-3); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; }
.del-btn:hover { background: var(--x-bg); color: var(--x-color); border-color: var(--x-color); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 300; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 16px 44px; width: 100%; max-width: 700px; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 32px; height: 3px; background: var(--border-strong); border-radius: 999px; margin: 0 auto 16px; }
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.modal-subtitle { font-size: 11px; color: var(--text-2); margin-bottom: 16px; }
.modal-step { display: none; }
.modal-step.active { display: block; }

/* step indicator */
.step-indicator { display: flex; gap: 6px; align-items: center; margin-bottom: 16px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); transition: background .2s; }
.step-dot.active { background: var(--text); }
.step-label { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; }

/* form elements */
.form-section { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text-2); display: block; margin-bottom: 5px; letter-spacing: .04em; }
.form-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 8px 10px; outline: none; -webkit-appearance: none; appearance: none; }
.form-input:focus { border-color: var(--text); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* eval buttons */
.u-btns { display: flex; gap: 3px; flex-wrap: wrap; }
.ub { min-width: 44px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; color: var(--text-3); font-family: 'Noto Sans JP', sans-serif; padding: 0 6px; }
.ub:active { transform: scale(.9); }
.ub.sel-oo { background: #e8f7f0; border-color: #1a7a4a; color: #1a7a4a; }
.ub.sel-o  { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.ub.sel-n  { background: #f0f0ee; border-color: #999; color: #555; }
.ub.sel-x  { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.ub.sel-xx { background: #fde; border-color: #900; color: #900; }
.rb { min-width: 38px; height: 28px; border-radius: 4px; border: 1px solid var(--border-strong); background: var(--bg); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; color: var(--text-3); font-family: 'Noto Sans JP', sans-serif; padding: 0 4px; }
.rb:active { transform: scale(.9); }
.rb.sel-oo { background: #e8f7f0; border-color: #1a7a4a; color: #1a7a4a; }
.rb.sel-o  { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.rb.sel-n  { background: #f0f0ee; border-color: #999; color: #555; }
.rb.sel-x  { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.rb.sel-xx { background: #fde; border-color: #900; color: #900; }

/* ronten item in modal */
.modal-ronten-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.modal-ronten-item:last-child { border-bottom: none; }
.modal-ronten-name { font-size: 12px; color: var(--text); margin-bottom: 6px; line-height: 1.5; }

/* modal buttons */
.modal-btns { display: flex; gap: 8px; margin-top: 16px; }
.btn-cancel { flex: 1; padding: 11px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-strong); background: transparent; color: var(--text-2); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; }
.btn-next { flex: 2; padding: 11px; border-radius: var(--radius-sm); border: none; background: var(--text); color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-next:disabled { opacity: .4; pointer-events: none; }

/* RONTEN EDIT MODAL */
.ronten-edit-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.ronten-edit-item { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.ronten-edit-name { flex: 1; font-size: 12px; }
.ronten-edit-del { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--border-strong); background: transparent; color: var(--text-3); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.ronten-edit-del:hover { background: var(--x-bg); color: var(--x-color); border-color: var(--x-color); }
.ronten-add-row { display: flex; gap: 6px; }
.ronten-add-input { flex: 1; background: var(--surface); border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 7px 10px; outline: none; }
.ronten-add-input:focus { border-color: var(--text); }
.btn-add-ronten { padding: 7px 12px; border-radius: var(--radius-sm); border: none; background: var(--text); color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* ADD PROBLEM */
.add-section { background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
.add-select { flex: 1; background: var(--surface); border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 7px 10px; outline: none; -webkit-appearance: none; appearance: none; }
.btn-add { padding: 7px 14px; border-radius: var(--radius-sm); border: none; background: var(--text); color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }

.ronten-ch-group { margin-bottom: 10px; }
.ronten-ch-group-body { display: none; margin-left: 12px; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
.ronten-ch-group.open .ronten-ch-group-body { display: block; }
.ronten-ch-group .ch-group-header { border-radius: var(--radius); }
.ronten-ch-group.open .ch-group-header { border-radius: var(--radius) var(--radius) 0 0; background: var(--text); }
.ronten-ch-group.open .ch-group-title { color: #fff; }
.ronten-ch-group.open .ch-group-count { color: rgba(255,255,255,0.6); }
.ronten-ch-group.open .ch-group-chevron { color: rgba(255,255,255,0.7); }
.ronten-ch-group-body .ronten-row { border-radius: 0; border-left: none; border-right: none; border-top: none; margin-bottom: 0; }
.ronten-ch-group-body .ronten-row:last-child { border-bottom: none; }
.ronten-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; overflow: hidden; }
.ronten-row-header { padding: 8px 12px; display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
.ronten-row-header:active { background: var(--bg); }
.ronten-row-name { flex: 1; font-size: 12px; font-weight: 500; line-height: 1.4; }
.ronten-row-latest { flex-shrink: 0; }
.ronten-avg-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.ronten-avg-num { font-size: 9px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.ronten-row-body { display: none; border-top: 1px solid var(--border); padding: 8px 12px; overflow-x: auto; }
.ronten-row.open .ronten-row-body { display: block; }
.ronten-hist-table { display: flex; gap: 6px; }
.ronten-hist-col { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 52px; }
.ronten-hist-prob { font-size: 9px; color: var(--text-3); font-family: 'DM Mono', monospace; text-align: center; white-space: nowrap; }
.ronten-hist-date { font-size: 8px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.ronten-hist-chip { min-width: 36px; height: 22px; border-radius: 4px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans JP', sans-serif; }
.chip-oo { background: #e8f7f0; color: #1a7a4a; }
.chip-o  { background: var(--o-bg); color: var(--o-color); }
.chip-n  { background: #f0f0ee; color: #555; }
.chip-x  { background: var(--x-bg); color: var(--x-color); }
.chip-xx { background: #fde; color: #900; }
.chip-none { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }

/* URGENT TAB */
.urgent-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
.urgent-review-btns { display: flex; gap: 8px; }
.ub-rev { flex: 1; height: 38px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-strong); background: var(--bg); font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; color: var(--text-3); font-family: 'Noto Sans JP', sans-serif; }
.ub-rev:active { transform: scale(.95); }
.ub-rev.sel-x { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.ub-rev.sel-o-btn { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.urgency-wrap { display: flex; align-items: center; gap: 7px; margin-top: 6px; }
.urgency-score { font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; min-width: 32px; flex-shrink: 0; }
.urgency-track { flex: 1; height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
.urgency-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }

/* 章理解度スコア */
.ch-score-badge { font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; min-width: 36px; text-align: right; flex-shrink: 0; }
.ch-score-badge.score-high   { color: #1a7a4a; }
.ch-score-badge.score-mid    { color: #d4a017; }
.ch-score-badge.score-low    { color: #c0392b; }
.ch-score-badge.score-none   { color: var(--text-3); }
.ch-group.open .ch-score-badge { opacity: 0.7; }

.empty-state { text-align: center; padding: 48px 16px; color: var(--text-3); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">財務会計論（計算）復習管理</div>
    <div class="header-actions">
      <button class="btn-sm" onclick="exportData()">バックアップ</button>
      <button class="btn-sm" onclick="document.getElementById('import-input').click()">復元</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('problems',this)">問題</button>
    <button class="tab" onclick="setTab('ronten',this)">論点</button>
    <button class="tab" onclick="setTab('urgent',this)">要復習</button>
  </div>
</div>

<div id="tab-problems" class="content"></div>
<div id="tab-ronten" class="content" style="display:none"></div>
<div id="tab-urgent" class="content" style="display:none"></div>

<!-- RECORD MODAL -->
<div class="modal-overlay" id="record-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>

const STORE_KEY = 'zaimu-keisan-v2';
const EVAL_LABELS = { oo:'○○', o:'○', n:'ー', x:'×', xx:'××' };
const LEARN_DAYS = { oo:14, o:10, n:7, x:4, xx:2 };

let state = { problems: ALL_PROBLEMS.map(p=>p.id), ronten: {}, history: {} };

function load() {
  try { const s = localStorage.getItem(STORE_KEY); if(s) state = JSON.parse(s); } catch(e){}
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){}
}
function today() { return new Date().toISOString().split('T')[0]; }
function getAllProblems() {
  return [...ALL_PROBLEMS, ...(state.customProblems || [])];
}
function getProbById(id) {
  return getAllProblems().find(p => p.id === id);
}
function getRonten(probId) {
  const prob = getProbById(probId);
  const pool = CHAPTER_RONTEN_POOL[prob?.ch] || [];
  const list = state.ronten[probId] || prob?.defaultRonten || [];
  return [...list].sort((a, b) => {
    const ai = pool.indexOf(a);
    const bi = pool.indexOf(b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
}
function getHistory(probId) { return state.history[probId] || []; }
function getLatest(probId) {
  const h = getHistory(probId);
  return h.length > 0 ? h[h.length-1] : null;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  const p = dateStr.split('-');
  if (p.length < 3) return dateStr;
  return `${parseInt(p[1])}/${parseInt(p[2])}`;
}
// 復習サイクル日数の定義（評価別）
const REVIEW_DAYS_AFTER_X = { oo:7, o:5, n:3, x:2, xx:1 }; // 要復習タブで×を押した後の再復習サイクル

function calcUrgency(probId) {
  const latest = getLatest(probId);
  if (!latest || !latest.eval || !latest.date) return null;

  // ○覚えた済みは要復習に出さない
  if (latest.reviewPassed === true) return null;

  // 要復習タブで×を押した場合：reviewDate基準で短いサイクルで再表示
  if (latest.reviewDate && !latest.reviewPassed) {
    const days = REVIEW_DAYS_AFTER_X[latest.eval] || 3;
    const diff = Math.floor((Date.now() - new Date(latest.reviewDate).getTime()) / 86400000);
    return Math.min(100, Math.round(diff / days * 100));
  }

  // 通常：問題を解いた日（date）からの経過日数で判定
  const days = LEARN_DAYS[latest.eval] || 7;
  const diff = Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000);
  return Math.min(100, Math.round(diff / days * 100));
}
function urgencyColor(score) {
  if (score >= 80) return '#c0392b';
  if (score >= 55) return '#e67e22';
  if (score >= 30) return '#d4a017';
  return '#1a7a4a';
}


// ── 章理解度スコア計算 ──
const IMP_WEIGHT = { A: 2, B: 1 };
const EVAL_SCORE_MAP = { oo:5, o:4, n:3, x:2, xx:1 };

function calcChapterScore(probIds) {
  const total = probIds.length;
  if (total === 0) return null;

  const done = probIds.filter(id => getLatest(id));
  const doneRatio = done.length / total;

  // 50%未満実施は強制0
  if (doneRatio < 0.5) return 0;

  // 最新学習日を取得
  let latestDate = null;
  done.forEach(id => {
    const lat = getLatest(id);
    if (lat?.date && (!latestDate || lat.date > latestDate)) latestDate = lat.date;
  });
  if (!latestDate) return 0;

  const days = Math.floor((Date.now() - new Date(latestDate).getTime()) / 86400000);

  // freshness（①用）
  const fresh1 = days <= 14 ? 1.0 : days <= 28 ? 0.76 : 0.55;
  // 鮮度（③用）
  const fresh3 = Math.max(0, 1 - days / 60);

  // 重み付きスコア計算
  let ws = 0, wmax = 0;
  probIds.forEach(id => {
    const lat = getLatest(id);
    const prob = getProbById(id);
    const w = IMP_WEIGHT[prob?.imp] || 1;
    const s = lat ? (EVAL_SCORE_MAP[lat.eval] || 0) : 0;
    ws += s * w;
    wmax += 5 * w;
  });

  const s1 = (ws / wmax) * 100 * fresh1;
  const s3 = (ws / wmax) * fresh3 * 100;
  return Math.min(100, Math.round((s1 + s3) / 2));
}

function scoreClass(score) {
  if (score === null) return 'score-none';
  if (score >= 80) return 'score-high';
  if (score >= 40) return 'score-mid';
  return 'score-low';
}

let curTab = 'problems';
function setTab(tab, btn) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['problems','ronten','urgent'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if (tab==='problems') renderProblems();
  if (tab==='ronten') renderRonten();
  if (tab==='urgent') renderUrgent();
}

// ── PROBLEMS TAB ──
function renderProblems() {
  const ct = document.getElementById('tab-problems');
  const openChapters = new Set();
  document.querySelectorAll('.ch-group.open').forEach(el => openChapters.add(el.dataset.ch));

  ct.innerHTML = '';

  const chapters = {};
  const chapterOrder = [];
  state.problems.forEach(probId => {
    const prob = getProbById(probId);
    if (!prob) return;
    if (!chapters[prob.ch]) { chapters[prob.ch] = []; chapterOrder.push(prob.ch); }
    chapters[prob.ch].push(probId);
  });

  // テキスト章番号順にソート
  chapterOrder.sort((a, b) => {
    const ai = CHAPTER_ORDER.indexOf(a);
    const bi = CHAPTER_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  chapterOrder.forEach(ch => {
    const probIds = chapters[ch];
    const chDisplay = ch.replace('第', '').replace(' ', '　');
    const textNum = CHAPTER_TEXT_NUM[ch] || '';

    const group = document.createElement('div');
    group.className = 'ch-group' + (openChapters.has(ch) ? ' open' : '');
    group.dataset.ch = ch;

    const groupHeader = document.createElement('div');
    groupHeader.className = 'ch-group-header';
    groupHeader.onclick = () => group.classList.toggle('open');
    const chScore = calcChapterScore(probIds);
    const chScoreLabel = chScore === null ? '–' : chScore;
    const chScoreCls = scoreClass(chScore);
    groupHeader.innerHTML = `
      <span class="ch-group-title">${chDisplay}${textNum ? ' <span style="font-size:11px;font-weight:500;opacity:0.7;">ー' + textNum + '</span>' : ''}</span>
      <span class="ch-score-badge ${chScoreCls}">${chScoreLabel}</span>`;
    group.appendChild(groupHeader);

    const groupBody = document.createElement('div');
    groupBody.className = 'ch-group-body';

    probIds.forEach((probId) => {
      const prob = getProbById(probId);
      if (!prob) return;
      const latest = getLatest(probId);
      const evalVal = latest?.eval || null;
      const evalLabel = evalVal ? EVAL_LABELS[evalVal] : null;

      let daysStr = '';
      if (latest?.date) {
        const diff = Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000);
        daysStr = diff === 0 ? '今日' : `${diff}日前`;
      }

      const rightHtml = latest ? `
        <div class="prob-right">
          <div class="prob-right-item"><span class="prob-right-val">${daysStr}</span></div>
          <div class="prob-right-item"><span class="prob-right-val">${latest.time ? latest.time+'分' : '–'}</span></div>
          <div class="prob-right-item"><span class="prob-right-eval-val eval-${evalVal || 'none'}">${evalLabel || '–'}</span></div>
        </div>` : `
        <div class="prob-right"><span style="font-size:11px;color:var(--text-3);">未実施</span></div>`;

      const impClass = prob.imp === 'A' ? 'imp-badge imp-A'
        : prob.imp === 'B' ? 'imp-badge imp-B'
        : 'imp-badge imp-hidden';
      const impText = (prob.imp === 'A' || prob.imp === 'B') ? prob.imp : '';

      const card = document.createElement('div');
      card.className = 'prob-card';
      card.dataset.probId = probId;

      card.innerHTML = `
        <div class="prob-header" onclick="openProbDetail('${probId}')">
          <span class="${impClass}">${impText}</span>
          <div class="prob-left">
            <div class="prob-title">${prob.title}</div>
            <div class="prob-id-sub">${prob.id.startsWith('custom-') ? (prob.num || '') : prob.id}</div>
          </div>
          ${rightHtml}
        </div>`;

      groupBody.appendChild(card);
    });

    group.appendChild(groupBody);
    ct.appendChild(group);
  });

  const addDiv = document.createElement('div');
  addDiv.className = 'add-section';
  addDiv.innerHTML = `<button class="btn-add" style="width:100%;padding:10px;" onclick="openNewProbModal()">＋ 問題を追加する</button>`;
  ct.appendChild(addDiv);
}

  const hist = getHistory(probId);
  const latest = getLatest(probId);
  const idxInAll = state.problems.indexOf(probId);
  if (!prob) return;

  const idLabel = prob.num || (prob.id.startsWith('custom-') ? '' : prob.id);
  document.getElementById('pd-title').textContent = prob.title;

  const evalVal = latest?.eval || null;
  const evalLabel = evalVal ? EVAL_LABELS[evalVal] : null;
  let daysStr = '未実施';
  if (latest?.date) {
    const diff = Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000);

  ` : `<span style="font-size:12px;color:var(--text-3);">未実施</span>`;

  const histHtml = hist.length === 0
    ? `<div class="hist-empty">まだ記録がありません</div>`
    : [...hist].reverse().map((entry, i) => {
        const num = hist.length - i;
        const rontenRows = Object.entries(entry.ronten || {}).map(([name, val]) => `
          <div class="hist-ronten-row">
            <span class="hist-ronten-name">${name}</span>

          <div class="hist-entry">
            <div class="hist-entry-header">
              <span class="hist-entry-num">#${num}</span>

          </div>`;
      }).join('');
  document.getElementById('pd-hist').innerHTML = histHtml;

  document.getElementById('pd-record-btn').onclick = () => {
    closeProbDetailDirect();
    openModal(probId);
  };

  document.getElementById('pd-sub').innerHTML = `
    <button class="btn-sub" onclick="closeProbDetailDirect();openEditModal('${probId}')">論点を編集する</button>
    <div class="move-btns" style="margin-left:auto;">
      <button class="move-btn" onclick="moveProblem('${probId}',-1)" ${idxInAll===0?'disabled':''}>↑</button>
      <button class="move-btn" onclick="moveProblem('${probId}',1)" ${idxInAll===state.problems.length-1?'disabled':''}>↓</button>
    </div>`;

  document.getElementById('pd-delete').innerHTML = `
    <button onclick="closeProbDetailDirect();deleteProblem('${probId}')" style="width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:transparent;color:var(--text-3);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;">この問題を削除する</button>`;

  document.getElementById('prob-detail-overlay').classList.add('open');
}

function closeProbDetail(e) {
  if (e.target === document.getElementById('prob-detail-overlay')) closeProbDetailDirect();
}
function closeProbDetailDirect() {
  document.getElementById('prob-detail-overlay').classList.remove('open');
}

function moveProblem(probId, dir) {
  const idx = state.problems.indexOf(probId);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= state.problems.length) return;
  state.problems.splice(idx, 1);
  state.problems.splice(newIdx, 0, probId);
  save(); renderProblems();
}
function deleteProblem(probId) {
  const prob = getProbById(probId);
  if (!confirm(`「${prob?.title}」を一覧から削除しますか？\n（評価データは保持されます）`)) return;
  state.problems = state.problems.filter(id=>id!==probId);
  save(); renderProblems();
}

// ── RECORD MODAL ──
let modalProbId = null;
let modalEval = null;
let modalRontenEvals = {};

function openModal(probId) {
  modalProbId = probId;
  modalEval = null;
  modalRontenEvals = {};
  const prob = getProbById(probId);
  document.getElementById('modal-title').textContent = `[${probId}] ${prob.title}`;
  document.getElementById('modal-subtitle').textContent = '問題の評価と論点を記録します';
  document.getElementById('modal-date').value = today();
  document.getElementById('modal-time').value = '';

  document.querySelectorAll('#modal-prob-btns .ub').forEach(b=>b.className='ub');
  document.getElementById('step1-next').disabled = true;

  goStep1();
  document.getElementById('record-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('record-modal').classList.remove('open');
}

function selectModalEval(val) {
  modalEval = val;
  document.querySelectorAll('#modal-prob-btns .ub').forEach((b,i) => {
    const v = ['oo','o','n','x','xx'][i];
    b.className = 'ub' + (v===val ? ' sel-'+v : '');
  });
  document.getElementById('step1-next').disabled = false;
}

function goStep1() {
  document.getElementById('modal-step1').classList.add('active');
  document.getElementById('modal-step2').classList.remove('active');
  document.getElementById('step-dot-1').classList.add('active');
  document.getElementById('step-dot-2').classList.remove('active');
  document.getElementById('step-label').textContent = 'ステップ 1 / 2';
}

function goStep2() {
  if (!modalEval) return;
  const rontenList = getRonten(modalProbId);
  const listEl = document.getElementById('modal-ronten-list');
  listEl.innerHTML = rontenList.map(name => {
    const vals = ['oo','o','n','x','xx'];
    const labels = ['○○','○','ー','×','××'];
    return `
      <div class="modal-ronten-item">
        <div class="modal-ronten-name">${name}</div>
        <div class="u-btns">
          ${vals.map((v,i)=>`<button class="rb" data-name="${name}" data-val="${v}" onclick="selectRontenEval(this,'${name}','${v}')">${labels[i]}</button>`).join('')}
        </div>
      </div>`;
  }).join('');

  document.getElementById('modal-step1').classList.remove('active');
  document.getElementById('modal-step2').classList.add('active');
  document.getElementById('step-dot-1').classList.remove('active');
  document.getElementById('step-dot-2').classList.add('active');
  document.getElementById('step-label').textContent = 'ステップ 2 / 2';
}

function selectRontenEval(btn, name, val) {
  if (modalRontenEvals[name] === val) {
    modalRontenEvals[name] = null;
    btn.closest('.u-btns').querySelectorAll('.rb').forEach(b => b.className = 'rb');
    return;
  }
  modalRontenEvals[name] = val;
  btn.closest('.u-btns').querySelectorAll('.rb').forEach(b => {
    const bv = b.dataset.val;
    b.className = 'rb' + (bv===val ? ' sel-'+val : '');
  });
}

function saveRecord() {
  if (!modalProbId || !modalEval) return;
  const date = document.getElementById('modal-date').value || today();
  const time = document.getElementById('modal-time').value || '';
  const entry = {
    id: Date.now(),
    eval: modalEval,
    date,
    time,
    ronten: { ...modalRontenEvals }
  };
  if (!state.history[modalProbId]) state.history[modalProbId] = [];
  state.history[modalProbId].push(entry);
  save();
  closeModal();
  renderProblems();
  if (curTab === 'ronten') renderRonten();
  if (curTab === 'urgent') renderUrgent();
}

// ── RONTEN EDIT MODAL ──
let editProbId = null;

function openEditModal(probId) {
  editProbId = probId;
  const prob = getProbById(probId);
  document.getElementById('edit-modal-title').textContent = `[${probId}] 論点を編集`;
  renderEditList();
  renderEditSelect();
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editProbId = null;
  renderProblems();
}

function renderEditList() {
  const list = getRonten(editProbId);
  const el = document.getElementById('ronten-edit-list');
  el.innerHTML = list.length === 0
    ? `<div style="font-size:11px;color:var(--text-3);text-align:center;padding:10px 0;">論点が設定されていません</div>`
    : list.map((name, idx) => `
      <div class="ronten-edit-item">
        <span class="ronten-edit-name">${name}</span>
        <button class="ronten-edit-del" onclick="deleteRonten(${idx})">✕</button>
      </div>`).join('');
}

function renderEditSelect() {
  const prob = getProbById(editProbId);
  const ch = prob?.ch;
  const pool = CHAPTER_RONTEN_POOL[ch] || [];
  const current = getRonten(editProbId);
  const available = pool.filter(name => !current.includes(name));
  const sel = document.getElementById('ronten-add-select');
  sel.innerHTML = available.length === 0
    ? `<option value="">追加できる論点がありません</option>`
    : `<option value="">論点を選択して追加...</option>`
      + available.map(name => `<option value="${name}">${name}</option>`).join('');
}

function deleteRonten(idx) {
  const list = [...getRonten(editProbId)];
  list.splice(idx, 1);
  state.ronten[editProbId] = list;
  save(); renderEditList(); renderEditSelect();
}

function addRonten() {
  const sel = document.getElementById('ronten-add-select');
  const val = sel.value;
  if (!val) return;
  const list = [...getRonten(editProbId)];
  if (list.includes(val)) return;
  list.push(val);
  state.ronten[editProbId] = list;
  save(); renderEditList(); renderEditSelect();
}

// ── RONTEN TAB ──
function renderRonten() {
  const ct = document.getElementById('tab-ronten');
  ct.innerHTML = '';

  const rontenMap = {};
  state.problems.forEach(probId => {
    const hist = getHistory(probId);
    const rontenList = getRonten(probId);
    rontenList.forEach(name => {
      if (!rontenMap[name]) rontenMap[name] = [];
      hist.forEach(entry => {
        const val = (entry.ronten || {})[name];
        if (val) {
          rontenMap[name].push({ probId, probTitle: getProbById(probId)?.title || probId, date: entry.date, eval: val });
        }
      });
    });
  });

  const chapterRonten = {};
  state.problems.forEach(probId => {
    const prob = getProbById(probId);
    if (!prob) return;
    // プール全体を論点タブに表示（修正済み）
    const pool = CHAPTER_RONTEN_POOL[prob.ch] || [];
    pool.forEach(name => {
      if (!chapterRonten[prob.ch]) chapterRonten[prob.ch] = [];
      if (!chapterRonten[prob.ch].includes(name)) chapterRonten[prob.ch].push(name);
    });
  });

  // 各章の論点をプール順にソート
  Object.keys(chapterRonten).forEach(ch => {
    const pool = CHAPTER_RONTEN_POOL[ch] || [];
    chapterRonten[ch].sort((a, b) => {
      const ai = pool.indexOf(a);
      const bi = pool.indexOf(b);
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  });

  const EVAL_SCORE = { oo: 5, o: 4, n: 3, x: 2, xx: 1 };
  const SCORE_LABEL = (avg) => {
    if (avg === null) return { label: '–', cls: 'badge-none' };
    if (avg >= 4.5) return { label: '○○', cls: 'badge-oo' };
    if (avg >= 3.5) return { label: '○',  cls: 'badge-o'  };
    if (avg >= 2.5) return { label: 'ー', cls: 'badge-n'  };
    if (avg >= 1.5) return { label: '×',  cls: 'badge-x'  };
    return               { label: '××', cls: 'badge-xx' };
  };

  const openChs = new Set();
  document.querySelectorAll('.ronten-ch-group.open').forEach(el => openChs.add(el.dataset.ch));

  // 論点タブもテキスト章番号順にソート
  const sortedRontenChs = Object.keys(chapterRonten).sort((a, b) => {
    const ai = CHAPTER_ORDER.indexOf(a);
    const bi = CHAPTER_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  sortedRontenChs.forEach(ch => {
    const rontenList = chapterRonten[ch];
    const chDisplay = ch.replace('第', '').replace(' ', '　');
    const textNumR = CHAPTER_TEXT_NUM[ch] || '';

    const group = document.createElement('div');
    group.className = 'ronten-ch-group' + (openChs.has(ch) ? ' open' : '');
    group.dataset.ch = ch;

    const groupHeader = document.createElement('div');
    groupHeader.className = 'ch-group-header';
    groupHeader.onclick = () => group.classList.toggle('open');
    groupHeader.innerHTML = `
      <span class="ch-group-title">${chDisplay}${textNumR ? ' <span style="font-size:11px;font-weight:500;opacity:0.7;">ー' + textNumR + '</span>' : ''}</span>`;
    group.appendChild(groupHeader);

    const groupBody = document.createElement('div');
    groupBody.className = 'ronten-ch-group-body';

    rontenList.forEach(name => {
      const entries = rontenMap[name] || [];
      const scores = entries.map(e => EVAL_SCORE[e.eval]).filter(Boolean);
      const avg = scores.length > 0 ? scores.reduce((a,b) => a+b, 0) / scores.length : null;
      const { label: avgLabel, cls: avgCls } = SCORE_LABEL(avg);

      const row = document.createElement('div');
      row.className = 'ronten-row';

      const histCols = entries.map(e => {
        const label = EVAL_LABELS[e.eval] || '–';
        const probShort = e.probId;
        const dateShort = fmtDate(e.date);
        return `
          <div class="ronten-hist-col">
            <span class="ronten-hist-prob">${probShort}</span>
            <div class="ronten-hist-chip chip-${e.eval}">${label}</div>
            <span class="ronten-hist-date">${dateShort}</span>
          </div>`;
      }).join('');

      const avgBadge = `<span class="prob-meta-badge ${avgCls}">${avgLabel}</span>`;

      row.innerHTML = `
        <div class="ronten-row-header" onclick="this.parentElement.classList.toggle('open')">
          <div class="ronten-row-name">${name}</div>
          <div class="ronten-row-latest">${avgBadge}</div>
        </div>
        <div class="ronten-row-body">
          ${entries.length === 0
            ? '<div style="font-size:11px;color:var(--text-3);">まだ記録がありません</div>'
            : `<div class="ronten-hist-table">${histCols}</div>`}
        </div>`;

      groupBody.appendChild(row);
    });

    group.appendChild(groupBody);
    ct.appendChild(group);
  });
}

// ── URGENT TAB ──
function renderUrgent() {
  const ct = document.getElementById('tab-urgent');
  ct.innerHTML = '';

  const urgent = state.problems
    .map(id => ({ id, score: calcUrgency(id) }))
    .filter(x => x.score !== null && x.score >= 70)
    .sort((a,b) => b.score - a.score);

  if (urgent.length === 0) {
    ct.innerHTML = '<div class="empty-state">要復習の問題はありません 🎉</div>';
    return;
  }

  urgent.forEach(({ id, score }) => {
    const prob = getProbById(id);
    const latest = getLatest(id);
    if (!prob || !latest) return;
    const color = urgencyColor(score);
    const hasReviewX = !!latest.reviewDate && !latest.reviewPassed;

    const card = document.createElement('div');
    card.className = 'urgent-card';
    card.dataset.probId = id;
    const chDisplay = (prob.ch || '').replace('第', '').replace(' ', '　');
    const textNum = CHAPTER_TEXT_NUM[prob.ch] || '';
    card.innerHTML = `
      <div style="font-size:10px;color:var(--text-3);margin-bottom:4px;font-family:'DM Mono',monospace;">${chDisplay}${textNum ? ' ー' + textNum : ''}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="flex:1;font-size:13px;font-weight:700;">${prob.title}</div>
        <span class="prob-meta-badge badge-${latest.eval}">${EVAL_LABELS[latest.eval]}</span>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-3)">${prob.num || (prob.id.startsWith('custom-') ? '' : prob.id)}</span>
      </div>
      <div class="urgency-wrap" style="margin-bottom:12px;">
        <span class="urgency-score" style="color:${color}">${score}</span>
        <div class="urgency-track"><div class="urgency-fill" style="width:${score}%;background:${color}"></div></div>
      </div>
      <div class="urgent-review-btns">
        <button class="ub-rev${hasReviewX ? ' sel-x' : ''}" onclick="reviewItem('${id}','x')">× もう一度</button>
        <button class="ub-rev${latest.reviewPassed ? ' sel-o-btn' : ''}" onclick="reviewItem('${id}','o')">○ 覚えた</button>
      </div>`;
    ct.appendChild(card);
  });
}

function reviewItem(probId, type) {
  const hist = state.history[probId];
  if (!hist || hist.length === 0) return;
  const entry = hist[hist.length - 1];
  if (type === 'o') {
    entry.reviewPassed = true;
    entry.reviewDate = today();
  } else {
    entry.reviewPassed = false;
    entry.reviewDate = today();
  }
  save();
  renderUrgent();
}

// ── BACKUP / RESTORE ──
function exportData() {
  const data = { version:2, label:'財務会計論（計算）', exportedAt: new Date().toISOString(), state };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='zaimu_keisan_backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importData(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.state) throw new Error('invalid');
      if (!confirm('現在のデータを上書きして復元しますか？')) return;
      state = data.state;
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      location.reload();
    } catch(err) { alert('ファイルの読み込みに失敗しました。'); }
  };
  reader.readAsText(file); e.target.value='';
}

let newProbImp = 'B';

function selectNewProbImp(val) {
  newProbImp = val;

    const bv = b.textContent.trim();
    b.className = 'ub' + (bv === val ? (val === 'A' ? ' sel-x' : ' sel-n') : '');

}

function openNewProbModal() {

  document.getElementById('new-prob-ronten-list').innerHTML = '';

}

function onNewProbChChange() {

  renderNewProbRontenList();
  renderNewProbRontenSelect();
  checkNewProbBtn();
}

function renderNewProbRontenList() {
  const el = document.getElementById('new-prob-ronten-list');
  el.innerHTML = newProbRonten.length === 0
    ? `<div style="font-size:11px;color:var(--text-3);padding:4px 0;">論点未設定（後で編集も可能）</div>`
    : newProbRonten.map((name, idx) => `
        <div class="ronten-edit-item">
          <span class="ronten-edit-name">${name}</span>
          <button class="ronten-edit-del" onclick="removeNewProbRonten(${idx})">✕</button>
        </div>`).join('');
}

function renderNewProbRontenSelect() {
  const ch = document.getElementById('new-prob-ch').value;
  const pool = CHAPTER_RONTEN_POOL[ch] || [];
  const available = pool.filter(n => !newProbRonten.includes(n));
  const sel = document.getElementById('new-prob-ronten-select');
  sel.innerHTML = available.length === 0
    ? `<option value="">追加できる論点がありません</option>`
    : `<option value="">論点を選択して追加...</option>`
      + available.map(n => `<option value="${n}">${n}</option>`).join('');

function addNewProbRonten() {
  const sel = document.getElementById('new-prob-ronten-select');
  if (!sel.value) return;
  newProbRonten.push(sel.value);
  renderNewProbRontenList();
  renderNewProbRontenSelect();
}

function removeNewProbRonten(idx) {
  newProbRonten.splice(idx, 1);
  renderNewProbRontenList();
  renderNewProbRontenSelect();
}

function checkNewProbBtn() {
  const ch = document.getElementById('new-prob-ch').value;
  const title = document.getElementById('new-prob-title').value.trim();
  const ok = !!ch && !!title;
  document.getElementById('new-prob-confirm').style.opacity = ok ? '1' : '.4';
  document.getElementById('new-prob-confirm').style.pointerEvents = ok ? 'auto' : 'none';
}

function saveNewProblem() {
  const ch = document.getElementById('new-prob-ch').value;
  const title = document.getElementById('new-prob-title').value.trim();
  const num = document.getElementById('new-prob-num').value.trim();
  if (!ch || !title) return;
  const newId = 'custom-' + Date.now();
  if (!state.customProblems) state.customProblems = [];
  state.customProblems.push({ id: newId, ch, title, imp: newProbImp, num: num || null, defaultRonten: [...newProbRonten] });
  state.problems.push(newId);
  save();
  closeNewProbModal();
  renderProblems();
}

document.getElementById('new-prob-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('new-prob-modal')) closeNewProbModal();
});
