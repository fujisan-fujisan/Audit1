<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="icons/kanri_ronten.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>論点リコール</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --surface2: #f2f2f0;
  --border: #e8e8e5;
  --border2: #d0d0cb;
  --text: #111111;
  --text2: #666666;
  --text3: #aaaaaa;
  --ok: #1a7a4a;
  --ok-dim: #edf7f2;
  --ng: #c0392b;
  --ng-dim: #fdf0ee;
  --lock: #999999;
  --lock-dim: #f2f2f2;
  --radius: 10px;
  --radius-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* START */
#screen-start{align-items:center;justify-content:center;padding:60px 24px}
.start-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.btn-primary{background:var(--text);color:#fff;border:none;border-radius:var(--radius);padding:15px 24px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .12s}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:var(--surface);color:var(--text2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:13px 24px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .12s}
.btn-secondary:hover{border-color:var(--text2);color:var(--text)}
.btn-secondary:active{transform:scale(.97)}

/* COMMON HEADER */
.page-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:12px;padding:5px 10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0}
.back-btn:hover{border-color:var(--text2);color:var(--text)}
.page-header-info{flex:1;min-width:0}
.page-header-title{font-size:15px;font-weight:700}
.page-header-sub{font-size:11px;color:var(--text2);margin-top:1px}

/* CHAPTER */
.chapter-list{padding:12px 14px 40px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.ch-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;text-align:left;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;font-family:'Noto Sans JP',sans-serif;width:100%}
.ch-btn:hover{border-color:var(--border2);background:var(--surface2)}
.ch-btn:active{transform:scale(.98)}
.ch-btn-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);min-width:26px}
.ch-btn-info{flex:1;min-width:0}
.ch-btn-name{font-size:13px;font-weight:700;color:var(--text)}
.ch-btn-count{font-size:10px;color:var(--text2);margin-top:2px;font-family:'DM Mono',monospace}
.ch-btn-hist{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0}
.ch-btn-hist .best{color:var(--ok);font-weight:700}

/* GAME */
.game-header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.game-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.game-chapter-name{font-size:12px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.game-score-display{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.game-score-display span{color:var(--ok);font-weight:700}
.prog-track{height:3px;background:var(--border);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:var(--text);border-radius:999px;transition:width .4s ease}
.game-content{padding:14px;max-width:600px;margin:0 auto;width:100%;padding-bottom:40px;overflow-y:auto}

.input-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.input-card-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
.input-group{margin-bottom:10px}
.input-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.input-lbl-badge{font-size:9px;padding:1px 6px;border-radius:999px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}
.game-input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:16px;padding:10px 12px;outline:none;transition:border-color .15s;resize:vertical;min-height:54px;touch-action:manipulation}
.game-input:focus{border-color:var(--text)}
.game-input::placeholder{color:var(--text3)}
.btn-submit{width:100%;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--text);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;margin-top:2px}
.btn-submit:active{transform:scale(.97)}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px 16px 44px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto}
.confirm-handle{width:32px;height:3px;background:var(--border2);border-radius:999px;margin:0 auto 16px}
.confirm-lbl{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.confirm-ronten{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.4}
.confirm-score-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.confirm-score-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--ok-dim);color:var(--ok)}
.confirm-score-sub{font-size:11px;color:var(--text2)}
.confirm-other-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.confirm-other-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.confirm-other-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.confirm-other-item:hover{border-color:var(--border2);background:var(--surface2)}
.confirm-other-score{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);min-width:32px;flex-shrink:0}
.confirm-other-name{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.confirm-btns{display:flex;gap:8px}
.btn-yes{flex:2;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--text);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.btn-yes:active{transform:scale(.97)}
.btn-no{flex:1;padding:13px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.btn-no:active{transform:scale(.97)}

/* RESULTS */
.results-section{margin-top:4px}
.results-count-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.result-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
.result-item.ok{border-color:var(--ok);background:var(--ok-dim)}
.result-item.locked{border-color:var(--lock);background:var(--lock-dim);opacity:.6}
.result-dot{font-size:13px;font-weight:700;flex-shrink:0;width:18px;text-align:center;margin-top:1px}
.result-dot.ok{color:var(--ok)}
.result-dot.locked{color:var(--lock)}
.result-content{flex:1;min-width:0}
.result-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.4}
.result-input-text{font-size:10px;color:var(--text2);margin-top:2px}
.result-locked-msg{font-size:10px;color:var(--lock);margin-top:2px}

.btn-finish{width:100%;padding:13px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:14px;transition:all .15s}
.btn-finish:hover{border-color:var(--text2);color:var(--text)}
.error-msg{font-size:11px;color:var(--ng);padding:8px 12px;background:var(--ng-dim);border-radius:var(--radius-sm);border:1px solid var(--ng);margin-bottom:8px}

/* RESULT */
#screen-result{align-items:stretch}
.result-inner{padding:28px 18px 60px;max-width:600px;margin:0 auto;width:100%}
.result-top{text-align:center;margin-bottom:28px}
.result-ch-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.result-big{font-family:'DM Mono',monospace;font-size:68px;font-weight:500;color:var(--text);line-height:1;margin-bottom:4px}
.result-big span{font-size:26px;color:var(--text2)}
.result-total-lbl{font-size:12px;color:var(--text2);margin-bottom:6px}
.result-rate{font-size:13px;font-weight:700;margin-bottom:14px}
.result-rate .rn{color:var(--ok)}
.result-rate .rn.warn{color:var(--ng)}
.result-msg{font-size:13px;color:var(--text2);line-height:1.7}
.result-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px}
.bd-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.bd-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500}
.bd-num.ok{color:var(--ok)}
.bd-num.locked{color:var(--lock)}
.bd-num.remain{color:var(--text2)}
.bd-lbl{font-size:9px;color:var(--text3);margin-top:3px;letter-spacing:.06em;text-transform:uppercase}
.result-hist-sec{margin-bottom:22px}
.result-hist-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.hist-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hist-bar-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);min-width:22px}
.hist-bar-track{flex:1;height:7px;background:var(--border);border-radius:999px;overflow:hidden}
.hist-bar-fill{height:100%;background:var(--text);border-radius:999px;transition:width .6s ease}
.hist-bar-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);min-width:36px;text-align:right}
.result-detail-sec{margin-bottom:24px}
.result-detail-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.rdi{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.rdi:last-child{border-bottom:none}
.rdi-dot{font-size:12px;font-weight:700;width:18px;flex-shrink:0;margin-top:2px;text-align:center}
.rdi-dot.ok{color:var(--ok)}.rdi-dot.locked{color:var(--lock)}.rdi-dot.none{color:var(--text3)}
.rdi-name{font-size:12px;color:var(--text);flex:1;line-height:1.5}
.rdi-imp{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;margin-top:2px}
.imp-A{background:#fdf0ee;color:#c0392b}
.imp-B{background:#fdf4e3;color:#7c5c00}
.imp-C{background:#edf7f2;color:#1a7a4a}
.result-btns{display:flex;flex-direction:column;gap:8px}
.btn-retry{background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.btn-retry:active{transform:scale(.97)}
.btn-back{background:transparent;color:var(--text2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:13px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-back:hover{border-color:var(--text2);color:var(--text)}

/* MANAGE */
#screen-manage{padding:0}
.manage-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);padding:0 4px;flex-shrink:0;justify-content:space-evenly}
.manage-tabs::-webkit-scrollbar{display:none}
.mctab{padding:10px 12px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:transparent;border:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.mctab.active{color:var(--text);border-bottom-color:var(--text)}
.manage-content{padding:12px 14px 60px;max-width:600px;margin:0 auto;overflow-y:auto}
.manage-item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.manage-item-header{padding:11px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.manage-item-header:active{background:var(--surface2)}
.manage-item-name{flex:1;font-size:12px;font-weight:700;color:var(--text);line-height:1.4;min-width:0}
.manage-item-imp{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0}
.manage-item-status{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);flex-shrink:0}
.manage-item-status.has-ans{color:var(--ok)}
.manage-item-body{display:none;border-top:1px solid var(--border);padding:12px 13px}
.manage-item-card.open .manage-item-body{display:block}
.manage-ans-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.manage-ans-row{display:flex;align-items:flex-start;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px}
.manage-ans-text{flex:1;font-size:12px;color:var(--text);line-height:1.5}
.manage-ans-del{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;transition:color .12s;line-height:1;margin-top:1px}
.manage-ans-del:hover{color:var(--ng)}
.manage-add-row{display:flex;gap:6px;align-items:flex-start}
.manage-add-input{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:16px;padding:8px 10px;outline:none;resize:vertical;min-height:50px;transition:border-color .15s;touch-action:manipulation}
.manage-add-input:focus{border-color:var(--text)}
.manage-add-input::placeholder{color:var(--text3)}
.manage-add-btn{padding:8px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.manage-add-btn:hover{border-color:var(--text);color:var(--text)}
.manage-excl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.manage-excl-label{font-size:12px;color:var(--text2);font-weight:700}
.manage-excl-toggle{padding:5px 14px;border-radius:999px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text3);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s}
.manage-excl-toggle.on{background:var(--ok-dim);border-color:var(--ok);color:var(--ok)}
.manage-item-card.excluded .manage-item-header{opacity:.45}
.manage-item-card.excluded .manage-item-name{text-decoration:line-through}
.manage-section-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;margin-top:2px}
.alias-row{background:#f0f0ff;border-color:#c0c0e8}
.manage-add-input-line{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:8px 10px;outline:none;transition:border-color .15s;height:36px}
.manage-add-input-line:focus{border-color:var(--text)}
.manage-add-input-line::placeholder{color:var(--text3)}
.record-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.record-item:last-child{border-bottom:none}
.record-item.excluded{opacity:.4}
.record-item-name{flex:1;font-size:12px;color:var(--text);line-height:1.4}
.record-item-right{flex-shrink:0}
.record-score{font-family:'DM Mono',monospace;font-size:13px;font-weight:700}
@media (min-width:820px){
  body{font-size:17px}
  .start-btns{max-width:480px}
  .page-header{padding:22px 28px 18px}
  .page-header-title{font-size:19px}
  .page-header-sub{font-size:14px}
  .back-btn{font-size:14px;padding:7px 14px}
  .chapter-list{padding:16px 28px 60px;gap:10px}
  .ch-btn{padding:16px 18px}
  .ch-btn-num{font-size:13px;min-width:34px}
  .ch-btn-name{font-size:16px}
  .ch-btn-sub{font-size:12px}
  .ch-btn-hist{font-size:13px}
  .quiz-content{max-width:100%;padding:20px 28px 60px}
  .ronten-name{font-size:19px}
  .answer-input{font-size:16px;min-height:140px}
  .btn-submit,.btn-next,.btn-skip{font-size:16px;padding:15px}
  .kw-item-word{font-size:16px}
  .ksb{font-size:14px;padding:10px 6px}
  .result-inner{max-width:100%;padding:36px 28px 80px}
  .result-big{font-size:80px}
  .result-big span{font-size:28px}
  .manage-content{max-width:100%;padding:16px 28px 80px}
  .manage-item-name{font-size:15px}
  .manage-add-input{font-size:14px}
  .manage-kw-text{font-size:14px}
  .mctab{font-size:14px;padding:12px 18px}
  .import-content{max-width:100%;padding:20px 28px 80px}
  .import-select{font-size:15px;padding:12px 14px}
  .record-item-name{font-size:15px}
  .record-score{font-size:14px}
  .record-kw-table th{font-size:13px}
  .record-kw-table td{font-size:13px}
  .btn-main{font-size:19px;padding:32px 28px}
  .btn-mid{font-size:17px;padding:18px 28px}
  .btn-small{font-size:14px;padding:13px 10px}
  .btn-retry,.btn-back{font-size:16px;padding:16px}
  .quiz-chapter-name{font-size:15px}
  .quiz-progress-text{font-size:14px}
  .ronten-label,.answer-card-title,.kw-eval-title{font-size:13px}
}
</style>
</head>
<body>

<!-- START -->
<div class="screen active" id="screen-start">
  <div class="start-btns">
    <button class="btn-primary" onclick="goChapter()">章を選んで始める →</button>
    <button class="btn-secondary" onclick="goManage()">解答を管理する</button>
    <button class="btn-secondary" onclick="goRecord()">過去の回答を確認する</button>
  </div>
  <div style="display:flex;gap:8px;width:100%;max-width:320px;margin-top:32px">
    <button class="btn-secondary" style="flex:1;font-size:12px;padding:10px" onclick="exportBackup()">バックアップ</button>
    <button class="btn-secondary" style="flex:1;font-size:12px;padding:10px" onclick="document.getElementById('backup-input').click()">復元</button>
    <input type="file" id="backup-input" accept=".json" style="display:none" onchange="importBackup(event)">
  </div>
</div>

<!-- RECORD -->
<div class="screen" id="screen-record">
  <div class="page-header">
    <button class="back-btn" onclick="goStart()">← トップ</button>
    <div class="page-header-info">
      <div class="page-header-title">過去の回答</div>
      <div class="page-header-sub">論点ごとの正解回数</div>
    </div>
  </div>
  <div class="manage-tabs" id="record-tabs"></div>
  <div class="manage-content" id="record-content"></div>
</div>

<!-- CHAPTER -->
<div class="screen" id="screen-chapter">
  <div class="page-header">
    <button class="back-btn" onclick="goStart()">← トップ</button>
    <div class="page-header-info">
      <div class="page-header-title">章を選択</div>
      <div class="page-header-sub">全12章</div>
    </div>
  </div>
  <div class="chapter-list" id="chapter-list"></div>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="game-header">
    <div class="game-header-top">

function loadStorage(){
  try{const h=localStorage.getItem(HIST_KEY);if(h)gameHistory=JSON.parse(h);}catch(e){}
  try{const a=localStorage.getItem(ANS_KEY);if(a)answerData=JSON.parse(a);}catch(e){}
  try{const e=localStorage.getItem(EXCL_KEY);if(e)excludeData=JSON.parse(e);}catch(e){}
  try{const al=localStorage.getItem(ALIAS_KEY);if(al)aliasData=JSON.parse(al);}catch(e){}

}

function recordResult(id,isOk){
  if(!recordData[id])recordData[id]={ok:0,total:0};
  recordData[id].total++;
  if(isOk)recordData[id].ok++;
  saveRecord();
}

function saveAlias(){try{localStorage.setItem(ALIAS_KEY,JSON.stringify(aliasData));}catch(e){}}
function getAliases(id){return aliasData[id]||[];}
function addAlias(id,word){
  if(!word.trim())return;
  if(!aliasData[id])aliasData[id]=[];
  if(!aliasData[id].includes(word.trim()))aliasData[id].push(word.trim());
  saveAlias();
}
function deleteAlias(id,idx){
  if(!aliasData[id])return;
  aliasData[id].splice(idx,1);
  saveAlias();
}
function isExcluded(id){return excludeData[id]===true;}
function toggleExclude(id){
  excludeData[id]=!isExcluded(id);

  refreshManageItem(id);
}

// ── SIMILARITY ──
function normalize(s){return s.replace(/^問題\d+[-－]\d+[　\s]*/,'').replace(/[　\s・。、「」『』【】（）()〔〕\-－―:：]/g,'').toLowerCase();}
function ngramSet(s,n){const set=new Set();for(let i=0;i<=s.length-n;i++)set.add(s.slice(i,i+n));return set;}
function ngramSim(a,b,n=2){
  const na=ngramSet(a,n),nb=ngramSet(b,n);
  if(!na.size&&!nb.size)return 1;if(!na.size||!nb.size)return 0;
  let inter=0;na.forEach(g=>{if(nb.has(g))inter++;});
  return inter/(na.size+nb.size-inter);
}
function charInclude(q,t){if(!q.length)return 0;let h=0;for(const c of q){if(t.includes(c))h++;}return h/q.length;}
function scorePair(q,t){
  return Math.max(ngramSim(q,t,2), ngramSim(q,t,1)*0.7, charInclude(q,t)*0.6);
}
function similarity(query,item){
  const q=normalize(query);
  const titleScore=scorePair(q,normalize(item.name));
  let ansScore=0;
  (answerData[item.id]||[]).forEach(a=>{const s=scorePair(q,normalize(a));if(s>ansScore)ansScore=s;});
  // 別名（言い換え）もタイトルと同等に照合
  (aliasData[item.id]||[]).forEach(a=>{const s=scorePair(q,normalize(a));if(s>ansScore)ansScore=s;});
  return Math.max(titleScore,ansScore);
}
function findTopMatches(titleIn,answerIn,items,lockedIds,answeredIds,topN=5){
  const q=[titleIn,answerIn].filter(Boolean).join(' ');
  if(!q.trim())return[];
  const avail=items.filter(i=>!lockedIds.has(i.id)&&!answeredIds.has(i.id));
  const scored=avail.map(item=>({item,score:similarity(q,item)}));
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,topN).filter(s=>s.score>0.05);
}

// ── GAME ──
let gameState={chIndex:null,items:[],answeredIds:new Set(),lockedIds:new Set(),results:[],score:0};
let pendingConfirm=null,pendingTopMatches=[];

function abortGame(){
  goChapter();
}

function startGame(chIndex){
  const ch=DATA[chIndex];
  const activeItems=ch.items.filter(i=>!isExcluded(i.id));
  gameState={chIndex,items:activeItems,answeredIds:new Set(),lockedIds:new Set(),results:[],score:0};
  document.getElementById('game-chapter-name').textContent=`${ch.ch}　${ch.chName}`;
  document.getElementById('score-display').textContent='0';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('results-list').innerHTML='';
  document.getElementById('results-count-lbl').textContent='回答済み: 0件';
  document.getElementById('input-title').value='';
  document.getElementById('input-answer').value='';
  document.querySelector('.error-msg')?.remove();
  showScreen('game');
}

function submitEntry(){
  const tv=document.getElementById('input-title').value.trim();
  const av=document.getElementById('input-answer').value.trim();
  if(!tv&&!av){showError('タイトルか解答内容を入力してください');return;}
  const avail=gameState.items.filter(i=>!gameState.answeredIds.has(i.id)&&!gameState.lockedIds.has(i.id));
  if(!avail.length){showError('この章の全論点が回答済みまたはロックされています');return;}
  const matches=findTopMatches(tv,av,gameState.items,gameState.lockedIds,gameState.answeredIds,1);
  if(!matches.length){showError('一致する論点が見つかりませんでした。もう少し具体的に入力してください。');return;}
  pendingTopMatches=matches;
  const top=matches[0];
  pendingConfirm={matchedItem:top.item,inputTitle:tv,inputAnswer:av};
  document.getElementById('confirm-ronten').textContent=top.item.name;
  const pct=Math.round(top.score*100);
  document.getElementById('confirm-score-badge').textContent=`類似度 ${pct}%`;
  document.getElementById('confirm-score-sub').textContent=pct>=60?'高い一致度です':pct>=35?'部分的に一致しています':'一致度が低めです。違う場合は「違う」を選んでください。';

  document.getElementById('confirm-overlay').classList.add('open');
}


function confirmYes(){
  document.getElementById('confirm-overlay').classList.remove('open');
  if(!pendingConfirm)return;
  const{matchedItem,inputTitle,inputAnswer}=pendingConfirm;
  gameState.answeredIds.add(matchedItem.id);gameState.score++;
  gameState.results.unshift({id:matchedItem.id,inputTitle,inputAnswer,status:'ok'});
  recordResult(matchedItem.id,true);
  document.getElementById('input-title').value='';document.getElementById('input-answer').value='';
  pendingConfirm=null;updateGameUI();
}
function confirmNo(){
  document.getElementById('confirm-overlay').classList.remove('open');
  if(!pendingConfirm)return;
  const{matchedItem,inputTitle,inputAnswer}=pendingConfirm;
  gameState.lockedIds.add(matchedItem.id);
  gameState.results.unshift({id:matchedItem.id,inputTitle,inputAnswer,status:'locked'});
  recordResult(matchedItem.id,false);
  document.getElementById('input-title').value='';document.getElementById('input-answer').value='';
  pendingConfirm=null;updateGameUI();
}

function updateGameUI(){
  const total=gameState.items.length,done=gameState.answeredIds.size+gameState.lockedIds.size;
  document.getElementById('score-display').textContent=gameState.score;
  document.getElementById('prog-fill').style.width=(total?Math.round(done/total*100):0)+'%';
  document.getElementById('results-list').innerHTML=gameState.results.map(r=>{
    const item=gameState.items.find(i=>i.id===r.id),name=item?item.name:r.id;
    if(r.status==='ok')return`<div class="result-item ok"><div class="result-dot ok">○</div><div class="result-content"><div class="result-name">${escHtml(name)}</div>${r.inputTitle?`<div class="result-input-text">入力: ${escHtml(r.inputTitle)}</div>`:''}</div></div>`;
    return`<div class="result-item locked"><div class="result-dot locked">✕</div><div class="result-content"><div class="result-name">${escHtml(name)}</div><div class="result-locked-msg">🔒 ロック（違う論点と判定したためネタバレ防止）</div></div></div>`;
  }).join('');
  document.getElementById('results-count-lbl').textContent=`回答済み: ${gameState.results.length}件（正解: ${gameState.score}）`;
}

function finishGame(){
  const ch=DATA[gameState.chIndex],total=ch.items.length,score=gameState.score,locked=gameState.lockedIds.size,remain=total-score-locked,rate=Math.round(score/total*100);
  // 未回答の論点を×として記録
  gameState.items.forEach(item=>{
    if(!gameState.answeredIds.has(item.id)&&!gameState.lockedIds.has(item.id)){
      recordResult(item.id,false);
    }
  });
  if(!gameHistory[gameState.chIndex])gameHistory[gameState.chIndex]=[];
  gameHistory[gameState.chIndex].push({date:new Date().toLocaleDateString('ja-JP'),score,total,locked});
  saveHistory();
  document.getElementById('result-ch-lbl').textContent=`${ch.ch}　${ch.chName}`;
  document.getElementById('result-big').innerHTML=`${score}<span>/${total}</span>`;
  document.getElementById('bd-ok').textContent=score;document.getElementById('bd-locked').textContent=locked;document.getElementById('bd-remain').textContent=remain;
  document.getElementById('result-rate').innerHTML=`達成率 <span class="rn${rate<50?' warn':''}">${rate}%</span>`;
  const msgs=[[80,'素晴らしい！この章はほぼ完璧に把握できています。'],[60,'かなり上げられました。あと少しで完璧です。'],[40,'半分以上上げられました。繰り返しで定着させましょう。'],[0,'まだ伸びしろがあります。繰り返し挑戦して論点を定着させましょう。']];
  document.getElementById('result-msg').textContent=(msgs.find(([t])=>rate>=t)||msgs[msgs.length-1])[1];
  const recs=gameHistory[gameState.chIndex]||[],hs=document.getElementById('result-hist-sec');
  if(recs.length>1){hs.style.display='block';document.getElementById('hist-bars').innerHTML=recs.map((r,i)=>{const p=r.total?Math.round(r.score/r.total*100):0;return`<div class="hist-bar-row"><div class="hist-bar-lbl">${i+1}回</div><div class="hist-bar-track"><div class="hist-bar-fill" style="width:${p}%"></div></div><div class="hist-bar-val">${r.score}/${r.total}</div></div>`;}).join('');}else{hs.style.display='none';}
  const ai=gameState.answeredIds,li=gameState.lockedIds;
  document.getElementById('result-detail-items').innerHTML=ch.items.map(item=>{
    const isOk=ai.has(item.id),isL=li.has(item.id);
    const dot=isOk?'<span class="rdi-dot ok">○</span>':isL?'<span class="rdi-dot locked">✕</span>':'<span class="rdi-dot none">–</span>';
    return`<div class="rdi">${dot}<div class="rdi-name">${escHtml(item.name)}</div><span class="rdi-imp imp-${item.imp}">${item.imp}</span></div>`;
  }).join('');
  showScreen('result');
}

        <div class="manage-ans-list" id="anslist-${item.id}">${ans.map((a,i)=>`<div class="manage-ans-row"><div class="manage-ans-text">${escHtml(a)}</div><button class="manage-ans-del" onclick="deleteAnswer('${item.id}',${i})">✕</button></div>`).join('')}</div>
        <div class="manage-add-row">
          <textarea class="manage-add-input" id="ansinput-${item.id}" placeholder="解答内容を入力..." rows="2"></textarea>
          <button class="manage-add-btn" onclick="addAnswer('${item.id}')">追加</button>
        </div>
      </div></div>`;
  }).join('');
}

function commitAlias(id){
  const input=document.getElementById('aliasinput-'+id);if(!input)return;
  const val=input.value.trim();if(!val)return;
  addAlias(id,val);input.value='';refreshManageItem(id);
}
function toggleManageItem(id){
  const card=document.getElementById('mc-'+id);card.classList.toggle('open');
}
function addAnswer(id){
  const input=document.getElementById('ansinput-'+id);if(!input)return;
  const val=input.value.trim();if(!val)return;
  if(!answerData[id])answerData[id]=[];
  answerData[id].push(val);saveAnswers();input.value='';refreshManageItem(id);
}
function deleteAnswer(id,idx){
  if(!answerData[id])return;answerData[id].splice(idx,1);saveAnswers();refreshManageItem(id);
}
function refreshManageItem(id){
  const ans=answerData[id]||[],hasAns=ans.length>0,excl=isExcluded(id);
  const card=document.getElementById('mc-'+id);
  const isOpen=card?.classList.contains('open');
  if(card){card.className='manage-item-card'+(excl?' excluded':'')+(isOpen?' open':'');}
  const aliaslist=document.getElementById('aliaslist-'+id);
  if(aliaslist)aliaslist.innerHTML=getAliases(id).map((a,i)=>`<div class="manage-ans-row alias-row"><div class="manage-ans-text">${escHtml(a)}</div><button class="manage-ans-del" onclick="deleteAlias('${id}',${i});refreshManageItem('${id}')">✕</button></div>`).join('');
  const list=document.getElementById('anslist-'+id);
  if(list)list.innerHTML=ans.map((a,i)=>`<div class="manage-ans-row"><div class="manage-ans-text">${escHtml(a)}</div><button class="manage-ans-del" onclick="deleteAnswer('${id}',${i})">✕</button></div>`).join('');
  const status=document.querySelector(`#mc-${id} .manage-item-status`);
  if(status){status.textContent=hasAns?ans.length+'件':'未登録';status.className='manage-item-status'+(hasAns?' has-ans':'');}
  const toggle=document.getElementById('excl-'+id);
  if(toggle){toggle.textContent=excl?'OFF':'ON';toggle.className='manage-excl-toggle'+(excl?'':' on');}
}

// ── UTILS ──
function showError(msg){
  document.querySelector('.error-msg')?.remove();
  const el=document.createElement('div');el.className='error-msg';el.textContent=msg;
  document.querySelector('.input-card').after(el);setTimeout(()=>el.remove(),4000);
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── BACKUP ──
async function exportBackup(){
  const d={
    version:1,
    label:'論点リコール バックアップ',
    exportedAt:new Date().toISOString(),
    itemState:JSON.parse(localStorage.getItem(HIST_KEY)||'{}'),
    answerData:JSON.parse(localStorage.getItem(ANS_KEY)||'{}'),
    excludeData:JSON.parse(localStorage.getItem(EXCL_KEY)||'{}'),
    aliasData:JSON.parse(localStorage.getItem(ALIAS_KEY)||'{}'),
    recordData:JSON.parse(localStorage.getItem(REC_KEY)||'{}'),
  };
  const fname='ronten_backup_'+new Date().toISOString().slice(0,10)+'.json';
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const file=new File([blob],fname,{type:'application/json'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file]});return;}catch(e){}
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fname;
  a.click();
}
function importBackup(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const d=JSON.parse(ev.target.result);
      if(d.version!==1)throw new Error('invalid');
      if(d.itemState)  localStorage.setItem(HIST_KEY,  JSON.stringify(d.itemState));
      if(d.answerData) localStorage.setItem(ANS_KEY,   JSON.stringify(d.answerData));
      if(d.excludeData)localStorage.setItem(EXCL_KEY,  JSON.stringify(d.excludeData));
      if(d.aliasData)  localStorage.setItem(ALIAS_KEY, JSON.stringify(d.aliasData));
      if(d.recordData) localStorage.setItem(REC_KEY,   JSON.stringify(d.recordData));
      location.reload();
    }catch(err){alert('ファイルの読み込みに失敗しました。');}
  };
  reader.readAsText(file);
  e.target.value='';
}

  else if(_savedScreen==='record')goRecord();
}
