<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="icons/kanri_keisan.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>管理会計論（計算） 復習管理</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="管理計算">
<meta name="theme-color" content="#0a0a0a">
<style>
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #e8e8e5;
  --border-strong: #d0d0cb;
  --text: #111111;
  --text-2: #666666;
  --text-3: #aaaaaa;
  --accent: #111111;
  --accent-bg: #f0f0ee;
  --o-color: #1a7a4a;
  --o-bg: #edf7f2;
  --t-color: #9a6200;
  --t-bg: #fdf4e3;
  --x-color: #c0392b;
  --x-bg: #fdf0ee;
  --A-color: #c0392b;
  --A-bg: #fdf0ee;
  --B-color: #7c5c00;
  --B-bg: #fdf4e3;
  --C-color: #1a7a4a;
  --C-bg: #edf7f2;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
  font-size: 14px;
  line-height: 1.5;
}

.header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); }
.header-top { padding: 14px 16px 12px; }
.header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.app-title { font-size: 11px; font-weight: 700; letter-spacing: .12em; color: var(--text-3); text-transform: uppercase; }
.header-actions { display: flex; gap: 6px; }
.btn-icon { padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: transparent; color: var(--text-2); font-size: 11px; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-icon:hover, .btn-icon.active { background: var(--text); border-color: var(--text); color: #fff; }

.progress-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 7px; }
.prog-num { font-family: 'DM Mono', 'Courier New', monospace; font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }
.prog-label { font-size: 11px; color: var(--text-3); }
.prog-track { height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--text); border-radius: 999px; transition: width .4s ease; }

.tabs { display: flex; overflow-x: auto; scrollbar-width: none; border-top: 1px solid var(--border); padding: 0 4px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 10px 14px; font-size: 12px; font-weight: 700; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; background: transparent; border: none; cursor: pointer; color: var(--text-3); border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; letter-spacing: .02em; }
.tab.active { color: var(--text); border-bottom-color: var(--text); }

.round-info-bar { display: flex; align-items: center; padding: 6px 16px 4px; border-top: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; gap: 0; }
.round-info-bar::-webkit-scrollbar { display: none; }
.ri-item { display: flex; flex-direction: column; align-items: flex-start; padding: 4px 12px 4px 0; min-width: 0; flex-shrink: 0; }
.ri-item + .ri-item { border-left: 1px solid var(--border); padding-left: 12px; }
.ri-lbl { font-size: 9px; font-weight: 700; color: var(--text-3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 1px; }
.ri-val { font-size: 13px; font-weight: 700; color: var(--text); font-family: 'DM Mono', 'Courier New', monospace; white-space: nowrap; }
.ri-val.warn { color: var(--x-color); }
.ri-val.ok { color: var(--o-color); }
.ri-deadline-btn { background: none; border: none; padding: 0; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text); font-family: 'DM Mono', 'Courier New', monospace; text-decoration: underline dotted; text-underline-offset: 3px; }

.view-tabs { display: flex; border-top: 1px solid var(--border); background: var(--surface); }
.vtab { flex: 1; padding: 9px 8px; font-size: 12px; font-weight: 700; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; background: transparent; border: none; cursor: pointer; color: var(--text-3); border-bottom: 2px solid transparent; transition: all .15s; letter-spacing: .02em; }
.vtab.active { color: var(--text); border-bottom-color: var(--text); }

.content { padding: 12px 14px; max-width: 700px; margin: 0 auto; }

.ch-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.ch-card.hidden { display: none; }
.ch-header { padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
.ch-header:active { background: var(--bg); }
.ch-chevron { font-size: 9px; color: var(--text-3); transition: transform .2s; flex-shrink: 0; width: 12px; }
.ch-card.open .ch-chevron { transform: rotate(90deg); }
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-sub { font-size: 10px; color: var(--text-3); margin-top: 1px; font-family: 'DM Mono', 'Courier New', monospace; }
.ch-badge { font-size: 10px; font-family: 'DM Mono', 'Courier New', monospace; font-weight: 500; padding: 3px 8px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid var(--border); color: var(--text-2); flex-shrink: 0; transition: all .2s; }
.ch-badge.done { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
/* 章の合計時間バッジ */
.ch-time-badge { font-size: 10px; font-family: 'DM Mono', 'Courier New', monospace; font-weight: 500; padding: 3px 8px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid var(--border); color: var(--text-3); flex-shrink: 0; transition: all .2s; }
.ch-time-badge.has-time { background: #f0f4ff; border-color: #99b0e8; color: #2a4a9a; }

.items-wrap { display: none; border-top: 1px solid var(--border); }
.ch-card.open .items-wrap { display: block; }

.item-row { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.item-row:last-child { border-bottom: none; }
.item-row.hidden { display: none; }
.item-top { display: flex; align-items: flex-start; gap: 7px; }
.item-name { flex: 1; font-size: 12px; line-height: 1.5; color: var(--text); }
.imp-badge { font-size: 9px; font-weight: 700; font-family: 'DM Mono', 'Courier New', monospace; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; }
.imp-A { background: var(--A-bg); color: var(--A-color); }
.imp-B { background: var(--B-bg); color: var(--B-color); }
.imp-C { background: var(--C-bg); color: var(--C-color); }

.u-btns { display: flex; gap: 3px; flex-shrink: 0; }
.ub { min-width: 34px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; color: var(--text-3); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; white-space: nowrap; padding: 0 4px; }
.ub:active { transform: scale(.88); }
.ub.sel-oo { background: #e8f7f0; border-color: #1a7a4a; color: #1a7a4a; }
.ub.sel-o  { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.ub.sel-n  { background: #f0f0ee; border-color: #999; color: #555; }
.ub.sel-x  { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.ub.sel-xx { background: #fde; border-color: #900; color: #900; font-weight: 700; }

/* 問題単位の実施記録フォーム */
.item-record-form { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; gap: 8px; flex-direction: column; }
.item-record-form.open { display: flex; }
.item-record-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.item-record-lbl { font-size: 9px; font-weight: 700; color: var(--text-2); display: block; margin-bottom: 3px; letter-spacing: .04em; text-transform: uppercase; }
.item-record-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; font-size: 12px; padding: 6px 8px; outline: none; -webkit-appearance: none; appearance: none; }
.item-record-input:focus { border-color: var(--text); }
.item-record-summary { display: none; font-size: 10px; color: var(--text-3); font-family: 'DM Mono', 'Courier New', monospace; }
.item-record-summary.has-data { display: inline; color: #2a4a9a; }

/* 要復習タブ */
.review-eval-btns { display: flex; gap: 3px; flex-shrink: 0; align-items: center; }
.ub-rev { width: 34px; height: 26px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; color: var(--text-3); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; }
.ub-rev:active { transform: scale(.88); }
.ub-rev.sel-o { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.ub-rev.sel-x { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }

/* 論点プロンプト */
.topic-prompt { background: #fffbf0; border: 1px solid #e8d88a; border-radius: var(--radius-sm); padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
.topic-prompt-title { font-size: 10px; font-weight: 700; color: #7c5c00; letter-spacing: .04em; }
.topic-prompt-list { display: flex; flex-direction: column; gap: 4px; }
.topic-prompt-done-btn { margin-top: 2px; align-self: flex-end; padding: 5px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-2); font-size: 11px; font-weight: 700; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; cursor: pointer; }
.topic-prompt-done-btn:active { background: var(--text); color: #fff; border-color: var(--text); }
.topic-prompt-item { display: flex; align-items: center; gap: 6px; }
.topic-prompt-name { flex: 1; font-size: 11px; color: var(--text); }
.topic-prompt-btns { display: flex; gap: 2px; }
.tub { min-width: 28px; height: 24px; border-radius: 4px; border: 1px solid var(--border-strong); background: var(--bg); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12px; color: var(--text-3); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; padding: 0 2px; }
.tub:active { transform: scale(.88); }
.tub.sel-oo { background: #e8f7f0; border-color: #1a7a4a; color: #1a7a4a; }
.tub.sel-o  { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.tub.sel-n  { background: #f0f0ee; border-color: #999; color: #555; }
.tub.sel-x  { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.tub.sel-xx { background: #fde; border-color: #900; color: #900; }
.topic-prompt-imp { font-size: 8px; font-weight: 700; font-family: 'DM Mono', 'Courier New', monospace; padding: 1px 4px; border-radius: 3px; flex-shrink: 0; }

/* 履歴ドット */
.item-history { display: flex; gap: 4px; align-items: center; padding-left: 0; }
.hist-dot-wrap { display: flex; align-items: center; gap: 2px; }
.hist-label { font-size: 9px; color: var(--text-3); font-family: 'DM Mono', 'Courier New', monospace; min-width: 20px; }
.hist-dot { min-width: 22px; height: 18px; border-radius: 4px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--bg); color: var(--text-3); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; font-weight: 700; padding: 0 2px; }
.hist-dot.dot-oo { background: #e8f7f0; border-color: #1a7a4a; color: #1a7a4a; }
.hist-dot.dot-o  { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.hist-dot.dot-n  { background: #f0f0ee; border-color: #999; color: #555; }
.hist-dot.dot-x  { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.hist-dot.dot-xx { background: #fde; border-color: #900; color: #900; }

.item-memo { width: 100%; font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 9px; color: var(--text); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; resize: none; outline: none; min-height: 28px; line-height: 1.5; transition: border-color .15s; }
.item-memo:focus { border-color: var(--text); }
.item-memo::placeholder { color: var(--text-3); }

.urgency-wrap { display: flex; align-items: center; gap: 7px; }
.urgency-score { font-size: 11px; font-weight: 700; font-family: 'DM Mono', 'Courier New', monospace; min-width: 32px; flex-shrink: 0; }
.urgency-track { flex: 1; height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
.urgency-fill { height: 100%; border-radius: 999px; transition: width .4s ease, background .4s ease; }

/* 論点タブ */
.topic-section-header { padding: 12px 0 6px; }
.topic-section-title { font-size: 11px; font-weight: 700; color: var(--text-2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 2px; }
.topic-section-sub { font-size: 10px; color: var(--text-3); }
.topic-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.topic-card-header { padding: 11px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
.topic-card-header:active { background: var(--bg); }
.topic-card.open .ch-chevron { transform: rotate(90deg); }
.topic-card-info { flex: 1; min-width: 0; }
.topic-card-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topic-card-sub { font-size: 10px; color: var(--text-3); margin-top: 1px; font-family: 'DM Mono', 'Courier New', monospace; }
.topic-items-wrap { display: none; border-top: 1px solid var(--border); }
.topic-card.open .topic-items-wrap { display: block; }
.topic-item-row { padding: 9px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
.topic-item-row:last-child { border-bottom: none; }
.topic-item-header { display: flex; align-items: center; gap: 6px; }
.topic-item-name { flex: 1; font-size: 12px; line-height: 1.4; color: var(--text); min-width: 0; }
.topic-item-qs { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', 'Courier New', monospace; flex-shrink: 0; white-space: nowrap; }
/* 積み上げチップ */
.topic-hist-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.topic-hist-chip { display: flex; flex-direction: column; align-items: center; gap: 2px; background: transparent; border: none; padding: 0; min-width: 36px; }
.topic-hist-chip-lbl { font-size: 8px; color: var(--text-3); font-family: 'DM Mono', 'Courier New', monospace; white-space: nowrap; }
.topic-hist-chip-val { font-size: 12px; font-weight: 700; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; line-height: 1; border: 1px solid var(--border); border-radius: 4px; padding: 2px 5px; background: var(--bg); min-width: 28px; text-align: center; }
.topic-hist-chip-date { font-size: 7px; color: var(--text-3); font-family: 'DM Mono', 'Courier New', monospace; white-space: nowrap; }
.topic-hist-chip.chip-oo .topic-hist-chip-val { background: #e8f7f0; border-color: #1a7a4a; color: #1a7a4a; }
.topic-hist-chip.chip-o  .topic-hist-chip-val { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.topic-hist-chip.chip-n  .topic-hist-chip-val { background: #f0f0ee; border-color: #999; color: #555; }
.topic-hist-chip.chip-x  .topic-hist-chip-val { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.topic-hist-chip.chip-xx .topic-hist-chip-val { background: #fde; border-color: #900; color: #900; }
.topic-hist-empty { font-size: 10px; color: var(--text-3); font-style: italic; }

/* 履歴一覧 */
.hist-page-header { padding: 14px 0 10px; }
.hist-page-title { font-size: 12px; font-weight: 700; color: var(--text-2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
.hist-page-subtitle { font-size: 11px; color: var(--text-3); }
.hist-chapter-block { margin-bottom: 20px; }
.hist-chapter-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.hist-table { width: 100%; border-collapse: collapse; }
.hist-table tr { border-bottom: 1px solid var(--border); }
.hist-table tr:last-child { border-bottom: none; }
.hist-name-cell { padding: 8px 8px 8px 0; font-size: 11px; color: var(--text); line-height: 1.4; min-width: 0; width: 100%; }
.hist-name-inner { display: flex; align-items: center; gap: 5px; }
.hist-rounds-cell { padding: 6px 0 6px 8px; white-space: nowrap; }
.hist-rounds-wrap { display: flex; gap: 4px; align-items: center; }
.hist-round-col { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 36px; }
.hist-round-lbl { font-size: 8px; color: var(--text-3); font-family: 'DM Mono', 'Courier New', monospace; white-space: nowrap; }
.hist-round-date { font-size: 7px; color: var(--text-3); font-family: 'DM Mono', 'Courier New', monospace; white-space: nowrap; }
.hist-round-chip { min-width: 32px; height: 22px; border-radius: 5px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--bg); color: var(--text-3); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; font-weight: 700; padding: 0 3px; }
.hist-round-chip.chip-oo { background: #e8f7f0; border-color: #1a7a4a; color: #1a7a4a; }
.hist-round-chip.chip-o  { background: var(--o-bg); border-color: var(--o-color); color: var(--o-color); }
.hist-round-chip.chip-n  { background: #f0f0ee; border-color: #999; color: #555; }
.hist-round-chip.chip-x  { background: var(--x-bg); border-color: var(--x-color); color: var(--x-color); }
.hist-round-chip.chip-xx { background: #fde; border-color: #900; color: #900; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.scope-modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 16px 44px; width: 100%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
.modal-handle { width: 32px; height: 3px; background: var(--border-strong); border-radius: 999px; margin: 0 auto 14px; }
.scope-options { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
.scope-opt { padding: 13px 14px; border-radius: var(--radius); border: 1.5px solid var(--border-strong); background: var(--bg); font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; cursor: pointer; text-align: left; transition: all .15s; color: var(--text); }
.scope-opt:hover { border-color: var(--text); }
.scope-opt.sel { background: var(--text); color: #fff; border-color: var(--text); }
.scope-opt .scope-sub { font-size: 11px; font-weight: 400; color: inherit; opacity: .7; display: block; margin-top: 2px; }
.form-lbl { font-size: 11px; font-weight: 700; color: var(--text-2); display: block; margin-bottom: 4px; }
.ch-record-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; font-size: 13px; padding: 8px 10px; outline: none; -webkit-appearance: none; appearance: none; }
.ch-record-input:focus { border-color: var(--text); }
.ch-record-save { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: none; background: var(--text); color: #fff; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.empty-state { text-align: center; padding: 48px 16px; color: var(--text-3); font-size: 13px; }

/* 問題追加モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 300; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-inner { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 16px 44px; width: 100%; max-width: 700px; max-height: 85vh; overflow-y: auto; }
.modal-handle2 { width: 32px; height: 3px; background: var(--border-strong); border-radius: 999px; margin: 0 auto 16px; }
.form-section { margin-bottom: 14px; }
.form-label2 { font-size: 11px; font-weight: 700; color: var(--text-2); display: block; margin-bottom: 5px; letter-spacing: .04em; }

<div class="header">
  <div class="header-top">
    <div class="header-meta">
      <div class="app-title">管理会計論（計算）復習管理</div>
      <div class="header-actions">
        <button class="btn-icon" onclick="exportData()">バックアップ</button>
        <button class="btn-icon" onclick="document.getElementById('import-input').click()">復元</button>

    </div>
    <div class="progress-row">

  </div>
  <div class="tabs" id="round-tabs"></div>
  <div class="round-info-bar" id="round-info-bar"></div>
  <div class="view-tabs" id="view-tabs">
    <button class="vtab active" onclick="setViewTab('all',this)">全問題</button>
    <button class="vtab" onclick="setViewTab('topics',this)">論点</button>
    <button class="vtab" onclick="setViewTab('urgent',this)">要復習</button>
  </div>
</div>

<div id="main-view">
  <div class="content" id="content"></div>
  <div class="next-round-wrap" id="next-round-wrap" style="display:none;">

</div>

<div id="weakness-view" class="content" style="display:none;"></div>
<div id="topics-view" class="content" style="display:none;"></div>

// 問題ID→論点IDの逆引き
const Q_TO_TOPICS = {};
TOPICS.forEach(cat => cat.items.forEach(t => {
  t.qs.forEach(qid => {
    if (!Q_TO_TOPICS[qid]) Q_TO_TOPICS[qid] = [];
    Q_TO_TOPICS[qid].push(t.id);
  });
}));
const TOPIC_BY_ID = {};
const TOPIC_ORDER = {};
let _topicOrderIdx = 0;
TOPICS.forEach(cat => cat.items.forEach(t => {
  TOPIC_BY_ID[t.id] = t;
  TOPIC_ORDER[t.id] = _topicOrderIdx++;
}));

function qidToLabel(qid) {
  if (qid === '_direct') return '直接';
  if (qid.startsWith('custom-')) {
    const cp = (appState.customProblems || []).find(p => p.id === qid);
    if (!cp) return qid.slice(0, 8);
    return cp.num || cp.name.slice(0, 8) + (cp.name.length > 8 ? '…' : '');
  }
  return qid.replace('q', 'Q-');
}

function getLinkedTopics(itemId) {
  const tids = Q_TO_TOPICS[itemId] || [];
  return [...tids]
    .sort((a, b) => (TOPIC_ORDER[a] ?? 9999) - (TOPIC_ORDER[b] ?? 9999))
    .map(tid => TOPIC_BY_ID[tid])
    .filter(Boolean);
}

const STORE_KEY = 'kanri-keisan';
let itemState = {}, topicState = {}, appState = {
  rounds:[{label:'第1回', scope:null, deadline:null, startDate:null}],
  currentRound:0
};
let showingWeakness = false;

function load() {
  try {
    const i = _storage.getItem(STORE_KEY+'-item');
    const t = _storage.getItem(STORE_KEY+'-topic');
    const a = _storage.getItem(STORE_KEY+'-app');
    if (i) itemState = JSON.parse(i);
    if (t) topicState = JSON.parse(t);
    if (a) appState = JSON.parse(a);
  } catch(e) {}
}

function save() {
  try {
    _storage.setItem(STORE_KEY+'-item', JSON.stringify(itemState));
    _storage.setItem(STORE_KEY+'-topic', JSON.stringify(topicState));
    _storage.setItem(STORE_KEY+'-app', JSON.stringify(appState));
  } catch(e) {}
}

function today() { return new Date().toISOString().split('T')[0]; }
function curRound() { return appState.currentRound; }
function curScope() { return (appState.rounds[curRound()]||{}).scope || 'all'; }
function curDeadline() { return (appState.rounds[curRound()]||{}).deadline || null; }

function itemInScope(item) {
  const scope = curScope();
  if (scope === 'all') return true;
  if (scope === 'A') return item.imp === 'A';
  if (scope === 'B') return item.imp === 'A' || item.imp === 'B';
  return true;
}
function scopedItems() {
  const base = DATA.flatMap(c => c.items).filter(itemInScope);
  const customs = (appState.customProblems||[]).filter(itemInScope);
  return [...base, ...customs];
}

function getMergedData() {
  const customs = appState.customProblems || [];
  return DATA.map(ch => {
    const chFull = ch.ch + '　' + ch.chName;
    const extras = customs.filter(p => p.ch === chFull || p.ch === ch.ch);
    return extras.length > 0
      ? { ch: ch.ch, chName: ch.chName, catId: ch.catId, items: [...ch.items, ...extras] }
      : ch;
  });
}

function getItemR(id, round) {
  const r = round !== undefined ? round : curRound();
  return (itemState[id]||{})[r] || {};
}
function setItemR(id, data) {
  if (!itemState[id]) itemState[id] = {};
  itemState[id][curRound()] = data;
}

function getTopicEntry(tid, ri, qid) {
  return ((topicState[tid]||{})[ri]||{})[qid] || {};
}
function setTopicEntry(tid, ri, qid, data) {
  if (!topicState[tid]) topicState[tid] = {};
  if (!topicState[tid][ri]) topicState[tid][ri] = {};
  topicState[tid][ri][qid] = data;
}

function daysUntil(d) { if(!d) return null; return Math.ceil((new Date(d).getTime()-Date.now())/86400000); }
function formatDate(d) { if(!d) return ''; const p=d.split('-'); return p.length<3?d:`${parseInt(p[1])}月${parseInt(p[2])}日`; }
function fmtDateShort(d) { if(!d) return ''; const p=d.split('-'); return p.length<3?d:`${parseInt(p[1])}/${parseInt(p[2])}`; }

function calcUrgency(itemId) {
  const r = getItemR(itemId);
  if (r.reviewPassed === true) return null;
  if (!r.u || !r.date) return null;
  const item = DATA.flatMap(c=>c.items).find(i=>i.id===itemId);
  if (!item || !itemInScope(item)) return null;
  const impKey = item.imp === 'A' ? 'A' : 'B';
  if (r.reviewDate) {
    const days = {A:6,B:13}[impKey] || 10;
    return Math.min(100, Math.round(Math.floor((Date.now()-new Date(r.reviewDate).getTime())/86400000)/days*100));
  }
  const DAYS = {A:{oo:13,o:9,n:6,x:4,xx:3},B:{oo:18,o:14,n:11,x:9,xx:6}};
  const days = (DAYS[impKey]||DAYS.B)[r.u] || 11;
  return Math.min(100, Math.round(Math.floor((Date.now()-new Date(r.date).getTime())/86400000)/days*100));
}
function urgencyColor(s) {
  if (s>=80) return '#c0392b'; if (s>=55) return '#e67e22'; if (s>=30) return '#d4a017'; return '#1a7a4a';
}

// ══════════════════════════════════════════
// 章ごとの合計時間を計算（現ラウンド）
// ══════════════════════════════════════════
function calcChTotalMins(ch) {
  const ri = curRound();
  let total = 0;
  ch.items.forEach(item => {
    const r = (itemState[item.id]||{})[ri] || {};
    if (r.time) total += parseInt(r.time) || 0;
  });
  return total;
}

function fmtMins(mins) {
  if (!mins) return null;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}h${m > 0 ? m + 'm' : ''}` : `${m}m`;
}

let curViewTab = 'all';

function setViewTab(tab, btn) {
  curViewTab = tab;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const mainView = document.getElementById('main-view');
  const topicsView = document.getElementById('topics-view');
  if (tab === 'topics') {
    mainView.style.display = 'none';
    topicsView.style.display = 'block';
    renderTopicsView();
  } else {
    mainView.style.display = 'block';
    topicsView.style.display = 'none';
    updateItemTopButtons();
    applyFilter();
  }
}

function updateItemTopButtons() {
  DATA.forEach(ch => ch.items.forEach(item => {
    if (!itemInScope(item)) return;
    const row = document.getElementById('irow-'+item.id);
    if (!row) return;
    const r = getItemR(item.id);
    const urgency = calcUrgency(item.id);
    const showRev = urgency !== null && curViewTab === 'urgent';
    const rpR = r.reviewPassed === true;
    const hasRXR = !rpR && !!r.reviewDate;
    const uBtns = row.querySelector('.u-btns');
    const revBtns = row.querySelector('.review-eval-btns');
    if (showRev) {
      if (uBtns) uBtns.style.display = 'none';
      if (revBtns) {
        revBtns.style.display = 'flex';
        const [oBtn,xBtn] = revBtns.querySelectorAll('.ub-rev');
        if (oBtn) oBtn.className = 'ub-rev'+(rpR?' sel-o':'');
        if (xBtn) xBtn.className = 'ub-rev'+(hasRXR?' sel-x':'');
      }
    } else {
      if (uBtns) uBtns.style.display = 'flex';
      if (revBtns) revBtns.style.display = 'none';
    }
  }));
}

function applyFilter() {
  DATA.forEach(ch => {
    const key = chKey(ch);
    const card = document.getElementById('chcard-'+key);
    if (!card) return;
    let anyVisible = false;
    ch.items.forEach(item => {
      const row = document.getElementById('irow-'+item.id);
      if (!row) return;
      if (!itemInScope(item)) { row.style.display='none'; return; }
      let show = true;
      if (curViewTab==='urgent') { const s=calcUrgency(item.id); show=s!==null&&s>=70; }
      row.style.display = show?'':'none';
      if (show) anyVisible = true;
    });
    card.classList.toggle('hidden', curViewTab==='urgent' && !anyVisible);
  });
  (appState.customProblems||[]).forEach(item => {
    const row = document.getElementById('irow-'+item.id);
    if (!row) return;
    if (!itemInScope(item)) { row.style.display='none'; return; }
    let show = true;
    if (curViewTab==='urgent') { const s=calcUrgency(item.id); show=s!==null&&s>=70; }
    row.style.display = show?'':'none';
  });
  const addBtnWrap = document.getElementById('add-prob-btn-wrap');
  if (addBtnWrap) addBtnWrap.style.display = curViewTab==='urgent' ? 'none' : '';
}

function chKey(ch) { const n=ch.ch.match(/\d+/); return n?'ch'+n[0]:ch.ch; }

function buildChCard(ch) {
  const key = chKey(ch);
  const scoped = ch.items.filter(itemInScope);
  const total = scoped.length;
  const done = scoped.filter(i=>getItemR(i.id).u).length;
  const isDone = done===total && total>0;
  const totalMins = calcChTotalMins(ch);
  const timeLabel = fmtMins(totalMins);

  const card = document.createElement('div');
  card.className = 'ch-card';
  card.id = 'chcard-'+key;

  const aCount = ch.items.filter(i=>i.imp==='A').length;
  const bCount = ch.items.filter(i=>i.imp==='B').length;
  const cCount = ch.items.filter(i=>i.imp==='C').length;

  const hd = document.createElement('div');
  hd.className = 'ch-header';
  hd.onclick = () => card.classList.toggle('open');
  hd.innerHTML = `
    <span class="ch-chevron">▶</span>
    <div class="ch-info">
      <div class="ch-name">${ch.ch}　${ch.chName}</div>
      <div class="ch-sub">A:${aCount} B:${bCount} C:${cCount}</div>
    </div>
    <span class="ch-time-badge ${timeLabel?'has-time':''}" id="chtime-${key}">${timeLabel||'–'}</span>
    <span class="ch-badge ${isDone?'done':''}" id="chprog-${key}">${done}/${total}</span>`;
  card.appendChild(hd);

  const iw = document.createElement('div');
  iw.className = 'items-wrap';
  ch.items.forEach(item => { if (!itemInScope(item)) return; iw.appendChild(buildItemRow(item)); });
  card.appendChild(iw);

  return card;
}

          <button class="tub ${tu==='oo'?'sel-oo':''}" onclick="setTopicU('${t.id}','oo','${item.id}')">○○</button>
          <button class="tub ${tu==='o'?'sel-o':''}"  onclick="setTopicU('${t.id}','o','${item.id}')">○</button>
          <button class="tub ${tu==='n'?'sel-n':''}"  onclick="setTopicU('${t.id}','n','${item.id}')">ー</button>
          <button class="tub ${tu==='x'?'sel-x':''}"  onclick="setTopicU('${t.id}','x','${item.id}')">×</button>
          <button class="tub ${tu==='xx'?'sel-xx':''}" onclick="setTopicU('${t.id}','xx','${item.id}')">××</button>
        </div>
      </div>`;
    }).join('');
    const summaryRows = linkedTopics.map(t => {
      const entry = getTopicEntry(t.id, curRound(), item.id);
      const tu = entry.u || null;
      const evalSym = tu==='oo'?'○○':tu==='o'?'○':tu==='n'?'ー':tu==='x'?'×':tu==='xx'?'××':'–';
      const evalCls = tu ? 'tub sel-'+tu : 'tub';
      return `<div class="topic-prompt-item">
        <span class="topic-prompt-imp imp-${t.imp}">${t.imp}</span>
        <span class="topic-prompt-name">${t.name}</span>
        <span class="${evalCls}" style="pointer-events:none;min-width:32px;height:22px;font-size:10px;">${evalSym}</span>
      </div>`;
    }).join('');
    const isConfirmed = !!r.confirmed;
    topicPromptHTML = `<div class="topic-prompt" id="tprompt-${item.id}" style="display:${u && !isConfirmed?'':'none'}">
      <div class="topic-prompt-title">📌 この問題の論点を記録してください</div>
      <div class="topic-prompt-list">${rows}</div>
      <button class="topic-prompt-done-btn" onclick="closeDonePrompt('${item.id}')">終了</button>
    </div>
    <div id="tsummary-${item.id}" style="display:${isConfirmed?'block':'none'};">
      <div class="topic-prompt" style="background:var(--bg);border-color:var(--border);">
        <div class="topic-prompt-title" style="color:var(--text-2);">📋 論点評価</div>
        <div class="topic-prompt-list">${summaryRows}</div>
      </div>
    </div>`;
  }

  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = 'irow-'+item.id;
  row.innerHTML = `
    <div class="item-top">
      <span class="item-name">${item.name}</span>
      <span class="imp-badge imp-${item.imp}">${item.imp}</span>
      ${linkedTopics.length>0?`<button onclick="toggleTopicSummary('${item.id}')" id="tsumbtn-${item.id}" style="padding:2px 7px;border-radius:4px;border:1px solid var(--border-strong);background:var(--bg);color:var(--text-3);font-size:10px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;flex-shrink:0;white-space:nowrap;">論点</button>`:''}
      <div class="u-btns" style="${showRevEval?'display:none':''}${r.confirmed?' pointer-events:none;opacity:0.5;':''}">
        <button class="ub ${u==='oo'?'sel-oo':''}" onclick="setU('${item.id}','oo')">○○</button>
        <button class="ub ${u==='o'?'sel-o':''}"  onclick="setU('${item.id}','o')">○</button>
        <button class="ub ${u==='n'?'sel-n':''}"  onclick="setU('${item.id}','n')">ー</button>
        <button class="ub ${u==='x'?'sel-x':''}"  onclick="setU('${item.id}','x')">×</button>
        <button class="ub ${u==='xx'?'sel-xx':''}" onclick="setU('${item.id}','xx')">××</button>
      </div>
      <div class="review-eval-btns" style="${showRevEval?'':'display:none'}">
        <button class="ub-rev${rp?' sel-o':''}" onclick="reviewItem('${item.id}','o')">○</button>
        <button class="ub-rev${hasReviewX?' sel-x':''}" onclick="reviewItem('${item.id}','x')">×</button>
      </div>
    </div>
    ${urgencyHTML}
    ${histHTML}
    ${recordHTML}
    ${topicPromptHTML}
    <textarea class="item-memo" placeholder="メモ..." rows="1"
      onchange="saveMemo('${item.id}',this.value)"
      oninput="autoResize(this)">${r.memo||''}</textarea>`;
  return row;
}

// 問題単位の実施記録を保存し、章の合計時間バッジを更新
function saveItemRecord(itemId) {
  const dateEl = document.getElementById('irec-date-'+itemId);
  const timeEl = document.getElementById('irec-time-'+itemId);
  if (!dateEl || !timeEl) return;
  const r = getItemR(itemId);
  r.date = dateEl.value || null;
  r.time = timeEl.value || null;
  setItemR(itemId, r);
  save();
  // 章ヘッダーの合計時間バッジを更新
  refreshChTimeBadge(itemId);
}

function refreshChTimeBadge(itemId) {
  // DATAとカスタム問題の両方から所属章を探す
  let ch = getMergedData().find(c => c.items.find(i => i.id === itemId));
  if (!ch) return;
  const key = chKey(ch);
  const totalMins = calcChTotalMins(ch);
  const label = fmtMins(totalMins);
  const badge = document.getElementById('chtime-'+key);
  if (badge) {
    badge.textContent = label || '–';
    badge.className = 'ch-time-badge' + (label ? ' has-time' : '');
  }
}

// ══════════════════════════════════════════
// 論点タブ
// ══════════════════════════════════════════
function renderTopicsView() {
  const view = document.getElementById('topics-view');
  const totalRounds = appState.rounds.length;
  const allItems = TOPICS.flatMap(cat=>cat.items);
  const doneEntries = allItems.reduce((acc,t) => {
    for (let ri=0; ri<totalRounds; ri++) {
      const qids = [...t.qs, '_direct'];
      qids.forEach(qid => { if (getTopicEntry(t.id,ri,qid).u) acc++; });
    }
    return acc;
  }, 0);

  let html = `<div class="topic-section-header">
    <div class="topic-section-title">論点一覧</div>
    <div class="topic-section-sub">記録済みエントリ: ${doneEntries} 件</div>
  </div>`;

  TOPICS.forEach(cat => {
    const EVAL_SCORE = {oo:5,o:4,n:3,x:2,xx:1};
    const catScores = [];
    getTopicsForCat(cat.catId).forEach(t => {
      for (let ri=0; ri<totalRounds; ri++) {
        [...t.qs,'_direct'].forEach(qid => {
          const e = getTopicEntry(t.id,ri,qid);
          if (e.u && EVAL_SCORE[e.u]) catScores.push(EVAL_SCORE[e.u]);
        });
      }
    });
    const catAvg = catScores.length > 0 ? catScores.reduce((a,b)=>a+b,0)/catScores.length : null;
    const catAvgLabel = catAvg===null?'–':catAvg>=4.5?'○○':catAvg>=3.5?'○':catAvg>=2.5?'ー':catAvg>=1.5?'×':'××';
    const catId = cat.catId;
    html += `<div class="topic-card" id="tcard-${catId}">
      <div class="topic-card-header" onclick="document.getElementById('tcard-${catId}').classList.toggle('open')">
        <span class="ch-chevron">▶</span>
        <div class="topic-card-info">
          <div class="topic-card-name">${cat.cat}</div>
          <div class="topic-card-sub">${(()=>{const all=getTopicsForCat(cat.catId);return `A:${all.filter(t=>t.imp==='A').length} B:${all.filter(t=>t.imp==='B').length} C:${all.filter(t=>t.imp==='C').length}`;})()}</div>
        </div>
        <span class="ch-badge ${catAvg===null?'':catAvg>=4.5?'done':catAvg>=3.5?'done':''}">${catAvgLabel}</span>
      </div>
      <div class="topic-items-wrap">`;

    getTopicsForCat(cat.catId).forEach(t => {
      const entries = [];
      const tidData = topicState[t.id] || {};
      for (let ri=0; ri<totalRounds; ri++) {
        const riData = tidData[ri] || {};
        Object.entries(riData).forEach(([qid, e]) => {
          if (e && e.u) entries.push({ri,qid,u:e.u,date:e.date||''});
        });
      }
      const qsLabel = t.qs.length>0 ? t.qs.map(q=>q.replace('q','Q-')).join(', ') : '–';
      let chipsHTML = '';
      if (entries.length > 0) {
        chipsHTML = '<div class="topic-hist-chips">' + entries.map(({qid,u,date}) => {
          const lbl = qidToLabel(qid);
          const sym = u==='oo'?'○○':u==='o'?'○':u==='n'?'ー':u==='x'?'×':u==='xx'?'××':'–';
          const ds = fmtDateShort(date);
          return `<div class="topic-hist-chip chip-${u}">
            <span class="topic-hist-chip-lbl">${lbl}</span>
            <span class="topic-hist-chip-val">${sym}</span>
            <span class="topic-hist-chip-date">${ds}</span>
          </div>`;
        }).join('') + '</div>';
      } else {
        chipsHTML = '<div class="topic-hist-empty">記録なし</div>';
      }
      html += `<div class="topic-item-row" id="trow-${t.id}">
        <div class="topic-item-header">
          <span class="imp-badge imp-${t.imp}">${t.imp}</span>
          <span class="topic-item-name">${t.name}</span>
          <span class="topic-item-qs">${qsLabel}</span>
        </div>
        ${chipsHTML}
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `<div style="padding:4px 0 12px;">
    <button onclick="openNewTopicModal()" style="width:100%;padding:12px;border-radius:var(--radius);border:1.5px dashed var(--border-strong);background:transparent;color:var(--text-2);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">＋ 論点を追加する</button>
  </div>`;
  view.innerHTML = html;
}

function setTopicU(tid, type, qid) {
  const ri = curRound();
  const entry = getTopicEntry(tid,ri,qid);
  const newU = entry.u===type ? null : type;
  setTopicEntry(tid,ri,qid, newU?{u:newU,date:today()}:{});
  save();
  const prompt = document.getElementById('tprompt-'+qid);
  if (prompt) {
    prompt.querySelectorAll('.topic-prompt-item').forEach(pi => {
      const fb = pi.querySelector('.tub');
      if (!fb || !(fb.getAttribute('onclick')||'').includes(`'${tid}'`)) return;
      pi.querySelectorAll('.tub').forEach(b => b.className=b.className.replace(/ sel-\w+/g,''));
      if (newU) {
        const sel = pi.querySelector(`.tub[onclick*="'${tid}','${newU}'"]`);
        if (sel) sel.classList.add('sel-'+newU);
      }
    });
  }
  renderTopicsView();
}

function closeDonePrompt(itemId) {
  const r = getItemR(itemId);
  r.confirmed = true;
  setItemR(itemId, r);
  save();
  const prompt = document.getElementById('tprompt-'+itemId);
  if (prompt) prompt.style.display = 'none';
  refreshTopicSummary(itemId);
  const summary = document.getElementById('tsummary-'+itemId);
  if (summary) summary.style.display = 'block';
  lockEvalBtns(itemId);
}

function lockEvalBtns(itemId) {
  const uBtns = document.querySelector('#irow-'+itemId+' .u-btns');
  if (uBtns) {
    uBtns.style.pointerEvents = 'none';
    uBtns.style.opacity = '0.5';
  }
}

function toggleTopicSummary(itemId) {
  const summary = document.getElementById('tsummary-'+itemId);
  const prompt = document.getElementById('tprompt-'+itemId);
  const btn = document.getElementById('tsumbtn-'+itemId);
  if (!summary) return;
  const isVisible = summary.style.display === 'block';
  if (isVisible) {
    summary.style.display = 'none';
    if (btn) { btn.style.background = 'var(--bg)'; btn.style.color = 'var(--text-3)'; }
  } else {
    if (prompt) prompt.style.display = 'none';
    refreshTopicSummary(itemId);
    summary.style.display = 'block';
    if (btn) { btn.style.background = '#fffbea'; btn.style.color = '#7c5c00'; btn.style.borderColor = '#e8d88a'; }
  }
}

function refreshTopicSummary(itemId) {
  const summary = document.getElementById('tsummary-'+itemId);
  if (!summary) return;
  const linkedTopics = getLinkedTopics(itemId);
  if (linkedTopics.length === 0) return;
  const rows = linkedTopics.map(t => {
    const entry = getTopicEntry(t.id, curRound(), itemId);
    const tu = entry.u || null;
    const sym = tu==='oo'?'○○':tu==='o'?'○':tu==='n'?'ー':tu==='x'?'×':tu==='xx'?'××':'–';
    const cls = tu ? 'tub sel-'+tu : 'tub';
    return '<div class="topic-prompt-item">'
      + '<span class="topic-prompt-imp imp-'+t.imp+'">'+t.imp+'</span>'
      + '<span class="topic-prompt-name">'+t.name+'</span>'
      + '<span class="'+cls+'" style="pointer-events:none;min-width:32px;height:22px;font-size:10px;">'+sym+'</span>'
      + '</div>';
  }).join('');
  summary.innerHTML = '<div class="topic-prompt" style="background:var(--bg);border-color:var(--border);">'
    + '<div class="topic-prompt-title" style="color:var(--text-2);">📋 論点評価</div>'
    + '<div class="topic-prompt-list">'+rows+'</div>'
    + '</div>';
}

// ══════════════════════════════════════════
// 問題評価
// ══════════════════════════════════════════
function setU(itemId, type) {
  const r = getItemR(itemId);
  if (r.confirmed) return;
  const wasEvaluated = !!r.u;
  if (r.u===type) { r.u=null; r.date=null; } else { r.u=type; r.date=today(); }
  const hasTopics = (Q_TO_TOPICS[itemId]||[]).length > 0;
  if (!hasTopics && r.u) r.confirmed = true;
  setItemR(itemId, r);
  save();
  // 実施記録フォームの表示制御
  const recForm = document.getElementById('irec-'+itemId);
  if (recForm) {
    recForm.classList.toggle('open', !!r.u);
    // 初めて評価したとき、日付を今日で自動セット
    if (r.u && !wasEvaluated) {
      const dateEl = document.getElementById('irec-date-'+itemId);
      if (dateEl && !dateEl.value) {
        dateEl.value = today();
        saveItemRecord(itemId);
      }
    }
  }
  refreshItem(itemId);
  refreshChProg(itemId);
  updateProgress();
  updateNextRoundBtn();
  const prompt = document.getElementById('tprompt-'+itemId);
  if (prompt) prompt.style.display = r.u?'':'none';
}

function saveMemo(itemId, val) {
  const r = getItemR(itemId); r.memo=val; setItemR(itemId,r); save();
}
function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

function reviewItem(itemId, type) {
  const r = getItemR(itemId);
  if (type==='o') { r.reviewPassed=true; r.reviewDate=today(); }
  else { r.reviewPassed=false; r.reviewDate=today(); }
  setItemR(itemId,r); save();
  refreshItem(itemId); applyFilter();
}

function refreshItem(itemId) {
  const r = getItemR(itemId);
  const row = document.getElementById('irow-'+itemId);
  if (!row) return;
  ['oo','o','n','x','xx'].forEach(t => {
    const btn = row.querySelector(`.ub[onclick="setU('${itemId}','${t}')"]`);
    if (!btn) return;
    btn.classList.remove('sel-oo','sel-o','sel-n','sel-x','sel-xx');
    if (r.u===t) btn.classList.add('sel-'+t);
  });
  const urgency = calcUrgency(itemId);
  const showRev = urgency!==null && curViewTab==='urgent';
  const rpR = r.reviewPassed===true;
  const hasRXR = !rpR && !!r.reviewDate;
  const uBtns = row.querySelector('.u-btns');
  const revBtns = row.querySelector('.review-eval-btns');
  if (showRev) {
    if (uBtns) uBtns.style.display='none';
    if (revBtns) {
      revBtns.style.display='flex';
      const [oB,xB]=revBtns.querySelectorAll('.ub-rev');
      if(oB) oB.className='ub-rev'+(rpR?' sel-o':'');
      if(xB) xB.className='ub-rev'+(hasRXR?' sel-x':'');
    }
  } else {
    if (uBtns) uBtns.style.display='flex';
    if (revBtns) revBtns.style.display='none';
  }
  const wrap = row.querySelector('.urgency-wrap');
  if (urgency!==null) {
    const color=urgencyColor(urgency);
    const div=document.createElement('div');
    div.className='urgency-wrap'; div.id='urg-'+itemId;
    div.innerHTML=`<span class="urgency-score" style="color:${color}">${urgency}</span><div class="urgency-track"><div class="urgency-fill" style="width:${urgency}%;background:${color}"></div></div>`;
    if (wrap) wrap.replaceWith(div);
    else { const top=row.querySelector('.item-top'); if(top) top.insertAdjacentElement('afterend',div); }
  } else if (wrap) wrap.remove();
}

function refreshChProg(itemId) {
  const ch = getMergedData().find(c=>c.items.find(i=>i.id===itemId));
  if (!ch) return;
  const key = chKey(ch);
  const scoped = ch.items.filter(itemInScope);
  const done = scoped.filter(i=>getItemR(i.id).u).length;
  const isDone = done===scoped.length && scoped.length>0;
  const el = document.getElementById('chprog-'+key);
  if (el) { el.textContent=`${done}/${scoped.length}`; el.className='ch-badge'+(isDone?' done':''); }
}

function toggleWeaknessPage() {
  showingWeakness = !showingWeakness;
  const isTopics = curViewTab==='topics';
  document.getElementById('main-view').style.display = showingWeakness?'none':(isTopics?'none':'block');
  document.getElementById('topics-view').style.display = showingWeakness?'none':(isTopics?'block':'none');
  document.getElementById('weakness-view').style.display = showingWeakness?'block':'none';
  document.getElementById('view-tabs').style.display = showingWeakness?'none':'flex';
  document.getElementById('weakness-btn').classList.toggle('active', showingWeakness);
  if (showingWeakness) renderWeaknessPage();
}

function renderWeaknessPage() {
  const view = document.getElementById('weakness-view');
  const totalRounds = appState.rounds.length;
  const roundHeaders = Array.from({length:totalRounds},(_,i)=>(appState.rounds[i]||{}).label||`第${i+1}回`);
  const roundStats = roundHeaders.map((label,i)=>{
    const rd=appState.rounds[i]||{};
    const sc=rd.scope==='A'?'A':rd.scope==='B'?'A·B':'全';
    return {label,sc};
  });

  let html = `<div class="hist-page-header"><div class="hist-page-title">履歴一覧</div><div class="hist-page-subtitle">問題ごとの回答履歴 · 横に回が進む</div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">`;
  roundStats.forEach(({label,sc},i)=>{
    const isActive=i===curRound();
    html+=`<div style="background:${isActive?'var(--text)':'var(--surface)'};color:${isActive?'#fff':'var(--text)'};border:1px solid ${isActive?'var(--text)':'var(--border)'};border-radius:var(--radius);padding:8px 12px;">
      <div style="font-size:10px;font-weight:700;font-family:'DM Mono',monospace;margin-bottom:3px;opacity:${isActive?1:.7}">${label}（${sc}）</div>
    </div>`;
  });
  html += '</div>';

  getMergedData().forEach(ch=>{
    const scoped=ch.items.filter(itemInScope);
    if (!scoped.length) return;
    html+=`<div class="hist-chapter-block"><div class="hist-chapter-title">${ch.ch}　${ch.chName}</div><table class="hist-table"><tbody>`;
    scoped.forEach(item=>{
      const cols=roundHeaders.map((label,i)=>{
        const rd=(itemState[item.id]||{})[i]||{};
        const u=rd.u||null; const chipCls=u?`chip-${u}`:'';
        const sym=u==='oo'?'○○':u==='o'?'○':u==='n'?'ー':u==='x'?'×':u==='xx'?'××':'–';
        const rn=label.replace('第','').replace('回','');
        const ds=rd.date?fmtDateShort(rd.date):'';
        const tm=rd.time?rd.time+'m':'';
        return `<div class="hist-round-col"><span class="hist-round-lbl">${rn}回</span><div class="hist-round-chip ${chipCls}">${sym}</div><span class="hist-round-date">${ds}${ds&&tm?' ':''}${tm}</span></div>`;
      }).join('');
      html+=`<tr><td class="hist-name-cell"><div class="hist-name-inner"><span class="imp-badge imp-${item.imp}">${item.imp}</span><span>${item.name}</span></div></td><td class="hist-rounds-cell"><div class="hist-rounds-wrap">${cols}</div></td></tr>`;
    });
    html+='</tbody></table></div>';
  });

  // 論点履歴
  html+=`<div class="hist-page-header" style="margin-top:24px;"><div class="hist-page-title">論点一覧</div><div class="hist-page-subtitle">論点ごとの評価履歴（問題×ラウンド単位で積み上げ）</div></div>`;
  TOPICS.forEach(cat=>{
    html+=`<div class="hist-chapter-block"><div class="hist-chapter-title">${cat.cat}</div><table class="hist-table"><tbody>`;
    cat.items.forEach(t=>{
      const allEntries=[];
      for (let ri=0;ri<totalRounds;ri++) {
        const rn=roundHeaders[ri].replace('第','').replace('回','');
        t.qs.forEach(qid=>{
          const e=getTopicEntry(t.id,ri,qid);
          if(e.u){const sym=e.u==='oo'?'○○':e.u==='o'?'○':e.u==='n'?'ー':e.u==='x'?'×':e.u==='xx'?'××':'–';allEntries.push({lbl:`${rn}回/${qidToLabel(qid)}`,u:e.u,sym,ds:fmtDateShort(e.date||'')});}
        });
        const ed=getTopicEntry(t.id,ri,'_direct');
        if(ed.u){const sym=ed.u==='oo'?'○○':ed.u==='o'?'○':ed.u==='n'?'ー':ed.u==='x'?'×':ed.u==='xx'?'××':'–';allEntries.push({lbl:`${rn}回/直接`,u:ed.u,sym,ds:fmtDateShort(ed.date||'')});}
      }
      const chips=allEntries.length>0?allEntries.map(({lbl,u,sym,ds})=>`<div class="hist-round-col"><span class="hist-round-lbl">${lbl}</span><div class="hist-round-chip chip-${u}">${sym}</div><span class="hist-round-date">${ds}</span></div>`).join(''):`<span style="font-size:10px;color:var(--text-3);">記録なし</span>`;
      html+=`<tr><td class="hist-name-cell"><div class="hist-name-inner"><span class="imp-badge imp-${t.imp}">${t.imp}</span><span>${t.name}</span></div></td><td class="hist-rounds-cell"><div class="hist-rounds-wrap">${chips}</div></td></tr>`;
    });
    html+='</tbody></table></div>';
  });

function renderRoundTabs() {
  const tabs = document.getElementById('round-tabs');
  tabs.innerHTML='';
  appState.rounds.forEach((rd,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(i===curRound()?' active':'');
    const sc=rd.scope==='A'?'(A)':rd.scope==='B'?'(A·B)':'(全)';
    btn.textContent=(rd.label||`第${i+1}回`)+sc;
    btn.onclick=()=>switchRound(i);
    tabs.appendChild(btn);
  });
}

function switchRound(i) {
  appState.currentRound=i; save(); render();
  if (curViewTab==='topics') renderTopicsView();
}

function updateProgress() {
  const items=scopedItems(); const total=items.length;
  const done=items.filter(i=>getItemR(i.id).u).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-lbl').textContent=`${done} / ${total} 完了`;
  document.getElementById('prog-bar').style.width=pct+'%';
  updateRoundInfoBar(pct);
}

function updateRoundInfoBar(pct) {
  const bar=document.getElementById('round-info-bar'); if(!bar) return;
  const rd=appState.rounds[curRound()]||{};
  const scopeLabel=rd.scope==='A'?'A のみ':rd.scope==='B'?'A・B':'全部';
  const dl=rd.deadline; const days=daysUntil(dl);
  const daysStr=days===null?'未設定':days<0?`${Math.abs(days)}日超過`:`残り${days}日`;
  const daysClass=days===null?'':days<=7?'warn':'ok';
  const items=scopedItems(); const remaining=items.filter(i=>!getItemR(i.id).u).length;
  let paceHTML='';
  if (days!==null&&days>0) {
    const perDay=remaining/days; const basePace=rd.basePace||(items.length/days);
    const ratio=perDay/basePace;
    const perDayStr=perDay>=10?Math.round(perDay)+'問':perDay.toFixed(1)+'問';
    const diff=perDay-basePace;
    const diffStr=diff>0.05?'+'+diff.toFixed(1)+'問/日':diff<-0.05?diff.toFixed(1)+'問/日':'基準通り';
    const diffStyle=diff>0.05?'color:var(--x-color)':diff<-0.05?'color:var(--o-color)':'color:var(--text-3)';
    const paceClass=ratio>1.2?'warn':ratio>1.0?'':'ok';
    paceHTML=`<div class="ri-item"><span class="ri-lbl">1日ペース</span><span class="ri-val ${paceClass}">${perDayStr}<span style="font-size:10px;font-weight:500;margin-left:4px;${diffStyle}">(${diffStr})</span></span></div>`;
  } else if (days!==null&&days<=0) {
    paceHTML=`<div class="ri-item"><span class="ri-lbl">1日ペース</span><span class="ri-val warn">期限超過</span></div>`;
  }
  bar.innerHTML=`
    <div class="ri-item"><span class="ri-lbl">回</span><span class="ri-val">${rd.label||''}</span></div>
    <div class="ri-item"><span class="ri-lbl">対象</span><button class="ri-deadline-btn" onclick="openScopeModal(curRound()===0)">${scopeLabel}</button></div>
    <div class="ri-item"><span class="ri-lbl">期限</span><button class="ri-deadline-btn" onclick="openDeadlineModal()">${dl?formatDate(dl):'未設定'}</button></div>
    <div class="ri-item"><span class="ri-lbl">残り</span><span class="ri-val ${daysClass}">${daysStr}</span></div>
    <div class="ri-item"><span class="ri-lbl">進捗</span><span class="ri-val">${pct}%</span></div>
    ${paceHTML}`;
}

function updateNextRoundBtn() {
  const items=scopedItems(); const total=items.length;
  const done=items.filter(i=>getItemR(i.id).u).length;
  document.getElementById('next-round-wrap').style.display=total&&done/total*100>=70?'block':'none';
}

let pendingScope=null, pendingScopeIsFirst=false;

function openScopeModal(isFirst) {
  pendingScope=null; pendingScopeIsFirst=isFirst||false;
  const n=pendingScopeIsFirst?1:appState.rounds.length+1;
  document.getElementById('scope-modal-title').textContent=`第${n}回を始める`;
  if (pendingScopeIsFirst) {
    const cur=appState.rounds[0]||{};
    document.getElementById('scope-startdate').value=cur.startDate||today();
    document.getElementById('scope-deadline').value=cur.deadline||'';
    const curS=cur.scope||null;
    document.querySelectorAll('.scope-opt').forEach(b=>b.classList.remove('sel'));
    if (curS) {
      const idx=curS==='all'?0:curS==='A'?1:2;
      document.querySelectorAll('.scope-opt')[idx].classList.add('sel');
      pendingScope=curS;
      document.getElementById('scope-confirm-btn').style.opacity='1';
      document.getElementById('scope-confirm-btn').style.pointerEvents='auto';
    } else {
      document.getElementById('scope-confirm-btn').style.opacity='.4';
      document.getElementById('scope-confirm-btn').style.pointerEvents='none';
    }
  } else {
    document.getElementById('scope-startdate').value=today();
    document.getElementById('scope-deadline').value='';
    document.querySelectorAll('.scope-opt').forEach(b=>b.classList.remove('sel'));
    document.getElementById('scope-confirm-btn').style.opacity='.4';
    document.getElementById('scope-confirm-btn').style.pointerEvents='none';
  }
  document.getElementById('scope-overlay').classList.add('open');
}

function checkScopeConfirmBtn() {
  const ok=!!pendingScope&&!!(document.getElementById('scope-startdate').value);
  document.getElementById('scope-confirm-btn').style.opacity=ok?'1':'.4';
  document.getElementById('scope-confirm-btn').style.pointerEvents=ok?'auto':'none';
}

function selectScope(scope) {
  pendingScope=scope;
  document.querySelectorAll('.scope-opt').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.scope-opt')[scope==='all'?0:scope==='A'?1:2].classList.add('sel');
  checkScopeConfirmBtn();
}

document.getElementById('scope-confirm-btn').onclick = function() {
  if (!pendingScope) return;
  const startDate=document.getElementById('scope-startdate').value||today();
  const deadline=document.getElementById('scope-deadline').value||null;
  const baseDays=deadline?daysUntil(deadline):null;
  const baseTotal=DATA.flatMap(c=>c.items).filter(item=>{
    if (pendingScope==='A') return item.imp==='A';
    if (pendingScope==='B') return item.imp==='A'||item.imp==='B';
    return true;
  }).length;
  const basePace=(baseDays&&baseDays>0)?baseTotal/baseDays:null;
  if (pendingScopeIsFirst) {
    Object.assign(appState.rounds[0],{scope:pendingScope,startDate,deadline,basePace});
  } else {
    const n=appState.rounds.length+1;
    appState.rounds.push({label:`第${n}回`,scope:pendingScope,startDate,deadline,basePace});
    appState.currentRound=appState.rounds.length-1;
  }
  save();
  document.getElementById('scope-overlay').classList.remove('open');
  render();
};

document.getElementById('scope-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('scope-overlay')) document.getElementById('scope-overlay').classList.remove('open');
});

function openDeadlineModal() {
  document.getElementById('deadline-input').value=curDeadline()||'';

}

}

function exportData() {
  const data={version:4,label:'管理会計論（計算）',exportedAt:new Date().toISOString(),
    itemState:JSON.parse(_storage.getItem(STORE_KEY+'-item')||'{}'),
    topicState:JSON.parse(_storage.getItem(STORE_KEY+'-topic')||'{}'),
    appState:JSON.parse(_storage.getItem(STORE_KEY+'-app')||'{}')};
  const url=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  const a=document.createElement('a'); a.href=url; a.download='kanri_keisan_backup.json'; a.click(); URL.revokeObjectURL(url);
}

function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try {
      const data=JSON.parse(ev.target.result);
      if (!data.itemState||!data.appState) throw new Error('invalid');
      if (!confirm('現在のデータを上書きして復元しますか？')) return;
      _storage.setItem(STORE_KEY+'-item',JSON.stringify(data.itemState));
      _storage.setItem(STORE_KEY+'-topic',JSON.stringify(data.topicState||{}));
      _storage.setItem(STORE_KEY+'-app',JSON.stringify(data.appState));
      location.reload();
    } catch(err){alert('ファイルの読み込みに失敗しました。');}
  };
  reader.readAsText(file); e.target.value='';
}

// appState.customTopics = [{id, catId, afterId, name, imp, qs}]
// afterId: その論点IDの直後に挿入（'_top'なら先頭）

function rebuildTopicIndex() {
  // TOPIC_BY_ID / TOPIC_ORDER / Q_TO_TOPICS をカスタム論点込みで再構築
  // まずデフォルト分をクリア＆再登録
  Object.keys(TOPIC_BY_ID).forEach(k => { if (k.startsWith('ct-')) delete TOPIC_BY_ID[k]; });
  // Q_TO_TOPICSのカスタム論点分をクリア
  Object.keys(Q_TO_TOPICS).forEach(qid => {
    Q_TO_TOPICS[qid] = Q_TO_TOPICS[qid].filter(tid => !tid.startsWith('ct-'));
  });
  // カスタム論点を登録
  (appState.customTopics || []).forEach(ct => {
    TOPIC_BY_ID[ct.id] = ct;
    ct.qs.forEach(qid => {
      if (!Q_TO_TOPICS[qid]) Q_TO_TOPICS[qid] = [];
      if (!Q_TO_TOPICS[qid].includes(ct.id)) Q_TO_TOPICS[qid].push(ct.id);
    });
  });
  // TOPIC_ORDER を全論点（デフォルト＋カスタム挿入済み）で再計算
  let idx = 0;
  getAllTopicsOrdered().forEach(t => { TOPIC_ORDER[t.id] = idx++; });
}

// 全カテゴリの論点をカスタム挿入込みで順番通りに返す
function getAllTopicsOrdered() {
  const result = [];
  TOPICS.forEach(cat => {
    const customs = (appState.customTopics || []).filter(ct => ct.catId === cat.catId);
    // 先頭挿入分
    customs.filter(ct => ct.afterId === '_top').forEach(ct => result.push(ct));
    getTopicsForCat(cat.catId).forEach(t => {
      result.push(t);
      // この論点の直後に挿入するカスタム論点
      customs.filter(ct => ct.afterId === t.id).forEach(ct => result.push(ct));
    });
  });
  return result;
}

// カテゴリ内の論点をカスタム挿入込みで返す
function getTopicsForCat(catId) {
  const cat = TOPICS.find(c => c.catId === catId);
  if (!cat) return [];
  const customs = (appState.customTopics || []).filter(ct => ct.catId === catId);
  const result = [];
  customs.filter(ct => ct.afterId === '_top').forEach(ct => result.push(ct));
  cat.items.forEach(t => {
    result.push(t);
    customs.filter(ct => ct.afterId === t.id).forEach(ct => result.push(ct));
  });
  return result;
}

    document.getElementById('topic-edit-modal-sub').textContent = '編集する問題を選んでください';
    renderTopicEditProbSelector();
    document.getElementById('topic-edit-cat-sel').innerHTML = '<option value="">① 章を選択...</option>'
      + TOPICS.map(cat => `<option value="${cat.catId}">${cat.cat}</option>`).join('');
    document.getElementById('topic-edit-topic-sel').innerHTML = '<option value="">② 論点を選択...</option>';
    document.getElementById('topic-edit-current-list').innerHTML = '';
    document.getElementById('topic-edit-modal').classList.add('open');
    return;
  }
  // 直接問題IDで開く（従来）
  document.getElementById('topic-edit-prob-selector').style.display = 'none';
  document.getElementById('topic-edit-add-section').style.display = 'block';
  const allItems = getMergedData().flatMap(ch => ch.items);
  const item = allItems.find(i => i.id === itemId);
  document.getElementById('topic-edit-modal-sub').textContent = item ? item.name : itemId;
  const catSel = document.getElementById('topic-edit-cat-sel');
  catSel.innerHTML = '<option value="">① 章を選択...</option>'
    + TOPICS.map(cat => `<option value="${cat.catId}">${cat.cat}</option>`).join('');
  document.getElementById('topic-edit-topic-sel').innerHTML = '<option value="">② 論点を選択...</option>';
  renderTopicEditCurrentList();
  document.getElementById('topic-edit-modal').classList.add('open');
}

function renderTopicEditProbSelector() {
  const sel = document.getElementById('topic-edit-prob-selector');
  sel.style.display = 'block';
  document.getElementById('topic-edit-add-section').style.display = 'none';
  document.getElementById('topic-edit-current-list').innerHTML = '';

  // 章セレクト → 問題セレクト
  sel.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;">
      <select class="form-input2" id="prob-sel-ch" style="font-size:12px;padding:7px 10px;" onchange="onProbSelectorChChange()">
        <option value="">① 章を選択...</option>
        ${getMergedData().filter(ch=>ch.items.length>0).map(ch=>`<option value="${ch.ch}">${ch.ch}　${ch.chName}</option>`).join('')}
      </select>
      <div style="display:flex;gap:6px;">
        <select class="form-input2" id="prob-sel-prob" style="flex:1;font-size:12px;padding:7px 10px;">
          <option value="">② 問題を選択...</option>
        </select>
        <button type="button" class="btn-add-r" onclick="selectProbForEdit()">選択</button>
      </div>
    </div>`;
}

function onProbSelectorChChange() {
  const chName = document.getElementById('prob-sel-ch').value;
  const ch = getMergedData().find(c => c.ch === chName);
  const sel = document.getElementById('prob-sel-prob');
  if (!ch) { sel.innerHTML = '<option value="">② 問題を選択...</option>'; return; }
  sel.innerHTML = '<option value="">② 問題を選択...</option>'
    + ch.items.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
}

function selectProbForEdit() {
  const itemId = document.getElementById('prob-sel-prob').value;
  if (!itemId) return;
  topicEditItemId = itemId;
  document.getElementById('topic-edit-prob-selector').style.display = 'none';
  document.getElementById('topic-edit-add-section').style.display = 'block';
  const allItems = getMergedData().flatMap(ch => ch.items);
  const item = allItems.find(i => i.id === itemId);
  document.getElementById('topic-edit-modal-sub').textContent = item ? item.name : itemId;
  const catSel = document.getElementById('topic-edit-cat-sel');
  catSel.innerHTML = '<option value="">① 章を選択...</option>'
    + TOPICS.map(cat => `<option value="${cat.catId}">${cat.cat}</option>`).join('');
  document.getElementById('topic-edit-topic-sel').innerHTML = '<option value="">② 論点を選択...</option>';
  renderTopicEditCurrentList();
}

function closeTopicEditModal() {
  document.getElementById('topic-edit-modal').classList.remove('open');
  topicEditItemId = null;
  render();
}

function renderTopicEditCurrentList() {
  const el = document.getElementById('topic-edit-current-list');
  const linked = getLinkedTopics(topicEditItemId);
  if (linked.length === 0) {
    el.innerHTML = '<div style="font-size:11px;color:var(--text-3);padding:4px 0 8px;">論点が紐づいていません</div>';
    return;
  }
  el.innerHTML = '<div style="font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:6px;letter-spacing:.04em;">現在の論点</div>'
    + linked.map(t => `
      <div class="ronten-edit-item2" style="margin-bottom:5px;">
        <span class="imp-badge imp-${t.imp}" style="font-size:8px;padding:1px 4px;">${t.imp}</span>
        <span class="ronten-edit-name2">${t.name}</span>
        <button class="ronten-edit-del2" onclick="removeTopicFromItem('${t.id}')">✕</button>
      </div>`).join('');
}

function removeTopicFromItem(tid) {
  if (!topicEditItemId) return;
  const itemId = topicEditItemId;
  // Q_TO_TOPICSから削除
  if (Q_TO_TOPICS[itemId]) {
    Q_TO_TOPICS[itemId] = Q_TO_TOPICS[itemId].filter(t => t !== tid);
  }
  // TOPIC_BY_IDのqsから削除
  if (TOPIC_BY_ID[tid]) {
    TOPIC_BY_ID[tid].qs = (TOPIC_BY_ID[tid].qs || []).filter(q => q !== itemId);
  }
  // appState.customLinksから削除
  if (appState.customLinks && appState.customLinks[itemId]) {
    appState.customLinks[itemId] = appState.customLinks[itemId].filter(t => t !== tid);
  }
  // appState.removedLinksに記録（デフォルト論点の除外を永続化）
  if (!appState.removedLinks) appState.removedLinks = {};
  if (!appState.removedLinks[itemId]) appState.removedLinks[itemId] = [];
  if (!appState.removedLinks[itemId].includes(tid)) appState.removedLinks[itemId].push(tid);
  save();
  renderTopicEditCurrentList();
  // 追加セレクトも更新
  onTopicEditCatChange();
}

function onTopicEditCatChange() {
  const catId = document.getElementById('topic-edit-cat-sel').value;
  const sel = document.getElementById('topic-edit-topic-sel');
  if (!catId) {
    sel.innerHTML = '<option value="">② 論点を選択...</option>';
    return;
  }
  const linked = Q_TO_TOPICS[topicEditItemId] || [];
  const allInCat = getTopicsForCat(catId);
  const available = allInCat.filter(t => !linked.includes(t.id));
  sel.innerHTML = available.length === 0
    ? '<option value="">追加できる論点がありません</option>'
    : '<option value="">② 論点を選択...</option>'
      + available.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
}

function addTopicFromEditModal() {
  const tid = document.getElementById('topic-edit-topic-sel').value;
  if (!tid || !topicEditItemId) return;
  const itemId = topicEditItemId;
  // Q_TO_TOPICSに追加
  if (!Q_TO_TOPICS[itemId]) Q_TO_TOPICS[itemId] = [];
  if (!Q_TO_TOPICS[itemId].includes(tid)) Q_TO_TOPICS[itemId].push(tid);
  // TOPIC_BY_IDのqsに追加
  if (TOPIC_BY_ID[tid] && !TOPIC_BY_ID[tid].qs.includes(itemId)) {
    TOPIC_BY_ID[tid].qs.push(itemId);
  }
  // customLinksに保存
  if (!appState.customLinks) appState.customLinks = {};
  if (!appState.customLinks[itemId]) appState.customLinks[itemId] = [];
  if (!appState.customLinks[itemId].includes(tid)) appState.customLinks[itemId].push(tid);
  // removedLinksから除去（再追加の場合）
  if (appState.removedLinks && appState.removedLinks[itemId]) {
    appState.removedLinks[itemId] = appState.removedLinks[itemId].filter(t => t !== tid);
  }
  save();
  renderTopicEditCurrentList();
  onTopicEditCatChange();
}

document.getElementById('topic-edit-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('topic-edit-modal')) closeTopicEditModal();
});

// ══════════════════════════════════════════
// 問題行からの論点追加（旧・未使用）
// ══════════════════════════════════════════
function onItemTopicCatChange(itemId) {
  const catId = document.getElementById('itopic-cat-'+itemId).value;
  const sel = document.getElementById('itopic-sel-'+itemId);
  if (!catId) {
    sel.innerHTML = '<option value="">② 論点を選択...</option>';
    return;
  }
  // すでに紐づいている論点を除外
  const linked = Q_TO_TOPICS[itemId] || [];
  const cat = TOPICS.find(c => c.catId === catId);
  const allInCat = cat ? getTopicsForCat(catId) : [];
  const available = allInCat.filter(t => !linked.includes(t.id));
  sel.innerHTML = available.length === 0
    ? '<option value="">追加できる論点がありません</option>'
    : '<option value="">② 論点を選択...</option>'
      + available.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
}

function addTopicToItem(itemId) {
  const sel = document.getElementById('itopic-sel-'+itemId);
  const tid = sel.value;
  if (!tid) return;
  // Q_TO_TOPICSに追加
  if (!Q_TO_TOPICS[itemId]) Q_TO_TOPICS[itemId] = [];
  if (Q_TO_TOPICS[itemId].includes(tid)) return;
  Q_TO_TOPICS[itemId].push(tid);
  // appStateに保存（カスタムリンク）
  if (!appState.customLinks) appState.customLinks = {};
  if (!appState.customLinks[itemId]) appState.customLinks[itemId] = [];
  if (!appState.customLinks[itemId].includes(tid)) appState.customLinks[itemId].push(tid);
  // TOPIC_BY_IDのqs配列も更新
  if (TOPIC_BY_ID[tid] && !TOPIC_BY_ID[tid].qs.includes(itemId)) {
    TOPIC_BY_ID[tid].qs.push(itemId);
  }
  save();
  // セレクトを更新（追加した論点を除外）
  onItemTopicCatChange(itemId);
  sel.value = '';
  // 論点タブも更新
  renderTopicsView();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load();
(appState.customProblems || []).forEach(p => {
  (p.topicIds || []).forEach(tid => {
    if (!Q_TO_TOPICS[p.id]) Q_TO_TOPICS[p.id] = [];
    if (!Q_TO_TOPICS[p.id].includes(tid)) Q_TO_TOPICS[p.id].push(tid);
  });
});
rebuildTopicIndex();
// カスタムリンク（問題→論点）をQ_TO_TOPICSに反映
Object.entries(appState.customLinks || {}).forEach(([itemId, tids]) => {
  tids.forEach(tid => {
    if (!Q_TO_TOPICS[itemId]) Q_TO_TOPICS[itemId] = [];
    if (!Q_TO_TOPICS[itemId].includes(tid)) Q_TO_TOPICS[itemId].push(tid);
    if (TOPIC_BY_ID[tid] && !TOPIC_BY_ID[tid].qs.includes(itemId)) {
      TOPIC_BY_ID[tid].qs.push(itemId);
    }
  });
});
// 削除されたリンクをQ_TO_TOPICSから除去
Object.entries(appState.removedLinks || {}).forEach(([itemId, tids]) => {
  tids.forEach(tid => {
    if (Q_TO_TOPICS[itemId]) Q_TO_TOPICS[itemId] = Q_TO_TOPICS[itemId].filter(t => t !== tid);
    if (TOPIC_BY_ID[tid]) TOPIC_BY_ID[tid].qs = (TOPIC_BY_ID[tid].qs||[]).filter(q => q !== itemId);
  });
});
render();
if (!appState.rounds[0].startDate) openScopeModal(true);
</script>
